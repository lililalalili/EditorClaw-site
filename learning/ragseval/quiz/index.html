<title>RAG 与语义搜索系统评估｜在线刷题与模拟考试系统</title>
<style>
:root{
  --bg:#f5f7fb; --card:#ffffff; --text:#172033; --muted:#667085; --line:#e5e7eb;
  --primary:#2563eb; --primary2:#1d4ed8; --green:#16a34a; --red:#dc2626; --amber:#d97706;
  --soft:#eef4ff; --softgreen:#ecfdf3; --softred:#fef2f2; --shadow:0 10px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eef4ff 0,#f5f7fb 260px);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text);}
header{padding:28px 20px 16px;max-width:1200px;margin:0 auto;}
.hero{display:flex;gap:20px;align-items:flex-start;justify-content:space-between;}
.badge{display:inline-flex;gap:8px;align-items:center;background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;}
h1{font-size:30px;line-height:1.2;margin:14px 0 8px;letter-spacing:-.02em;}.subtitle{max-width:850px;color:var(--muted);font-size:15px;line-height:1.7;margin:0}.heroStats{display:grid;grid-template-columns:repeat(2,110px);gap:10px;margin-top:4px}.stat{background:rgba(255,255,255,.78);border:1px solid rgba(37,99,235,.12);border-radius:16px;padding:12px;box-shadow:var(--shadow);}.stat b{display:block;font-size:24px}.stat span{font-size:12px;color:var(--muted)}
main{max-width:1200px;margin:0 auto;padding:10px 20px 40px;display:grid;grid-template-columns:310px 1fr;gap:18px;}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);}.sidebar{padding:16px;height:fit-content;position:sticky;top:14px}.content{padding:18px;min-height:620px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;cursor:pointer;font-weight:600;color:#344054}.tab.active{background:var(--primary);border-color:var(--primary);color:#fff}.field{margin:12px 0}.field label{display:block;font-size:13px;color:#344054;font-weight:700;margin-bottom:6px}.field select,.field input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 11px;font-size:14px;background:#fff}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;background:var(--primary);color:white;box-shadow:0 6px 18px rgba(37,99,235,.22)}.btn:hover{background:var(--primary2)}.btn.secondary{background:#fff;color:#344054;border:1px solid var(--line);box-shadow:none}.btn.danger{background:var(--red)}.btn.green{background:var(--green)}.btn.amber{background:var(--amber)}.btn:disabled{opacity:.45;cursor:not-allowed}.btnRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mini{font-size:12px;color:var(--muted);line-height:1.6}.hr{height:1px;background:var(--line);margin:16px 0}.progressBar{height:10px;background:#eef2f7;border-radius:999px;overflow:hidden}.progressBar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),#60a5fa);transition:.2s}.moduleList{display:grid;gap:8px;max-height:260px;overflow:auto;padding-right:3px}.moduleItem{display:flex;align-items:center;gap:8px;font-size:13px;color:#344054}.moduleItem input{width:auto}.summaryGrid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px;margin-bottom:16px}.summaryCard{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.summaryCard b{font-size:26px}.summaryCard span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.qHeader{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.qMeta{display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;background:#f2f4f7;color:#344054}.pill.primary{background:#dbeafe;color:#1e40af}.pill.green{background:#dcfce7;color:#166534}.pill.amber{background:#fef3c7;color:#92400e}.pill.red{background:#fee2e2;color:#991b1b}.qStem{font-size:20px;line-height:1.55;font-weight:750;margin:12px 0 14px}.options{display:grid;gap:10px;margin:12px 0}.option{border:1.5px solid var(--line);border-radius:14px;padding:12px 12px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;background:#fff;transition:.12s}.option:hover{border-color:#93c5fd;background:#f8fbff}.option input{margin-top:3px}.option.correct{border-color:#22c55e;background:var(--softgreen)}.option.wrong{border-color:#ef4444;background:var(--softred)}.option.missed{border-color:#f59e0b;background:#fffbeb}.letter{flex:0 0 26px;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#eef2ff;color:#1e40af;font-weight:800;font-size:13px}.explain{border-left:4px solid var(--primary);background:#f8fbff;border-radius:12px;padding:13px 14px;margin:14px 0;color:#344054;line-height:1.65}.resultBox{border-radius:18px;border:1px solid var(--line);background:#fff;padding:18px;margin:12px 0}.reviewItem{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fff}.reviewItem.wrong{border-left:5px solid var(--red)}.reviewItem.correct{border-left:5px solid var(--green)}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.table th{color:#475467;background:#f9fafb}.hidden{display:none!important}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:14px;padding:12px;line-height:1.6;margin-bottom:14px}.searchRow{display:grid;grid-template-columns:1fr 150px 120px;gap:8px;margin-bottom:12px}.bankList{display:grid;gap:8px}.bankItem{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;cursor:pointer}.bankItem:hover{border-color:#93c5fd}.bankItem .stem{font-weight:700;line-height:1.5}.footerNote{color:var(--muted);font-size:12px;line-height:1.7;margin-top:18px}.timer{font-size:18px;font-weight:800;color:#1e40af}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f2f4f7;border:1px solid #e5e7eb;border-radius:6px;padding:1px 5px;font-size:12px}.confetti{position:fixed;pointer-events:none;inset:0;overflow:hidden;z-index:9999}.confetti i{position:absolute;width:8px;height:12px;background:var(--primary);top:-20px;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(560deg);opacity:.2}}
@media(max-width:920px){main{grid-template-columns:1fr}.sidebar{position:static}.hero{display:block}.heroStats{grid-template-columns:repeat(4,1fr);margin-top:16px}.summaryGrid{grid-template-columns:repeat(2,1fr)}.searchRow{grid-template-columns:1fr}.qHeader{display:block}}
@media(max-width:520px){h1{font-size:24px}.heroStats{grid-template-columns:repeat(2,1fr)}.summaryGrid{grid-template-columns:1fr}.btn{width:100%}.btnRow{display:grid}.content{padding:14px}.qStem{font-size:18px}}
</style>
</head>
<body>
<header>
  <div class="hero">
    <div>
      <span class="badge">RAG Evaluation Course Companion</span>
      <h1>RAG 与语义搜索系统评估｜在线刷题与模拟考试系统</h1>
      <p class="subtitle">基于《Evaluating RAG and Semantic Search Systems》扩展讲义设计。题型限定为单选与多选；多选题正确答案为 2–4 个。支持模块筛选、即时解析、错题本、模拟考试、成绩导出与本地进度保存。</p>
    </div>
    <div class="heroStats">
      <div class="stat"><b id="statTotal">120</b><span>题库总题数</span></div>
      <div class="stat"><b id="statModules">12</b><span>知识模块</span></div>
      <div class="stat"><b id="statDone">0</b><span>已练题目</span></div>
      <div class="stat"><b id="statAcc">0%</b><span>累计正确率</span></div>
    </div>
  </div>
</header>
<main>
  <aside class="panel sidebar">
    <div class="tabs">
      <button class="tab active" data-tab="practice">练习</button>
      <button class="tab" data-tab="exam">考试</button>
      <button class="tab" data-tab="bank">题库</button>
      <button class="tab" data-tab="stats">统计</button>
    </div>
    <div class="field">
      <label>选择模块</label>
      <div class="btnRow" style="margin-top:0"><button class="btn secondary" id="selectAllModules">全选</button><button class="btn secondary" id="clearModules">清空</button></div>
      <div id="moduleList" class="moduleList"></div>
    </div>
    <div class="field">
      <label>题型</label>
      <select id="typeFilter"><option value="all">全部</option><option value="single">单选</option><option value="multi">多选</option></select>
    </div>
    <div class="field">
      <label>难度</label>
      <select id="difficultyFilter"><option value="all">全部</option><option value="easy">easy</option><option value="medium">medium</option><option value="hard">hard</option></select>
    </div>
    <div class="field">
      <label>关键词搜索</label>
      <input id="keywordFilter" placeholder="如 Recall、Judge、时间、权限" />
    </div>
    <div class="hr"></div>
    <div id="practiceSettings">
      <div class="field"><label>练习抽题数量</label><select id="practiceCount"><option value="10">10 题</option><option value="20">20 题</option><option value="40">40 题</option><option value="all">全部符合条件题目</option></select></div>
      <div class="btnRow"><button class="btn" id="startPractice">开始练习</button><button class="btn secondary" id="startWrongbook">练错题</button></div>
    </div>
    <div id="examSettings" class="hidden">
      <div class="field"><label>考试题数</label><select id="examCount"><option value="30">30 题</option><option value="50" selected>50 题</option><option value="80">80 题</option><option value="120">120 题</option></select></div>
      <div class="field"><label>考试时间</label><select id="examMinutes"><option value="30">30 分钟</option><option value="45">45 分钟</option><option value="60" selected>60 分钟</option><option value="90">90 分钟</option></select></div>
      <div class="btnRow"><button class="btn green" id="startExam">开始模拟考试</button></div>
      <p class="mini">考试模式提交前不显示答案；交卷后显示成绩和逐题解析。</p>
    </div>
    <div class="hr"></div>
    <div class="mini">快捷键：<span class="kbd">1-6</span> 选择选项，<span class="kbd">Enter</span> 提交/下一题，<span class="kbd">←</span>/<span class="kbd">→</span> 上一题/下一题。</div>
  </aside>
  <section class="panel content" id="app"></section>
</main>
<div id="confetti" class="confetti hidden"></div>
<script>
const QUESTION_BANK = [{"id": "Q001", "module": "M01 RAG 基础概念", "type": "single", "difficulty": "easy", "stem": "RAG 的核心思想最准确的是哪一项？", "options": ["让大模型完全依赖参数记忆回答问题", "在生成答案前检索外部知识，并让模型基于证据回答", "用关键词搜索替代大语言模型", "只用人工规则生成答案"], "answers": [1], "explanation": "RAG 的关键是 Retrieval-Augmented Generation，即先检索外部知识，再让生成模型基于检索证据作答。", "tags": ["RAG"]}, {"id": "Q002", "module": "M01 RAG 基础概念", "type": "single", "difficulty": "easy", "stem": "语义搜索主要依赖什么来匹配查询和文档？", "options": ["文件大小", "向量表示与相似度计算", "文档创建者姓名", "网页背景颜色"], "answers": [1], "explanation": "语义搜索通过 embedding 将查询和文档映射到向量空间，再根据相似度检索。", "tags": ["semantic search", "embedding"]}, {"id": "Q003", "module": "M01 RAG 基础概念", "type": "single", "difficulty": "easy", "stem": "企业级 RAG 评估为什么不能只看最终答案？", "options": ["因为最终答案不重要", "因为无法定位错误来自检索、排序、上下文还是生成", "因为 RAG 不需要检索", "因为所有答案都应由人工编写"], "answers": [1], "explanation": "RAG 是多环节系统，最终错误可能来自检索、重排序、上下文构造或生成阶段。", "tags": ["evaluation"]}, {"id": "Q004", "module": "M01 RAG 基础概念", "type": "single", "difficulty": "medium", "stem": "Hybrid Search 通常指什么？", "options": ["只使用向量检索", "只使用 BM25", "结合关键词检索、向量检索及可能的重排序", "只使用人工目录"], "answers": [2], "explanation": "企业场景常用 Hybrid Search 兼顾精确词面匹配和语义匹配。", "tags": ["hybrid search"]}, {"id": "Q005", "module": "M01 RAG 基础概念", "type": "single", "difficulty": "medium", "stem": "在 RAG 中，Ground Truth 最接近以下哪一项？", "options": ["模型生成的所有文本", "用户浏览器版本", "标准答案或权威依据", "向量数据库名称"], "answers": [2], "explanation": "Ground Truth 是评估时用于比对的标准答案、相关文档或权威依据。", "tags": ["dataset"]}, {"id": "Q006", "module": "M01 RAG 基础概念", "type": "multi", "difficulty": "easy", "stem": "以下哪些是 RAG 在企业中的典型应用？", "options": ["企业知识库问答", "客服与技术支持", "基于内部制度的流程咨询", "随机生成无依据内容"], "answers": [0, 1, 2], "explanation": "RAG 适合连接企业文档、制度、工单和知识库。随机生成无依据内容正是应避免的问题。", "tags": ["applications"]}, {"id": "Q007", "module": "M01 RAG 基础概念", "type": "multi", "difficulty": "medium", "stem": "RAG 系统比传统搜索多了哪些评估对象？", "options": ["生成答案的忠实性", "引用是否支持结论", "是否正确拒答", "文档是否有页码颜色"], "answers": [0, 1, 2], "explanation": "RAG 除检索相关性外，还必须 const MODULES = [...new Set(QUESTION_BANK.map(q=>q.module))];
const letters = ['A','B','C','D','E','F','G'];
let state = {tab:'practice', mode:null, queue:[], index:0, selected:{}, checked:false, examEnd:null, timer:null, submitted:false};
const storageKey = 'rag_eval_quiz_progress_v1';
const wrongKey = 'rag_eval_quiz_wrongbook_v1';
let progress = loadJSON(storageKey, {});
let wrongbook = loadJSON(wrongKey, {});
function loadJSON(k, fallback){try{return JSON.parse(localStorage.getItem(k))||fallback}catch(e){return fallback}}
function saveJSON(k, v){localStorage.setItem(k, JSON.stringify(v))}
function $(id){return document.getElementById(id)}
function shuffle(arr){return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}
function getFilters(){const checked=[...document.querySelectorAll('.moduleCheck:checked')].map(x=>x.value);return {modules:checked,type:$('typeFilter').value,difficulty:$('difficultyFilter').value,keyword:$('keywordFilter').value.trim().toLowerCase()}}
function filteredQuestions(){const f=getFilters();return QUESTION_BANK.filter(q=> (f.modules.length===0||f.modules.includes(q.module)) && (f.type==='all'||q.type===f.type) && (f.difficulty==='all'||q.difficulty===f.difficulty) && (!f.keyword || (q.stem+q.options.join(' ')+q.explanation+q.module+q.tags.join(' ')).toLowerCase().includes(f.keyword)));}
function answerKey(q){return q.answers.slice().sort((a,b)=>a-b).join(',')}
function selectedKey(q){return (state.selected[q.id]||[]).slice().sort((a,b)=>a-b).join(',')}
function isCorrect(q){return answerKey(q)===selectedKey(q)}
function updateHeaderStats(){
  $('statTotal').textContent=QUESTION_BANK.length; $('statModules').textContent=MODULES.length;
  const attempted=Object.values(progress).filter(p=>p.attempts>0).length;
  const totalAttempts=Object.values(progress).reduce((s,p)=>s+(p.attempts||0),0);
  const totalCorrect=Object.values(progress).reduce((s,p)=>s+(p.correct||0),0);
  $('statDone').textContent=attempted; $('statAcc').textContent=totalAttempts?Math.round(totalCorrect/totalAttempts*100)+'%':'0%';
}
function initModules(){
  $('moduleList').innerHTML = MODULES.map(m=>`<label class="moduleItem"><input type="checkbox" class="moduleCheck" value="${escapeHtml(m)}" checked> ${escapeHtml(m)}</label>`).join('');
  document.querySelectorAll('.moduleCheck').forEach(x=>x.addEventListener('change',()=>{ if(state.tab==='bank') renderBank(); }));
}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function setTab(tab){state.tab=tab; state.mode=null; state.queue=[]; state.index=0; state.submitted=false; clearTimer();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  $('practiceSettings').classList.toggle('hidden', tab!=='practice'); $('examSettings').classList.toggle('hidden', tab!=='exam');
  if(tab==='practice') renderWelcome(); if(tab==='exam') renderExamWelcome(); if(tab==='bank') renderBank(); if(tab==='stats') renderStats();
}
function renderWelcome(){
  const app=$('app'); const count=filteredQuestions().length;
  app.innerHTML=`<div class="summaryGrid"><div class="summaryCard"><b>${QUESTION_BANK.length}</b><span>题库总题数</span></div><div class="summaryCard"><b>${MODULES.length}</b><span>知识模块</span></div><div class="summaryCard"><b>${Object.keys(wrongbook).length}</b><span>错题本</span></div><div class="summaryCard"><b>${count}</b><span>当前筛选题数</span></div></div>
  <div class="notice">练习模式会即时显示答案和解析，适合学习巩固。左侧可按模块、题型、难度和关键词筛选。多选题必须完全选对才计为正确。</div>
  <h2>使用建议</h2><p>建议先按模块刷题，再进行 50 题模拟考试。错题会自动进入错题本，可反复练习直到掌握。</p>
  <h3>题型规则</h3><ul><li>单选题：只有 1 个正确答案。</li><li>多选题：正确答案为 2–4 个；漏选或多选均判错。</li></ul>
  <p class="footerNote">本系统为离线静态网页，进度保存在本机浏览器 localStorage 中。</p>`;
}
function renderExamWelcome(){
  $('app').innerHTML=`<div class="notice">模拟考试模式不会立即显示答案。交卷后会生成成绩、正确率、用时、错题清单和完整解析。</div><h2>模拟考试说明</h2><ol><li>左侧选择考试题数和时间。</li><li>可按模块、题型、难度筛选后组卷。</li><li>考试中可跳题、返回修改。</li><li>倒计时结束会自动交卷。</li></ol>`;
}
function startPractice(useWrong=false){
  let pool = useWrong ? QUESTION_BANK.filter(q=>wrongbook[q.id]) : filteredQuestions();
  if(!pool.length){alert(useWrong?'错题本为空，先去练习一些题目吧。':'当前筛选条件下没有题目。');return}
  const count=$('practiceCount').value; let queue=shuffle(pool); if(count!=='all') queue=queue.slice(0, Math.min(+count, queue.length));
  state={...state, tab:'practice', mode:'practice', queue, index:0, selected:{}, checked:false}; renderQuestion();
}
function startExam(){
  const pool=filteredQuestions(); const n=Math.min(+$('examCount').value, pool.length); if(n<=0){alert('当前筛选条件下没有题目。');return}
  const queue=shuffle(pool).slice(0,n); const minutes=+$('examMinutes').value;
  state={...state, tab:'exam', mode:'exam', queue, index:0, selected:{}, checked:false, submitted:false, examEnd:Date.now()+minutes*60*1000};
  startTimer(); renderQuestion();
}
function renderQuestion(){
  const q=state.queue[state.index]; if(!q){renderWelcome();return}
  const app=$('app'); const selected=state.selected[q.id]||[]; const checked=state.mode==='practice' && state.checked;
  const progressPct=Math.round((state.index)/state.queue.length*100);
  let timerHtml= state.mode==='exam'?`<div class="timer" id="timerBox">--:--</div>`:'';
  app.innerHTML=`<div class="qHeader"><div><div class="qMeta"><span class="pill primary">${q.id}</span><span class="pill">${escapeHtml(q.module)}</span><span class="pill ${q.type==='multi'?'amber':'green'}">${q.type==='multi'?'多选':'单选'}</span><span class="pill">${q.difficulty}</span></div></div>${timerHtml}</div>
  <div class="progressBar"><span style="width:${progressPct}%"></span></div><p class="mini">第 ${state.index+1} / ${state.queue.length} 题</p>
  <div class="qStem">${escapeHtml(q.stem)}</div>
  <div class="options">${q.options.map((op,i)=>optionHtml(q,op,i,selected,checked)).join('')}</div>
  <div id="feedback">${checked?feedbackHtml(q):''}</div>
  <div class="btnRow">${buttonHtml(q)}</div>`;
  document.querySelectorAll('.option').forEach(el=>el.addEventListener('click',e=>{ if(e.target.tagName!=='INPUT'){ e.preventDefault(); el.querySelector('input').click(); } }));
  document.querySelectorAll('.answerInput').forEach(input=>input.addEventListener('click',e=>{ e.stopPropagation(); selectOption(q, +input.value, input.checked); }));
  if(state.mode==='exam') updateTimerBox();
}
function optionHtml(q,op,i,selected,checked){
  let cls='option'; if(checked){ const isAns=q.answers.includes(i), isSel=selected.includes(i); if(isAns&&isSel) cls+=' correct'; else if(!isAns&&isSel) cls+=' wrong'; else if(isAns&&!isSel) cls+=' missed'; }
  const inputType=q.type==='single'?'radio':'checkbox'; const name='ans_'+q.id; const isChecked=selected.includes(i)?'checked':'';
  return `<label class="${cls}"><input class="answerInput" type="${inputType}" name="${name}" value="${i}" ${isChecked} ${checked?'disabled':''}><span class="letter">${letters[i]}</span><span>${escapeHtml(op)}</span></label>`;
}
function buttonHtml(q){
  const prev=`<button class="btn secondary" onclick="prevQuestion()" ${state.index===0?'disabled':''}>上一题</button>`;
  const nextText=state.index===state.queue.length-1?'完成':'下一题';
  if(state.mode==='practice'){
    return `${prev}<button class="btn" onclick="checkPractice()">${state.checked?'重新判题':'提交本题'}</button><button class="btn secondary" onclick="nextQuestion()">${nextText}</button><button class="btn secondary" onclick="toggleWrong('${q.id}')">${wrongbook[q.id]?'移出错题本':'加入错题本'}</button>`;
  }
  return `${prev}<button class="btn secondary" onclick="nextQuestion()">${nextText}</button><button class="btn green" onclick="submitExam(false)">交卷</button>`;
}
function selectOption(q, idx, checked){
  let arr=state.selected[q.id]||[];
  if(q.type==='single') arr=[idx]; else { if(checked){ if(!arr.includes(idx)) arr.push(idx); } else arr=arr.filter(x=>x!==idx); }
  state.selected[q.id]=arr; if(state.mode==='exam') saveExamDraft();
  renderQuestion();
}
function checkPractice(){
  const q=state.queue[state.index]; if(!(state.selected[q.id]||[]).length){alert('请先选择答案。');return}
  const correct=isCorrect(q); recordProgress(q, correct); state.checked=true; if(!correct) wrongbook[q.id]=true; else delete wrongbook[q.id]; saveJSON(wrongKey, wrongbook); updateHeaderStats(); renderQuestion(); if(correct) burst();
}
function feedbackHtml(q){
  const correct=isCorrect(q); const ans=q.answers.map(i=>letters[i]).join('、'); const your=(state.selected[q.id]||[]).map(i=>letters[i]).join('、')||'未作答';
  return `<div class="explain"><b style="color:${correct?'var(--green)':'var(--red)'}">${correct?'回答正确':'回答错误'}</b><br>你的答案：${your}<br>正确答案：${ans}<br><b>解析：</b>${escapeHtml(q.explanation)}</div>`;
}
function prevQuestion(){ if(state.index>0){state.index--; state.checked=false; renderQuestion();} }
function nextQuestion(){ if(state.index<state.queue.length-1){state.index++; state.checked=false; renderQuestion();} else { if(state.mode==='practice') renderPracticeSummary(); else submitExam(false);} }
function recordProgress(q, correct){ const p=progress[q.id]||{attempts:0,correct:0,wrong:0}; p.attempts++; if(correct)p.correct++; else p.wrong++; progress[q.id]=p; saveJSON(storageKey, progress); }
function toggleWrong(qid){ if(wrongbook[qid]) delete wrongbook[qid]; else wrongbook[qid]=true; saveJSON(wrongKey, wrongbook); renderQuestion(); updateHeaderStats(); }
function renderPracticeSummary(){
  let attempted=state.queue.filter(q=>state.selected[q.id]); let correct=attempted.filter(q=>answerKey(q)===selectedKey(q)).length;
  $('app').innerHTML=`<div class="resultBox"><h2>练习完成</h2><p>本轮共 ${state.queue.length} 题，已作答 ${attempted.length} 题，当前正确 ${correct} 题。</p><div class="btnRow"><button class="btn" onclick="startPractice(false)">再练一组</button><button class="btn secondary" onclick="setTab('stats')">查看统计</button></div></div>`;
}
function startTimer(){ clearTimer(); state.timer=setInterval(()=>{ const left=state.examEnd-Date.now(); if(left<=0){submitExam(true)} else updateTimerBox();},1000)}
function clearTimer(){ if(state.timer) clearInterval(state.timer); state.timer=null; }
function updateTimerBox(){ const el=$('timerBox'); if(!el)return; const left=Math.max(0,state.examEnd-Date.now()); const m=Math.floor(left/60000), s=Math.floor((left%60000)/1000); el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function saveExamDraft(){}
function submitExam(auto){
  if(state.mode!=='exam' || state.submitted) return;
  if(!auto && !confirm('确定交卷吗？')) return;
  clearTimer(); state.submitted=true;
  let correct=0, answered=0; const rows=[];
  state.queue.forEach(q=>{const ans=state.selected[q.id]||[]; if(ans.length) answered++; const ok=answerKey(q)===ans.slice().sort((a,b)=>a-b).join(','); if(ok) correct++; recordProgress(q,ok); if(!ok) wrongbook[q.id]=true; else delete wrongbook[q.id]; rows.push({q,ok});});
  saveJSON(wrongKey, wrongbook); updateHeaderStats(); const score=Math.round(correct/state.queue.length*100); renderExamResult(rows,score,correct,answered); if(score>=85) burst();
}
function renderExamResult(rows,score,correct,answered){
  const app=$('app'); const wrong=rows.filter(r=>!r.ok).length;
  app.innerHTML=`<div class="resultBox"><h2>模拟考试成绩</h2><div class="summaryGrid"><div class="summaryCard"><b>${score}</b><span>总分 / 100</span></div><div class="summaryCard"><b>${correct}</b><span>正确题数</span></div><div class="summaryCard"><b>${wrong}</b><span>错误/未答</span></div><div class="summaryCard"><b>${answered}</b><span>已答题数</span></div></div><div class="btnRow"><button class="btn" onclick="startExam()">重新组卷</button><button class="btn secondary" onclick="exportExamResult()">导出成绩 JSON</button><button class="btn secondary" onclick="setTab('practice')">返回练习</button></div></div>
  <h3>逐题解析</h3>${rows.map(({q,ok})=>reviewHtml(q,ok)).join('')}`;
}
function reviewHtml(q,ok){ const your=(state.selected[q.id]||[]).map(i=>letters[i]).join('、')||'未作答'; const ans=q.answers.map(i=>letters[i]).join('、'); return `<div class="reviewItem ${ok?'correct':'wrong'}"><div class="qMeta"><span class="pill primary">${q.id}</span><span class="pill">${escapeHtml(q.module)}</span><span class="pill ${q.type==='multi'?'amber':'green'}">${q.type==='multi'?'多选':'单选'}</span><span class="pill ${ok?'green':'red'}">${ok?'正确':'错误'}</span></div><div class="stem" style="margin-top:8px;font-weight:700">${escapeHtml(q.stem)}</div><p class="mini">你的答案：${your}｜正确答案：${ans}</p><p>${escapeHtml(q.explanation)}</p></div>` }
function renderBank(){
  const list=filteredQuestions(); $('app').innerHTML=`<div class="searchRow"><input id="bankSearch" placeholder="在当前题库中搜索" value="${escapeHtml($('keywordFilter').value)}"><select id="bankType"><option value="all">全部题型</option><option value="single">单选</option><option value="multi">多选</option></select><button class="btn secondary" onclick="exportQuestionBank()">导出题库</button></div><p class="mini">当前筛选：${list.length} 题。点击题目可查看答案解析。</p><div class="bankList">${list.map(q=>bankItemHtml(q)).join('')}</div>`;
  $('bankSearch').addEventListener('input',e=>{$('keywordFilter').value=e.target.value; renderBank();}); $('bankType').value=$('typeFilter').value; $('bankType').addEventListener('change',e=>{$('typeFilter').value=e.target.value; renderBank();});
}
function bankItemHtml(q){ return `<div class="bankItem" onclick="openBankQuestion('${q.id}')"><div class="qMeta"><span class="pill primary">${q.id}</span><span class="pill">${escapeHtml(q.module)}</span><span class="pill ${q.type==='multi'?'amber':'green'}">${q.type==='multi'?'多选':'单选'}</span><span class="pill">${q.difficulty}</span></div><div class="stem">${escapeHtml(q.stem)}</div></div>` }
function openBankQuestion(qid){ const q=QUESTION_BANK.find(x=>x.id===qid); state.queue=[q]; state.index=0; state.selected={}; state.checked=true; $('app').innerHTML=`<div class="btnRow"><button class="btn secondary" onclick="renderBank()">返回题库</button></div><div class="qStem">${escapeHtml(q.stem)}</div><div class="options">${q.options.map((op,i)=>optionHtml(q,op,i,q.answers,true)).join('')}</div><div class="explain"><b>正确答案：${q.answers.map(i=>letters[i]).join('、')}</b><br>${escapeHtml(q.explanation)}</div>`; }
function renderStats(){
  const attempted=Object.entries(progress).filter(([id,p])=>p.attempts>0); const totalAtt=attempted.reduce((s,[id,p])=>s+p.attempts,0); const totalCor=attempted.reduce((s,[id,p])=>s+p.correct,0); const acc=totalAtt?Math.round(totalCor/totalAtt*100):0;
  const byMod=MODULES.map(m=>{const qs=QUESTION_BANK.filter(q=>q.module===m); const att=qs.reduce((s,q)=>s+(progress[q.id]?.attempts||0),0); const cor=qs.reduce((s,q)=>s+(progress[q.id]?.correct||0),0); return {m,att,cor,acc:att?Math.round(cor/att*100):0};});
  $('app').innerHTML=`<div class="summaryGrid"><div class="summaryCard"><b>${attempted.length}</b><span>已练题目</span></div><div class="summaryCard"><b>${totalAtt}</b><span>累计作答次数</span></div><div class="summaryCard"><b>${acc}%</b><span>累计正确率</span></div><div class="summaryCard"><b>${Object.keys(wrongbook).length}</b><span>错题本题数</span></div></div><div class="btnRow"><button class="btn secondary" onclick="exportProgress()">导出进度</button><button class="btn danger" onclick="resetProgress()">清空本机进度</button></div><h3>模块统计</h3><table class="table"><thead><tr><th>模块</th><th>作答次数</th><th>正确次数</th><th>正确率</th></tr></thead><tbody>${byMod.map(r=>`<tr><td>${escapeHtml(r.m)}</td><td>${r.att}</td><td>${r.cor}</td><td>${r.acc}%</td></tr>`).join('')}</tbody></table><h3>错题本</h3>${Object.keys(wrongbook).length?QUESTION_BANK.filter(q=>wrongbook[q.id]).map(q=>bankItemHtml(q)).join(''):'<p class="mini">当前没有错题。</p>'}`;
}
function exportBlob(name, data, type='application/json'){ const blob=new Blob([data],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function exportQuestionBank(){ exportBlob('rag_eval_question_bank.json', JSON.stringify(QUESTION_BANK,null,2)); }
function exportProgress(){ exportBlob('rag_eval_progress.json', JSON.stringify({progress,wrongbook,exported_at:new Date().toISOString()},null,2)); }
function exportExamResult(){ exportBlob('rag_eval_exam_result.json', JSON.stringify({score_exported_at:new Date().toISOString(), queue:state.queue.map(q=>({id:q.id,selected:state.selected[q.id]||[],correct_answers:q.answers,correct:isCorrect(q)}))},null,2)); }
function resetProgress(){ if(confirm('确定清空本机练习进度和错题本吗？')){progress={}; wrongbook={}; saveJSON(storageKey,progress); saveJSON(wrongKey,wrongbook); updateHeaderStats(); renderStats();} }
function burst(){ const box=$('confetti'); box.classList.remove('hidden'); box.innerHTML=''; for(let i=0;i<60;i++){const e=document.createElement('i'); e.style.left=Math.random()*100+'vw'; e.style.background=['#2563eb','#22c55e','#f59e0b','#ef4444'][Math.floor(Math.random()*4)]; e.style.animationDelay=Math.random()*0.25+'s'; box.appendChild(e)} setTimeout(()=>box.classList.add('hidden'),1800); }
function exportExamResult() { const result=state.queue.map(q=>({id:q.id,module:q.module,type:q.type,stem:q.stem,selected:(state.selected[q.id]||[]).map(i=>letters[i]),correct_answers:q.answers.map(i=>letters[i]),is_correct:isCorrect(q),explanation:q.explanation})); const correct=result.filter(r=>r.is_correct).length; exportBlob('RAG模拟考试成绩.json', JSON.stringify({exported_at:new Date().toISOString(),score:Math.round(correct/result.length*100),correct,total:result.length,items:result},null,2)); }
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
$('selectAllModules').addEventListener('click',()=>{document.querySelectorAll('.moduleCheck').forEach(x=>x.checked=true); if(state.tab==='bank')renderBank();});
$('clearModules').addEventListener('click',()=>{document.querySelectorAll('.moduleCheck').forEach(x=>x.checked=false); if(state.tab==='bank')renderBank();});
$('startPractice').addEventListener('click',()=>startPractice(false)); $('startWrongbook').addEventListener('click',()=>startPractice(true)); $('startExam').addEventListener('click',startExam);
['typeFilter','difficultyFilter','keywordFilter'].forEach(id=>$(id).addEventListener('input',()=>{ if(state.tab==='bank') renderBank(); }));
document.addEventListener('keydown',e=>{ if(!state.mode)return; const q=state.queue[state.index]; if(!q)return; if(/^[1-6]$/.test(e.key)){const idx=+e.key-1; if(idx<q.options.length){ if(q.type==='single') state.selected[q.id]=[idx]; else {const arr=state.selected[q.id]||[]; state.selected[q.id]=arr.includes(idx)?arr.filter(x=>x!==idx):arr.concat(idx);} renderQuestion(); }} else if(e.key==='Enter'){ if(state.mode==='practice'&&!state.checked) checkPractice(); else nextQuestion(); } else if(e.key==='ArrowLeft') prevQuestion(); else if(e.key==='ArrowRight') nextQuestion(); });
initModules(); updateHeaderStats(); renderWelcome();
</script>
</body>
</html>
