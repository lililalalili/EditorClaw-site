<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Word Game</title>
  <style>
    /* Basic resets */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f7;
      color: #333;
      overflow-x: hidden;
    }

    :root {
      /* Responsive width for road segments: clamps between 80px and 120px based on viewport width */
      --segment-width: clamp(80px, 18vw, 120px);
    }

    /* Game container */
    #game {
      position: relative;
      width: 100%;
      height: 60vh;
      max-height: 480px;
      margin-top: 20px;
      overflow: hidden;
      border-top: 4px solid #999;
      border-bottom: 4px solid #999;
      background: linear-gradient(#e0e5ec, #f5f7fa);
    }

    /* HUD (score and lives display) */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      align-items: center;
      pointer-events: none;
      z-index: 3;
    }
    #lives {
      display: flex;
      gap: 4px;
      font-size: 22px;
      color: #e63946;
    }
    #score {
      font-size: 18px;
      color: #333;
    }

    /* Road wrapper */
    #road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      flex-direction: row;
    }

    /* Each road segment */
    .segment {
      width: var(--segment-width);
      height: 100%;
      border-right: 2px solid #ccc;
      position: relative;
      background: #7a7a7a;
    }
    .segment.full {
      background: #7a7a7a;
    }
    .segment.missing {
      background: none;
    }

    /* Placeholder for missing segment (dashed outline) */
    .segment.missing::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 3px dashed #bbb;
      border-radius: 4px;
    }

    /* Car sprite */
    #car {
      position: absolute;
      bottom: 88px;
      left: 0;
      width: 60px;
      height: 40px;
      background: #ff5555;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.6s ease;
      z-index: 2;
    }
    /* Wheels on the car */
    #car::before,
    #car::after {
      content: '';
      position: absolute;
      bottom: -6px;
      width: 18px;
      height: 18px;
      background: #222;
      border-radius: 50%;
    }
    #car::before {
      left: 8px;
    }
    #car::after {
      right: 8px;
    }

    /* Question overlay */
    #question-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 1rem;
    }
    #question-overlay.active {
      display: flex;
    }
    .question-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 90%;
      width: 360px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .question-content img {
      width: 100%;
      max-height: 150px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .word-display {
      font-size: 24px;
      margin: 10px 0;
      letter-spacing: 3px;
      font-weight: bold;
    }
    .options {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }
    .option-button {
      flex: 1;
      margin: 0 5px;
      padding: 10px;
      font-size: 18px;
      background: #f0f0f0;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .option-button:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }
    .option-button:disabled {
      background: #ddd;
      cursor: default;
    }
    .message {
      margin-top: 15px;
      font-size: 16px;
      min-height: 24px;
      color: #333;
    }

    /* Progress indicator in question overlay */
    .progress {
      font-size: 14px;
      margin-bottom: 5px;
      color: #555;
    }

    /* Road piece for drag-and-drop */
    #road-piece {
      position: absolute;
      width: var(--segment-width);
      height: 80px;
      background: #7a7a7a;
      border-radius: 2px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.4);
      z-index: 9;
      display: none;
    }

    /* Game over overlay */
    #game-over {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: #fff;
      flex-direction: column;
      text-align: center;
    }
    #game-over.active {
      display: flex;
    }
    #game-over button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #ff5555;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #game-over button:hover {
      background: #e04444;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="road"></div>
    <div id="car"></div>
  </div>

  <!-- Heads-up display showing remaining lives and score -->
  <div id="hud">
    <div id="lives"></div>
    <div id="score"></div>
  </div>

  <!-- Road piece (hidden until needed) -->
  <div id="road-piece"></div>

  <!-- Question overlay -->
  <div id="question-overlay">
    <div class="question-content">
      <div class="progress" id="progress"></div>
      <img id="question-image" src="" alt="Question image">
      <div class="word-display" id="word-display"></div>
      <div class="options">
        <button class="option-button" id="opt1"></button>
        <button class="option-button" id="opt2"></button>
        <button class="option-button" id="opt3"></button>
      </div>
      <div class="message" id="message"></div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="game-over">
    <h2 id="game-over-title">Game Over</h2>
    <p id="game-over-text"></p>
    <button id="restart-btn">Restart</button>
  </div>

  <script>
    // List of questions for the game.
    const questions = [
      {
        image: 'images/apple.png',
        word: 'apple'
      },
      {
        image: 'images/ball.png',
        word: 'ball'
      },
      {
        image: 'images/tree.png',
        word: 'tree'
      },
      {
        image: 'images/house.png',
        word: 'house'
      },
      {
        image: 'images/cat.png',
        word: 'cat'
      }
    ];

    // Game state variables
    let currentSegmentIndex = 0;
    let wrongCount = 0;
    const maxWrong = 3;
    let currentQuestionIndex = 0;
let segmentWidth = 120; // will be updated on init based on CSS variable
let totalSegments = questions.length + 2; // starting and ending segments
let currentMissingSegment = null;
// Additional game state for score and lives
let score = 0;
let lives = maxWrong;

    // High score tracked across sessions
    let highScore = 0;

    /**
     * Preprocess the questions to generate missing substrings, masked display strings,
     * and distractor options automatically. This allows adding new words easily.
     */
    function preprocessQuestions() {
      const letters = 'abcdefghijklmnopqrstuvwxyz';
      questions.forEach(q => {
        const word = q.word.toLowerCase();
        // Decide whether to remove one or two characters based on word length
        let removeLength = 1;
        if (word.length >= 5 && Math.random() < 0.5) {
          removeLength = 2;
        }
        // Choose a start index for removal
        const maxStart = word.length - removeLength;
        const startIdx = Math.floor(Math.random() * (maxStart + 1));
        q.missing = word.substring(startIdx, startIdx + removeLength);
        // Create the masked display with underscores
        q.display = word.substring(0, startIdx) + '_'.repeat(removeLength) + word.substring(startIdx + removeLength);
        // Generate two distractor options of the same length as the missing part
        const distractors = [];
        while (distractors.length < 2) {
          let candidate = '';
          if (removeLength === 1) {
            candidate = letters[Math.floor(Math.random() * letters.length)];
          } else {
            // Two-letter candidate; choose two random letters
            const c1 = letters[Math.floor(Math.random() * letters.length)];
            const c2 = letters[Math.floor(Math.random() * letters.length)];
            candidate = c1 + c2;
          }
          if (candidate !== q.missing && !distractors.includes(candidate)) {
            distractors.push(candidate);
          }
        }
        q.options = [q.missing, ...distractors];
      });
    }

    // DOM elements
    const road = document.getElementById('road');
    const car = document.getElementById('car');
    const questionOverlay = document.getElementById('question-overlay');
    const questionImage = document.getElementById('question-image');
    const wordDisplay = document.getElementById('word-display');
    const messageEl = document.getElementById('message');
    let optionsButtons = [document.getElementById('opt1'), document.getElementById('opt2'), document.getElementById('opt3')];
    const roadPiece = document.getElementById('road-piece');
    const gameOverScreen = document.getElementById('game-over');
    const gameOverText = document.getElementById('game-over-text');
    const restartBtn = document.getElementById('restart-btn');
const livesEl = document.getElementById('lives');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');

    /**
     * Initialize the game by building the road and resetting state.
     */
    function initGame() {
      // Reset state
      currentSegmentIndex = 0;
      wrongCount = 0;
      currentQuestionIndex = 0;
      currentMissingSegment = null;
      // Reset score and lives
      score = 0;
      lives = maxWrong;

      // Preprocess questions to generate missing parts and options
      preprocessQuestions();

      // Load high score from localStorage if available
      const storedHigh = localStorage.getItem('cwGameHighScore');
      highScore = storedHigh ? parseInt(storedHigh, 10) : 0;

      // Clear road
      road.innerHTML = '';

      // Build road segments
      for (let i = 0; i < totalSegments; i++) {
        const seg = document.createElement('div');
        seg.classList.add('segment');
        if (i === 0 || i === totalSegments - 1) {
          seg.classList.add('full');
        } else {
          seg.classList.add('missing');
          seg.dataset.questionIndex = i - 1; // map segment to question
        }
        road.appendChild(seg);
      }

      // Update segmentWidth based on computed style of the first segment for responsive sizing
      const firstSeg = road.querySelector('.segment');
      if (firstSeg) {
        segmentWidth = firstSeg.getBoundingClientRect().width;
      }

      // Position the car at the start
      car.style.transform = 'translateX(0px)';

      // Hide overlays
      questionOverlay.classList.remove('active');
      gameOverScreen.classList.remove('active');
      roadPiece.style.display = 'none';
      // Update HUD
      updateHUD();

      // Start movement after short delay
      setTimeout(() => {
        nextMove();
      }, 500);
    }

    /**
     * Move the car to the next segment. If the next segment is a missing one,
     * trigger the corresponding question.
     */
    function nextMove() {
      if (currentSegmentIndex >= totalSegments - 1) {
        // Reached end, show winning message
        showGameOver(true);
        return;
      }
      currentSegmentIndex++;
      // Animate car movement
      car.style.transition = 'transform 0.6s ease';
      car.style.transform = 'translateX(' + (currentSegmentIndex * segmentWidth) + 'px)';
      // Determine if this segment triggers a question
      const seg = road.children[currentSegmentIndex];
      if (seg.classList.contains('missing')) {
        // Wait for animation to complete before showing question
        setTimeout(() => {
          currentMissingSegment = seg;
          showQuestion(parseInt(seg.dataset.questionIndex));
        }, 650);
      } else {
        // Continue moving after a short pause
        setTimeout(() => {
          nextMove();
        }, 500);
      }
    }

    /**
     * Display the question overlay for the given question index.
     * @param {number} qIndex
     */
    function showQuestion(qIndex) {
      currentQuestionIndex = qIndex;
      const q = questions[qIndex];
      // Populate overlay
      questionImage.src = q.image;
      wordDisplay.textContent = q.display;
      // Shuffle options to randomize positions
      const shuffledOptions = q.options.slice().sort(() => Math.random() - 0.5);
      for (let i = 0; i < optionsButtons.length; i++) {
        const btn = optionsButtons[i];
        btn.disabled = false;
        btn.textContent = shuffledOptions[i];
        // Remove any previous listeners to avoid stacking
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        optionsButtons[i] = newBtn;
      }
      // Re-attach listeners
      optionsButtons.forEach(btn => {
        btn.addEventListener('click', handleOptionClick);
      });
      messageEl.textContent = '';
      // Show progress (e.g., 第1关/共5关)
      progressEl.textContent = '第 ' + (currentQuestionIndex + 1) + ' 关/共 ' + questions.length + ' 关';
      // Show overlay
      questionOverlay.classList.add('active');
    }

    /**
     * Handle click on an answer option.
     * @param {Event} e
     */
    function handleOptionClick(e) {
      const chosen = e.target.textContent;
      const q = questions[currentQuestionIndex];
      // Disable all buttons
      optionsButtons.forEach(btn => btn.disabled = true);
      if (chosen === q.missing) {
        // Correct answer
        handleCorrectAnswer();
      } else {
        // Wrong answer
        handleWrongAnswer();
      }
    }

    /**
     * Called when the player selects the correct option.
     */
    function handleCorrectAnswer() {
      const q = questions[currentQuestionIndex];
      // Show full word
      wordDisplay.textContent = q.word;
      messageEl.textContent = '回答正确！请拖动路段填补空缺。';
      // Increase score and update HUD
      score += 10;
      updateHUD();
      // Create road piece and enable dragging
      showRoadPiece();
    }

    /**
     * Called when the player selects the wrong option.
     */
    function handleWrongAnswer() {
      const q = questions[currentQuestionIndex];
      wrongCount++;
      lives--;
      // Show correct answer
      wordDisplay.textContent = q.word;
      messageEl.textContent = '答错了！正确答案是 "' + q.missing + '".';
      // Fill missing segment automatically
      currentMissingSegment.classList.remove('missing');
      currentMissingSegment.classList.add('full');
      // Hide options after a short delay and continue
      setTimeout(() => {
        questionOverlay.classList.remove('active');
        if (lives <= 0) {
          showGameOver(false);
        } else {
          nextMove();
        }
      }, 1500);
      // Update HUD after losing a life
      updateHUD();
    }

    /**
     * Show the draggable road piece and set up pointer events.
     */
    function showRoadPiece() {
      // Recompute segmentWidth for responsive sizing
      segmentWidth = road.querySelector('.segment').getBoundingClientRect().width;
      const roadRect = road.getBoundingClientRect();
      const pieceStartX = (window.innerWidth - segmentWidth) / 2;
      const pieceStartY = roadRect.top + roadRect.height + 20;
      roadPiece.style.display = 'block';
      // Adjust piece dimensions to match the segment and road
      roadPiece.style.width = segmentWidth + 'px';
      roadPiece.style.height = roadRect.height + 'px';
      roadPiece.style.left = pieceStartX + 'px';
      roadPiece.style.top = pieceStartY + 'px';
      roadPiece.style.transition = 'none';

      let dragging = false;
      let offsetX = 0;
      let offsetY = 0;

      function pointerDownHandler(ev) {
        ev.preventDefault();
        dragging = true;
        offsetX = ev.clientX - roadPiece.offsetLeft;
        offsetY = ev.clientY - roadPiece.offsetTop;
        roadPiece.setPointerCapture(ev.pointerId);
      }

      function pointerMoveHandler(ev) {
        if (!dragging) return;
        ev.preventDefault();
        const x = ev.clientX - offsetX;
        const y = ev.clientY - offsetY;
        roadPiece.style.left = x + 'px';
        roadPiece.style.top = y + 'px';
      }

      function pointerUpHandler(ev) {
        if (!dragging) return;
        dragging = false;
        roadPiece.releasePointerCapture(ev.pointerId);
        // Check overlap with target segment
        const pieceRect = roadPiece.getBoundingClientRect();
        const targetRect = currentMissingSegment.getBoundingClientRect();
        const overlapX = pieceRect.right > targetRect.left && pieceRect.left < targetRect.right;
        const overlapY = pieceRect.bottom > targetRect.top && pieceRect.top < targetRect.bottom;
        if (overlapX && overlapY) {
          // Snap to target position
          roadPiece.style.left = targetRect.left + 'px';
          roadPiece.style.top = targetRect.top + 'px';
          // Mark segment as full
          currentMissingSegment.classList.remove('missing');
          currentMissingSegment.classList.add('full');
          // Hide the piece after slight delay
          setTimeout(() => {
            roadPiece.style.display = 'none';
            questionOverlay.classList.remove('active');
            nextMove();
          }, 500);
          // Remove event listeners to prevent duplication
          removePointerListeners();
        } else {
          // Reset to starting point
          roadPiece.style.left = pieceStartX + 'px';
          roadPiece.style.top = pieceStartY + 'px';
        }
      }

      function removePointerListeners() {
        roadPiece.removeEventListener('pointerdown', pointerDownHandler);
        roadPiece.removeEventListener('pointermove', pointerMoveHandler);
        roadPiece.removeEventListener('pointerup', pointerUpHandler);
      }

      // Attach event listeners
      roadPiece.addEventListener('pointerdown', pointerDownHandler);
      roadPiece.addEventListener('pointermove', pointerMoveHandler);
      roadPiece.addEventListener('pointerup', pointerUpHandler);
    }

    /**
     * Display the game over screen.
     * @param {boolean} won - Indicates whether the player reached the end.
     */
    function showGameOver(won) {
      questionOverlay.classList.remove('active');
      roadPiece.style.display = 'none';
      gameOverScreen.classList.add('active');
      const title = won ? '恭喜通关！' : '游戏结束';
      // Update high score if current score is greater
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('cwGameHighScore', String(score));
      }
      // Build message including current and high score
      let text;
      if (won) {
        text = '你顺利通过了所有关卡！';
      } else {
        text = '你已经用完了所有机会。';
      }
      text += '\n本次得分：' + score + '\n最高得分：' + highScore;
      document.getElementById('game-over-title').textContent = title;
      gameOverText.textContent = text;
    }

    /**
     * Update the HUD elements (lives and score).
     */
    function updateHUD() {
      // Update lives display (hearts)
      livesEl.innerHTML = '';
      for (let i = 0; i < lives; i++) {
        livesEl.innerHTML += '❤';
      }
      // Update score display
      scoreEl.textContent = '分数: ' + score;
    }

    // Restart button handler
    restartBtn.addEventListener('click', () => {
      gameOverScreen.classList.remove('active');
      initGame();
    });

    // Initialize on page load
    window.addEventListener('load', initGame);
  </script>
</body>
</html>
