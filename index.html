<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>单词修路小车</title>
  <style>
    :root{
      --bg:#f4f8ff;
      --card:#ffffff;
      --text:#1d2a3a;
      --sub:#5b6b80;
      --accent:#4b8bff;
      --accent2:#6dd3a8;
      --danger:#ff6b6b;
      --road:#59646f;
      --roadLine:#f6d85f;
      --gap:#dce7f4;
      --shadow:0 8px 24px rgba(19,40,72,.12);
      --radius:18px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#dff1ff 0%,#edf6ff 42%,#f7fbff 100%);color:var(--text);}
    body{display:flex;justify-content:center;align-items:stretch;overflow:hidden;}
    .app{width:100%;max-width:430px;height:100dvh;position:relative;overflow:hidden;margin:0 auto;background:linear-gradient(180deg,#d5ecff 0%,#edf6ff 45%,#f8fbff 100%);}
    .hud{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:6;gap:10px;}
    .pill{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);box-shadow:var(--shadow);border-radius:999px;padding:10px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .game-area{position:absolute;inset:0;}
    .sky{position:absolute;inset:0;background:
      radial-gradient(circle at 15% 16%, rgba(255,255,255,.9) 0 34px, transparent 35px),
      radial-gradient(circle at 22% 14%, rgba(255,255,255,.88) 0 26px, transparent 27px),
      radial-gradient(circle at 73% 20%, rgba(255,255,255,.82) 0 30px, transparent 31px),
      radial-gradient(circle at 80% 18%, rgba(255,255,255,.82) 0 22px, transparent 23px),
      linear-gradient(180deg,#bfe8ff 0%,#edf7ff 58%,#f8fbff 100%);
      z-index:0;
    }
    .ground{position:absolute;left:-5%;right:-5%;bottom:-80px;height:38%;background:linear-gradient(180deg,#8fd386 0%,#71c36f 60%,#64b563 100%);border-radius:50% 50% 0 0/100% 100% 0 0;z-index:0;}
    .road-wrap{position:absolute;inset:0;z-index:1;}
    svg{width:100%;height:100%;display:block;}
    .car{position:absolute;width:56px;height:34px;z-index:4;transform:translate(-50%,-50%);transition:left .85s linear, top .85s linear, transform .85s linear;}
    .car svg{overflow:visible;filter:drop-shadow(0 3px 5px rgba(0,0,0,.18));}
    .bridge-zone{position:absolute;left:50%;top:51%;transform:translate(-50%,-50%);width:270px;height:180px;z-index:9;display:none;pointer-events:none;}
    .bridge-zone.active{display:block;pointer-events:auto;}
    .bridge-piece{position:absolute;left:110px;top:60px;width:130px;height:24px;border-radius:20px;background:var(--road);box-shadow:0 4px 14px rgba(0,0,0,.18);touch-action:none;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.45);}
    .bridge-piece::before{content:"";position:absolute;left:10px;right:10px;top:50%;height:3px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,var(--roadLine) 0 16px, transparent 16px 24px);opacity:.85;}
    .target-dot{position:absolute;width:18px;height:18px;background:#fff;border:3px solid var(--accent);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .target-label{position:absolute;transform:translate(-50%, 18px);font-size:12px;font-weight:700;color:var(--sub);}
    .panel{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-radius:24px;padding:14px 14px 16px;box-shadow:var(--shadow);z-index:7;}
    .panel.hidden{display:none;}
    .panel.repair-mode{padding:12px 14px;z-index:3;pointer-events:none;}
    .panel.repair-mode .quiz-card,.panel.repair-mode .options{display:none;}
    .panel.repair-mode .quiz-head{margin-bottom:0;}
    .panel.repair-mode .title{font-size:16px;}
    .panel.repair-mode .subtitle{font-size:13px;}
    .panel.repair-mode .feedback{margin-top:8px;min-height:auto;}
    .quiz-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;}
    .title{font-size:18px;font-weight:800;}
    .subtitle{font-size:13px;color:var(--sub);line-height:1.4;}
    .quiz-card{display:flex;gap:12px;align-items:center;background:#f7fbff;border-radius:20px;padding:12px;margin-bottom:12px;border:1px solid #e1edfb;}
    .pic{width:90px;height:90px;background:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px #e9eef7;overflow:hidden;flex:0 0 auto;}
    .word-box{flex:1;min-width:0;}
    .word-cn{font-size:14px;color:var(--sub);margin-bottom:8px;}
    .word-mask{font-size:32px;font-weight:900;letter-spacing:2px;word-break:break-word;}
    .options{display:grid;grid-template-columns:1fr;gap:10px;}
    .option-btn{border:none;border-radius:16px;padding:13px 14px;font-size:17px;font-weight:800;background:#edf4ff;color:#1d3557;box-shadow:none;}
    .option-btn:active{transform:scale(.99);}
    .option-btn.correct{background:#ddf7ec;color:#145c42;}
    .option-btn.wrong{background:#ffe4e4;color:#8c1f1f;}
    .feedback{min-height:24px;margin-top:10px;font-size:14px;font-weight:700;}
    .feedback.ok{color:#128058;}
    .feedback.bad{color:#cf3a3a;}
    .overlay{position:absolute;inset:0;background:rgba(17,28,43,.42);z-index:10;display:flex;align-items:center;justify-content:center;padding:18px;}
    .overlay.hidden{display:none;}
    .dialog{background:#fff;width:100%;border-radius:24px;padding:24px 18px;box-shadow:var(--shadow);text-align:center;}
    .dialog h2{margin:0 0 10px;font-size:26px;}
    .dialog p{margin:0 0 16px;color:var(--sub);line-height:1.6;}
    .btn{border:none;border-radius:16px;padding:14px 18px;font-size:17px;font-weight:800;background:var(--accent);color:#fff;width:100%;}
    .btn.secondary{margin-top:10px;background:#eef4ff;color:#1b3355;}
    .small-note{font-size:12px;color:var(--sub);margin-top:10px;line-height:1.5;}
    .mini{font-size:13px;color:var(--sub);}
  </style>
</head>
<body>
<div class="app">
  <div class="game-area">
    <div class="sky"></div>
    <div class="ground"></div>

    <div class="hud">
      <div class="pill"><span>🚗</span><span id="stageInfo">第 1 / 21 关</span></div>
      <div class="pill"><span>❌</span><span id="lifeInfo">答错 0 / 3</span></div>
    </div>

    <div class="road-wrap">
      <svg viewBox="0 0 430 932" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.18"/></filter>
        </defs>
        <g filter="url(#shadow)">
          <path d="M215 820 L215 610" stroke="#59646f" stroke-width="54" stroke-linecap="round" fill="none"/>
          <path d="M215 820 L215 610" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

          <path d="M120 370 L40 230" stroke="#59646f" stroke-width="54" stroke-linecap="round" fill="none"/>
          <path d="M120 370 L40 230" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

          <path d="M215 370 L215 210" stroke="#59646f" stroke-width="54" stroke-linecap="round" fill="none"/>
          <path d="M215 370 L215 210" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

          <path d="M310 370 L390 230" stroke="#59646f" stroke-width="54" stroke-linecap="round" fill="none"/>
          <path d="M310 370 L390 230" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>
        </g>

        <rect x="92" y="357" width="246" height="26" rx="13" fill="#dbe8f5"/>
      </svg>
    </div>

    <div class="car" id="car">
      <svg viewBox="0 0 120 72" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="80" height="28" rx="12" fill="#ff6666"/>
        <path d="M36 20 L52 8 H79 C88 8 96 14 100 20Z" fill="#ff8787"/>
        <rect x="52" y="12" width="20" height="12" rx="4" fill="#d9f2ff"/>
        <circle cx="38" cy="54" r="11" fill="#293241"/>
        <circle cx="83" cy="54" r="11" fill="#293241"/>
        <circle cx="38" cy="54" r="5" fill="#adb5bd"/>
        <circle cx="83" cy="54" r="5" fill="#adb5bd"/>
        <circle cx="101" cy="31" r="4" fill="#ffd166"/>
      </svg>
    </div>

    <div class="bridge-zone" id="bridgeZone">
      <div class="target-dot" style="left:22px; top:18px"></div>
      <div class="target-label" style="left:31px; top:40px">左路</div>
      <div class="target-dot" style="left:126px; top:2px"></div>
      <div class="target-label" style="left:135px; top:24px">中路</div>
      <div class="target-dot" style="left:228px; top:18px"></div>
      <div class="target-label" style="left:237px; top:40px">右路</div>
      <div class="bridge-piece" id="bridgePiece"></div>
    </div>

    <div class="panel" id="quizPanel">
      <div class="quiz-head">
        <div>
          <div class="title">补全单词，修好前方的路</div>
          <div class="subtitle" id="instructionText">先从下方选出正确字母，答对后才能拖拽道路。</div>
        </div>
        <div class="mini" id="statusMini">等待作答</div>
      </div>
      <div class="quiz-card">
        <div class="pic" id="picBox"></div>
        <div class="word-box">
          <div class="word-cn" id="cnHint"></div>
          <div class="word-mask" id="wordMask"></div>
        </div>
      </div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="overlay" id="startOverlay">
      <div class="dialog">
        <h2>单词修路小车</h2>
        <p>小车开到岔路口时，前方会断路。你需要先做对单词补全题，才能把前方道路拖到你想去的那条路上。</p>
        <button class="btn" id="startBtn">开始游戏</button>
        <div class="small-note">规则：共 21 个单词关卡，累计答错 3 次游戏结束。答对后，直接用手指拖动前方路段，吸附到左路 / 中路 / 右路之一，小车会继续前进。</div>
      </div>
    </div>

    <div class="overlay hidden" id="endOverlay">
      <div class="dialog">
        <h2 id="endTitle">游戏结束</h2>
        <p id="endDesc"></p>
        <button class="btn" id="restartBtn">再玩一次</button>
        <button class="btn secondary" id="closeBtn">停留在结果页</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const roadTargets = {
    left: { x: 31, y: 27 },
    center: { x: 135, y: 11 },
    right: { x: 237, y: 27 }
  };

  const questions = [
    {
      key: 'apple',
      zh: '图片提示：苹果',
      word: 'APPLE',
      mask: 'A__LE',
      answer: 'PP',
      options: ['PP', 'PL', 'AP'],
      image: svgApple()
    },
    {
      key: 'cat',
      zh: '图片提示：猫',
      word: 'CAT',
      mask: 'C_T',
      answer: 'A',
      options: ['O', 'A', 'U'],
      image: svgCat()
    },
    {
      key: 'book',
      zh: '图片提示：书',
      word: 'BOOK',
      mask: 'BO_K',
      answer: 'O',
      options: ['A', 'E', 'O'],
      image: svgBook()
    },
    {
      key: 'fish',
      zh: '图片提示：鱼',
      word: 'FISH',
      mask: 'FI_H',
      answer: 'S',
      options: ['S', 'T', 'R'],
      image: svgFish()
    },
    {
      key: 'sun',
      zh: '图片提示：太阳',
      word: 'SUN',
      mask: 'S_N',
      answer: 'U',
      options: ['E', 'A', 'U'],
      image: svgSun()
    },
    {
      key: 'train',
      zh: '图片提示：火车',
      word: 'TRAIN',
      mask: 'TRA__',
      answer: 'IN',
      options: ['AN', 'IN', 'EN'],
      image: svgTrain()
    },
    {
      key: 'bread',
      zh: '图片提示：面包',
      word: 'BREAD',
      mask: 'BR__D',
      answer: 'EA',
      options: ['EA', 'OO', 'IE'],
      image: svgBread()
    },
    {
      key: 'dog',
      zh: '图片提示：狗',
      word: 'DOG',
      mask: 'D_G',
      answer: 'O',
      options: ['A', 'O', 'U'],
      image: emojiCard('🐶', '#fff8f3')
    },
    {
      key: 'moon',
      zh: '图片提示：月亮',
      word: 'MOON',
      mask: 'MO_N',
      answer: 'O',
      options: ['A', 'E', 'O'],
      image: emojiCard('🌙', '#f4f6ff')
    },
    {
      key: 'star',
      zh: '图片提示：星星',
      word: 'STAR',
      mask: 'ST_R',
      answer: 'A',
      options: ['A', 'O', 'E'],
      image: emojiCard('⭐', '#fffaf0')
    },
    {
      key: 'cake',
      zh: '图片提示：蛋糕',
      word: 'CAKE',
      mask: 'CA_E',
      answer: 'K',
      options: ['T', 'P', 'K'],
      image: emojiCard('🍰', '#fff7fb')
    },
    {
      key: 'milk',
      zh: '图片提示：牛奶',
      word: 'MILK',
      mask: 'MI_K',
      answer: 'L',
      options: ['R', 'L', 'N'],
      image: emojiCard('🥛', '#f6fbff')
    },
    {
      key: 'bird',
      zh: '图片提示：小鸟',
      word: 'BIRD',
      mask: 'BI_D',
      answer: 'R',
      options: ['N', 'R', 'L'],
      image: emojiCard('🐦', '#f3fbff')
    },
    {
      key: 'tree',
      zh: '图片提示：树',
      word: 'TREE',
      mask: 'TR_E',
      answer: 'E',
      options: ['A', 'E', 'I'],
      image: emojiCard('🌳', '#f4fff2')
    },
    {
      key: 'duck',
      zh: '图片提示：鸭子',
      word: 'DUCK',
      mask: 'DU_K',
      answer: 'C',
      options: ['G', 'C', 'R'],
      image: emojiCard('🦆', '#f9fbff')
    },
    {
      key: 'shoe',
      zh: '图片提示：鞋子',
      word: 'SHOE',
      mask: 'SH_E',
      answer: 'O',
      options: ['A', 'O', 'U'],
      image: emojiCard('👟', '#f7faff')
    },
    {
      key: 'bus',
      zh: '图片提示：公交车',
      word: 'BUS',
      mask: 'B_S',
      answer: 'U',
      options: ['U', 'A', 'O'],
      image: emojiCard('🚌', '#f8fbff')
    },
    {
      key: 'frog',
      zh: '图片提示：青蛙',
      word: 'FROG',
      mask: 'FR_G',
      answer: 'O',
      options: ['A', 'E', 'O'],
      image: emojiCard('🐸', '#f3fff4')
    },
    {
      key: 'kite',
      zh: '图片提示：风筝',
      word: 'KITE',
      mask: 'KI_E',
      answer: 'T',
      options: ['T', 'D', 'P'],
      image: emojiCard('🪁', '#f6fbff')
    },
    {
      key: 'pear',
      zh: '图片提示：梨',
      word: 'PEAR',
      mask: 'PE_R',
      answer: 'A',
      options: ['O', 'A', 'U'],
      image: emojiCard('🍐', '#f8fff2')
    },
    {
      key: 'plane',
      zh: '图片提示：飞机',
      word: 'PLANE',
      mask: 'PL_NE',
      answer: 'A',
      options: ['A', 'O', 'U'],
      image: emojiCard('✈️', '#f4f9ff')
    }
  ];

  const els = {
    car: document.getElementById('car'),
    bridgeZone: document.getElementById('bridgeZone'),
    bridgePiece: document.getElementById('bridgePiece'),
    quizPanel: document.getElementById('quizPanel'),
    picBox: document.getElementById('picBox'),
    cnHint: document.getElementById('cnHint'),
    wordMask: document.getElementById('wordMask'),
    options: document.getElementById('options'),
    feedback: document.getElementById('feedback'),
    stageInfo: document.getElementById('stageInfo'),
    lifeInfo: document.getElementById('lifeInfo'),
    instructionText: document.getElementById('instructionText'),
    statusMini: document.getElementById('statusMini'),
    startOverlay: document.getElementById('startOverlay'),
    endOverlay: document.getElementById('endOverlay'),
    endTitle: document.getElementById('endTitle'),
    endDesc: document.getElementById('endDesc'),
    startBtn: document.getElementById('startBtn'),
    restartBtn: document.getElementById('restartBtn'),
    closeBtn: document.getElementById('closeBtn')
  };

  let state = {};

  function initState() {
    state = {
      stage: 0,
      wrong: 0,
      solved: false,
      draggingEnabled: false,
      currentQuestion: null,
      questionOrder: shuffle([...questions]),
      activeMoveTimeout: null,
      answeredThisStage: false
    };
    setCar(215, 730, 0);
    resetBridge();
    updateHUD();
    els.quizPanel.classList.remove('repair-mode');
    els.feedback.textContent = '';
    els.feedback.className = 'feedback';
    els.statusMini.textContent = '等待作答';
    els.instructionText.textContent = '先从下方选出正确字母，答对后才能拖拽道路。';
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function setCar(x, y, angle) {
    els.car.style.left = `${x}px`;
    els.car.style.top = `${y}px`;
    els.car.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
  }

  function updateHUD() {
    els.stageInfo.textContent = `第 ${Math.min(state.stage + 1, questions.length)} / ${questions.length} 关`;
    els.lifeInfo.textContent = `答错 ${state.wrong} / 3`;
  }

  function resetBridge() {
    els.bridgeZone.classList.remove('active');
    els.quizPanel.classList.remove('repair-mode');
    els.bridgePiece.style.left = '110px';
    els.bridgePiece.style.top = '60px';
  }

  function loadStage() {
    if (state.wrong >= 3) {
      return endGame(false);
    }
    if (state.stage >= questions.length) {
      return endGame(true);
    }
    state.solved = false;
    state.draggingEnabled = false;
    state.answeredThisStage = false;
    resetBridge();
    const q = state.questionOrder[state.stage % state.questionOrder.length];
    state.currentQuestion = q;
    els.picBox.innerHTML = q.image;
    els.cnHint.textContent = q.zh;
    els.wordMask.textContent = q.mask;
    els.options.innerHTML = '';
    els.quizPanel.classList.remove('repair-mode');
    els.quizPanel.classList.remove('repair-mode');
    els.feedback.textContent = '';
    els.feedback.className = 'feedback';
    els.statusMini.textContent = '等待作答';
    els.instructionText.textContent = '选对后，拖动前方路段到你想走的那条路上。';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => checkAnswer(opt, btn));
      els.options.appendChild(btn);
    });
    updateHUD();
  }

  function checkAnswer(opt, btn) {
    if (state.answeredThisStage || state.draggingEnabled) return;
    state.answeredThisStage = true;
    const q = state.currentQuestion;
    const buttons = [...els.options.querySelectorAll('.option-btn')];
    buttons.forEach(b => b.disabled = true);

    if (opt === q.answer) {
      btn.classList.add('correct');
      state.solved = true;
      state.draggingEnabled = true;
      els.feedback.textContent = `答对了！完整单词：${q.word}`;
      els.feedback.className = 'feedback ok';
      els.statusMini.textContent = '可以修路';
      els.instructionText.textContent = '请直接拖动前方灰色路段，搭到左路 / 中路 / 右路。';
      els.quizPanel.classList.add('repair-mode');
      els.bridgeZone.classList.add('active');
    } else {
      btn.classList.add('wrong');
      const correctBtn = buttons.find(b => b.textContent === q.answer);
      if (correctBtn) correctBtn.classList.add('correct');
      els.quizPanel.classList.remove('repair-mode');
      state.wrong += 1;
      updateHUD();
      els.feedback.textContent = `答错了，正确答案是：${q.answer}（${q.word}）`;
      els.feedback.className = 'feedback bad';
      els.statusMini.textContent = '本题跳过';
      if (state.wrong >= 3) {
        setTimeout(() => endGame(false), 1200);
      } else {
        setTimeout(() => {
          state.stage += 1;
          loadStage();
        }, 1200);
      }
    }
  }

  function snapBridge(targetName) {
    const t = roadTargets[targetName];
    els.bridgePiece.style.left = `${t.x}px`;
    els.bridgePiece.style.top = `${t.y}px`;
    els.bridgeZone.classList.remove('active');
    els.quizPanel.classList.remove('repair-mode');
    els.statusMini.textContent = `已接到${targetName === 'left' ? '左路' : targetName === 'center' ? '中路' : '右路'}`;
    animateCar(targetName);
  }

  function animateCar(targetName) {
    const targetMap = {
      left: { x: 58, y: 262, angle: -58 },
      center: { x: 215, y: 244, angle: 0 },
      right: { x: 372, y: 262, angle: 58 }
    };
    const target = targetMap[targetName];
    setCar(215, 730, 0);
    clearTimeout(state.activeMoveTimeout);
    setTimeout(() => setCar(215, 515, 0), 60);
    state.activeMoveTimeout = setTimeout(() => {
      setCar(target.x, target.y, target.angle);
    }, 900);
    state.activeMoveTimeout = setTimeout(() => {
      state.stage += 1;
      setCar(215, 730, 0);
      loadStage();
    }, 1850);
  }

  function endGame(success) {
    els.endOverlay.classList.remove('hidden');
    if (success) {
      els.endTitle.textContent = '闯关成功';
      els.endDesc.textContent = `太棒了！你帮小车修完了所有道路，累计答错 ${state.wrong} 次。`;
    } else {
      els.endTitle.textContent = '游戏结束';
      els.endDesc.textContent = `累计答错 3 次，小车没法继续前进了。可以重新开始。`;
    }
  }

  function startGame() {
    initState();
    els.endOverlay.classList.add('hidden');
    els.startOverlay.classList.add('hidden');
    loadStage();
  }

  function setupDrag() {
    const piece = els.bridgePiece;
    const zone = els.bridgeZone;
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function getPoint(e) {
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX, y: p.clientY };
    }

    function onDown(e) {
      if (!state.draggingEnabled) return;
      dragging = true;
      const rect = piece.getBoundingClientRect();
      const p = getPoint(e);
      offsetX = p.x - rect.left;
      offsetY = p.y - rect.top;
      e.preventDefault();
    }

    function onMove(e) {
      if (!dragging || !state.draggingEnabled) return;
      const zoneRect = zone.getBoundingClientRect();
      const p = getPoint(e);
      let left = p.x - zoneRect.left - offsetX;
      let top = p.y - zoneRect.top - offsetY;
      left = Math.max(0, Math.min(zoneRect.width - piece.offsetWidth, left));
      top = Math.max(0, Math.min(zoneRect.height - piece.offsetHeight, top));
      piece.style.left = `${left}px`;
      piece.style.top = `${top}px`;
      e.preventDefault();
    }

    function onUp() {
      if (!dragging) return;
      dragging = false;
      if (!state.draggingEnabled) return;
      const pieceRect = piece.getBoundingClientRect();
      const centerX = pieceRect.left + pieceRect.width / 2;
      const centerY = pieceRect.top + pieceRect.height / 2;
      const zoneRect = zone.getBoundingClientRect();
      const candidates = Object.entries(roadTargets).map(([name, pos]) => {
        const tx = zoneRect.left + pos.x + 9;
        const ty = zoneRect.top + pos.y + 9;
        const d = Math.hypot(centerX - tx, centerY - ty);
        return { name, d };
      }).sort((a,b) => a.d - b.d);

      if (candidates[0].d < 95) {
        state.draggingEnabled = false;
        snapBridge(candidates[0].name);
      } else {
        piece.style.left = '110px';
        piece.style.top = '60px';
      }
    }

    piece.addEventListener('pointerdown', onDown);
    window.addEventListener('pointermove', onMove, { passive:false });
    window.addEventListener('pointerup', onUp);
  }

  els.startBtn.addEventListener('click', startGame);
  els.restartBtn.addEventListener('click', startGame);
  els.closeBtn.addEventListener('click', () => els.endOverlay.classList.add('hidden'));
  setupDrag();
  initState();
