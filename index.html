<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>单词修路小车</title>
  <style>
    :root{
      --bg1:#d8efff;
      --bg2:#eef7ff;
      --panel:#ffffffee;
      --text:#1d2a3a;
      --sub:#5d6d83;
      --accent:#4b8bff;
      --ok:#15a06b;
      --bad:#d84a4a;
      --road:#5b6570;
      --roadLine:#f6d85f;
      --gap:#dce7f4;
      --shadow:0 10px 24px rgba(19,40,72,.12);
      --radius:18px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 45%,#f8fbff 100%);color:var(--text);}
    body{display:flex;justify-content:center;overflow:hidden;}
    .app{width:100%;max-width:430px;height:100dvh;position:relative;overflow:hidden;background:linear-gradient(180deg,#cfeaff 0%,#edf7ff 55%,#f8fbff 100%);}
    .sky{position:absolute;inset:0;background:
      radial-gradient(circle at 15% 12%, rgba(255,255,255,.9) 0 34px, transparent 35px),
      radial-gradient(circle at 24% 10%, rgba(255,255,255,.9) 0 24px, transparent 25px),
      radial-gradient(circle at 76% 18%, rgba(255,255,255,.85) 0 30px, transparent 31px),
      radial-gradient(circle at 84% 16%, rgba(255,255,255,.83) 0 24px, transparent 25px),
      linear-gradient(180deg,#bce6ff 0%, #edf8ff 58%, #f8fbff 100%);
    }
    .ground{position:absolute;left:-10%;right:-10%;bottom:-78px;height:34%;background:linear-gradient(180deg,#8fd384 0%,#72c76d 62%,#62b95f 100%);border-radius:50% 50% 0 0/100% 100% 0 0;}
    .hud{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:12px;right:12px;z-index:20;display:flex;justify-content:space-between;gap:10px;}
    .pill{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);box-shadow:var(--shadow);border-radius:999px;padding:10px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .scene{position:absolute;inset:0;z-index:1;}
    .scene svg{width:100%;height:100%;display:block;}
    .bridge-zone{position:absolute;left:0;right:0;top:360px;height:250px;z-index:14;pointer-events:none;}
    .bridge-zone.active{pointer-events:auto;}
    .lane-target{position:absolute;top:0;width:70px;height:170px;transform:translateX(-50%);display:flex;justify-content:center;align-items:flex-start;pointer-events:none;}
    .lane-glow{position:absolute;top:10px;width:54px;height:150px;border-radius:28px;border:2px dashed rgba(75,139,255,.45);background:rgba(75,139,255,.06);}
    .lane-name{position:absolute;top:168px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:var(--sub);white-space:nowrap;background:rgba(255,255,255,.75);padding:2px 6px;border-radius:999px;}
    .bridge-piece{position:absolute;top:36px;left:191px;width:48px;height:156px;border-radius:28px;background:var(--road);border:2px solid rgba(255,255,255,.45);box-shadow:0 6px 16px rgba(0,0,0,.18);touch-action:none;display:flex;justify-content:center;pointer-events:auto;transition:box-shadow .2s ease, transform .2s ease;}
    .bridge-piece::before{content:"";position:absolute;top:12px;bottom:12px;left:50%;width:4px;transform:translateX(-50%);background:repeating-linear-gradient(180deg,var(--roadLine) 0 16px, transparent 16px 24px);border-radius:999px;opacity:.92;}
    .bridge-piece.active{box-shadow:0 12px 24px rgba(75,139,255,.28);transform:scale(1.02);}
    .bridge-piece.locked{pointer-events:none;}
    .cars-layer{position:absolute;inset:0;z-index:12;pointer-events:none;}
    .car{position:absolute;width:42px;height:74px;transform:translate(-50%,-50%) rotate(0deg);filter:drop-shadow(0 5px 6px rgba(0,0,0,.18));opacity:0;}
    .car.visible{opacity:1;}
    .car svg{width:100%;height:100%;display:block;overflow:visible;}
    .panel{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);background:var(--panel);backdrop-filter:blur(10px);border-radius:24px;padding:14px 14px 16px;box-shadow:var(--shadow);z-index:16;}
    .panel.repair-mode{z-index:9;pointer-events:none;padding:12px 14px;}
    .panel.repair-mode .quiz-card,.panel.repair-mode .options{display:none;}
    .panel.repair-mode .quiz-head{margin-bottom:0;}
    .quiz-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px;}
    .title{font-size:18px;font-weight:800;}
    .subtitle{font-size:13px;color:var(--sub);line-height:1.45;}
    .mini{font-size:13px;color:var(--sub);}
    .quiz-card{display:flex;gap:12px;align-items:center;background:#f7fbff;border-radius:20px;padding:12px;margin-bottom:12px;border:1px solid #e1edfb;}
    .pic{width:90px;height:90px;background:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px #e9eef7;overflow:hidden;flex:0 0 auto;}
    .word-box{flex:1;min-width:0;}
    .word-cn{font-size:14px;color:var(--sub);margin-bottom:8px;}
    .word-mask{font-size:32px;font-weight:900;letter-spacing:2px;word-break:break-word;}
    .options{display:grid;grid-template-columns:1fr;gap:10px;}
    .option-btn{border:none;border-radius:16px;padding:13px 14px;font-size:17px;font-weight:800;background:#edf4ff;color:#1d3557;}
    .option-btn:active{transform:scale(.99);}
    .option-btn.correct{background:#ddf7ec;color:#145c42;}
    .option-btn.wrong{background:#ffe4e4;color:#8c1f1f;}
    .feedback{min-height:24px;margin-top:10px;font-size:14px;font-weight:700;}
    .feedback.ok{color:var(--ok);}
    .feedback.bad{color:var(--bad);}
    .overlay{position:absolute;inset:0;background:rgba(17,28,43,.42);z-index:25;display:flex;align-items:center;justify-content:center;padding:18px;}
    .overlay.hidden{display:none;}
    .dialog{background:#fff;width:100%;border-radius:24px;padding:24px 18px;box-shadow:var(--shadow);text-align:center;}
    .dialog h2{margin:0 0 10px;font-size:26px;}
    .dialog p{margin:0 0 16px;color:var(--sub);line-height:1.6;}
    .btn{border:none;border-radius:16px;padding:14px 18px;font-size:17px;font-weight:800;background:var(--accent);color:#fff;width:100%;}
    .btn.secondary{margin-top:10px;background:#eef4ff;color:#1b3355;}
    .small-note{font-size:12px;color:var(--sub);margin-top:10px;line-height:1.5;}
    .hint-float{position:absolute;left:50%;top:336px;transform:translateX(-50%);z-index:15;background:rgba(255,255,255,.9);color:#18467f;border:1px solid rgba(75,139,255,.18);box-shadow:var(--shadow);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;}
    .hint-float.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  </style>
</head>
<body>
<div class="app">
  <div class="sky"></div>
  <div class="ground"></div>

  <div class="hud">
    <div class="pill"><span>🚗</span><span id="stageInfo">第 1 / 21 关</span></div>
    <div class="pill"><span>❌</span><span id="lifeInfo">答错 0 / 3</span></div>
  </div>

  <div class="scene">
    <svg viewBox="0 0 430 932" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.18"/></filter>
      </defs>
      <g filter="url(#shadow)">
        <path d="M215 980 L215 650" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M215 980 L215 650" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

        <path d="M215 650 Q170 610 96 560" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M215 650 Q170 610 96 560" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

        <path d="M215 650 L215 560" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M215 650 L215 560" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

        <path d="M215 650 Q260 610 334 560" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M215 650 Q260 610 334 560" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

        <path d="M96 410 Q96 170 28 -90" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M96 410 Q96 170 28 -90" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

        <path d="M215 410 L215 -90" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M215 410 L215 -90" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>

        <path d="M334 410 Q334 170 402 -90" stroke="#59646f" stroke-width="56" stroke-linecap="round" fill="none"/>
        <path d="M334 410 Q334 170 402 -90" stroke="#f6d85f" stroke-width="6" stroke-dasharray="18 18" stroke-linecap="round" fill="none"/>
      </g>

      <rect x="68" y="408" width="56" height="156" rx="28" fill="#dce7f4"/>
      <rect x="187" y="408" width="56" height="156" rx="28" fill="#dce7f4"/>
      <rect x="306" y="408" width="56" height="156" rx="28" fill="#dce7f4"/>
    </svg>
  </div>

  <div class="hint-float" id="dragHint">答对了，拖动竖直路段到想去的那条路上</div>

  <div class="bridge-zone" id="bridgeZone">
    <div class="lane-target" style="left:96px;">
      <div class="lane-glow"></div>
      <div class="lane-name">左路</div>
    </div>
    <div class="lane-target" style="left:215px;">
      <div class="lane-glow"></div>
      <div class="lane-name">中路</div>
    </div>
    <div class="lane-target" style="left:334px;">
      <div class="lane-glow"></div>
      <div class="lane-name">右路</div>
    </div>
    <div class="bridge-piece" id="bridgePiece"></div>
  </div>

  <div class="cars-layer">
    <div class="car visible" id="carA" style="--carBody:#ff6b6b;--carBody2:#ff9696;--carGlass:#dff4ff;--carLine:#c43d3d"></div>
    <div class="car" id="carB" style="--carBody:#4f8bff;--carBody2:#79a8ff;--carGlass:#dff4ff;--carLine:#2f5fd6"></div>
  </div>

  <div class="panel" id="quizPanel">
    <div class="quiz-head">
      <div>
        <div class="title">补全单词，修好前方的路</div>
        <div class="subtitle" id="instructionText">先从下方选出正确字母，答对后才能拖拽竖直路段。</div>
      </div>
      <div class="mini" id="statusMini">等待作答</div>
    </div>
    <div class="quiz-card">
      <div class="pic" id="picBox"></div>
      <div class="word-box">
        <div class="word-cn" id="cnHint"></div>
        <div class="word-mask" id="wordMask"></div>
      </div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="dialog">
      <h2>单词修路小车</h2>
      <p>小车开到岔路口时，前方会有断开的竖直路段。你需要先做对单词补全题，再把路段拖到左路、中路或右路之一。</p>
      <button class="btn" id="startBtn">开始游戏</button>
      <div class="small-note">规则：共 21 个单词关卡，累计答错 3 次游戏结束。答对后，拖动中间的竖直路段补到目标路径，小车会从道路正中间开走。上一辆开走后，下一辆会从下方开上来。</div>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="dialog">
      <h2 id="endTitle">游戏结束</h2>
      <p id="endDesc"></p>
      <button class="btn" id="restartBtn">再玩一次</button>
      <button class="btn secondary" id="closeBtn">停留在结果页</button>
    </div>
  </div>
</div>

<script>
(() => {
  const slots = {
    left: { x: 96, y: 48 },
    center: { x: 215, y: 48 },
    right: { x: 334, y: 48 }
  };
  const startPos = { x: 215, y: 820 };
  const hiddenPos = { x: 215, y: 1030 };
  const fork = { x: 215, y: 650 };
  const lowerGap = {
    left: { x: 96, y: 560 },
    center: { x: 215, y: 560 },
    right: { x: 334, y: 560 }
  };
  const upperGap = {
    left: { x: 96, y: 410 },
    center: { x: 215, y: 410 },
    right: { x: 334, y: 410 }
  };
  const exits = {
    left: { x: 28, y: -90 },
    center: { x: 215, y: -90 },
    right: { x: 402, y: -90 }
  };

  const questions = [
    { key: 'apple', zh: '图片提示：苹果', word: 'APPLE', mask: 'A__LE', answer: 'PP', options: ['PP', 'PL', 'AP'], image: svgApple() },
    { key: 'cat', zh: '图片提示：猫', word: 'CAT', mask: 'C_T', answer: 'A', options: ['O', 'A', 'U'], image: svgCat() },
    { key: 'book', zh: '图片提示：书', word: 'BOOK', mask: 'BO_K', answer: 'O', options: ['A', 'E', 'O'], image: svgBook() },
    { key: 'fish', zh: '图片提示：鱼', word: 'FISH', mask: 'FI_H', answer: 'S', options: ['S', 'T', 'R'], image: svgFish() },
    { key: 'sun', zh: '图片提示：太阳', word: 'SUN', mask: 'S_N', answer: 'U', options: ['E', 'A', 'U'], image: svgSun() },
    { key: 'train', zh: '图片提示：火车', word: 'TRAIN', mask: 'TRA__', answer: 'IN', options: ['AN', 'IN', 'EN'], image: svgTrain() },
    { key: 'bread', zh: '图片提示：面包', word: 'BREAD', mask: 'BR__D', answer: 'EA', options: ['EA', 'OO', 'IE'], image: svgBread() },
    { key: 'dog', zh: '图片提示：狗', word: 'DOG', mask: 'D_G', answer: 'O', options: ['A', 'O', 'U'], image: emojiCard('🐶', '#fff8f3') },
    { key: 'moon', zh: '图片提示：月亮', word: 'MOON', mask: 'MO_N', answer: 'O', options: ['A', 'E', 'O'], image: emojiCard('🌙', '#f4f6ff') },
    { key: 'star', zh: '图片提示：星星', word: 'STAR', mask: 'ST_R', answer: 'A', options: ['A', 'O', 'E'], image: emojiCard('⭐', '#fffaf0') },
    { key: 'cake', zh: '图片提示：蛋糕', word: 'CAKE', mask: 'CA_E', answer: 'K', options: ['T', 'P', 'K'], image: emojiCard('🍰', '#fff7fb') },
    { key: 'milk', zh: '图片提示：牛奶', word: 'MILK', mask: 'MI_K', answer: 'L', options: ['R', 'L', 'N'], image: emojiCard('🥛', '#f6fbff') },
    { key: 'bird', zh: '图片提示：小鸟', word: 'BIRD', mask: 'BI_D', answer: 'R', options: ['N', 'R', 'L'], image: emojiCard('🐦', '#f3fbff') },
    { key: 'tree', zh: '图片提示：树', word: 'TREE', mask: 'TR_E', answer: 'E', options: ['A', 'E', 'I'], image: emojiCard('🌳', '#f4fff2') },
    { key: 'duck', zh: '图片提示：鸭子', word: 'DUCK', mask: 'DU_K', answer: 'C', options: ['G', 'C', 'R'], image: emojiCard('🦆', '#f9fbff') },
    { key: 'shoe', zh: '图片提示：鞋子', word: 'SHOE', mask: 'SH_E', answer: 'O', options: ['A', 'O', 'U'], image: emojiCard('👟', '#f7faff') },
    { key: 'bus', zh: '图片提示：公交车', word: 'BUS', mask: 'B_S', answer: 'U', options: ['U', 'A', 'O'], image: emojiCard('🚌', '#f8fbff') },
    { key: 'frog', zh: '图片提示：青蛙', word: 'FROG', mask: 'FR_G', answer: 'O', options: ['A', 'E', 'O'], image: emojiCard('🐸', '#f3fff4') },
    { key: 'kite', zh: '图片提示：风筝', word: 'KITE', mask: 'KI_E', answer: 'T', options: ['T', 'D', 'P'], image: emojiCard('🪁', '#f6fbff') },
    { key: 'pear', zh: '图片提示：梨', word: 'PEAR', mask: 'PE_R', answer: 'A', options: ['O', 'A', 'U'], image: emojiCard('🍐', '#f8fff2') },
    { key: 'plane', zh: '图片提示：飞机', word: 'PLANE', mask: 'PL_NE', answer: 'A', options: ['A', 'O', 'U'], image: emojiCard('✈️', '#f4f9ff') }
  ];

  const els = {
    stageInfo: document.getElementById('stageInfo'),
    lifeInfo: document.getElementById('lifeInfo'),
    bridgeZone: document.getElementById('bridgeZone'),
    bridgePiece: document.getElementById('bridgePiece'),
    dragHint: document.getElementById('dragHint'),
    quizPanel: document.getElementById('quizPanel'),
    picBox: document.getElementById('picBox'),
    cnHint: document.getElementById('cnHint'),
    wordMask: document.getElementById('wordMask'),
    options: document.getElementById('options'),
    feedback: document.getElementById('feedback'),
    instructionText: document.getElementById('instructionText'),
    statusMini: document.getElementById('statusMini'),
    startOverlay: document.getElementById('startOverlay'),
    endOverlay: document.getElementById('endOverlay'),
    endTitle: document.getElementById('endTitle'),
    endDesc: document.getElementById('endDesc'),
    startBtn: document.getElementById('startBtn'),
    restartBtn: document.getElementById('restartBtn'),
    closeBtn: document.getElementById('closeBtn'),
    carA: document.getElementById('carA'),
    carB: document.getElementById('carB')
  };

  els.carA.innerHTML = carSvg();
  els.carB.innerHTML = carSvg();

  let state = {};

  function initState() {
    state = {
      stage: 0,
      wrong: 0,
      solved: false,
      draggingEnabled: false,
      answeredThisStage: false,
      currentQuestion: null,
      questionOrder: shuffle([...questions]),
      activeCarKey: 'A',
      isAnimating: false,
      raf: null,
      transitionTimer: null
    };
    placeCar(els.carA, startPos.x, startPos.y, 0, true);
    placeCar(els.carB, hiddenPos.x, hiddenPos.y, 0, false);
    resetBridge();
    updateHUD();
    els.endOverlay.classList.add('hidden');
    els.quizPanel.classList.remove('repair-mode');
    els.feedback.textContent = '';
    els.feedback.className = 'feedback';
    els.statusMini.textContent = '等待作答';
    els.instructionText.textContent = '先从下方选出正确字母，答对后才能拖拽竖直路段。';
    els.dragHint.classList.remove('show');
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getActiveCar() { return state.activeCarKey === 'A' ? els.carA : els.carB; }
  function getNextCar() { return state.activeCarKey === 'A' ? els.carB : els.carA; }

  function placeCar(el, x, y, angle, visible = true) {
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
    el.classList.toggle('visible', visible);
  }

  function setBridgePosition(xCenter, top) {
    els.bridgePiece.style.left = `${xCenter - els.bridgePiece.offsetWidth / 2}px`;
    els.bridgePiece.style.top = `${top}px`;
  }

  function resetBridge() {
    els.bridgeZone.classList.remove('active');
    els.quizPanel.classList.remove('repair-mode');
    els.bridgePiece.classList.remove('active', 'locked');
    setBridgePosition(215, 396);
  }

  function updateHUD() {
    els.stageInfo.textContent = `第 ${Math.min(state.stage + 1, questions.length)} / ${questions.length} 关`;
    els.lifeInfo.textContent = `答错 ${state.wrong} / 3`;
  }

  function loadStage() {
    if (state.wrong >= 3) return endGame(false);
    if (state.stage >= questions.length) return endGame(true);
    state.solved = false;
    state.draggingEnabled = false;
    state.answeredThisStage = false;
    state.isAnimating = false;
    resetBridge();
    const q = state.questionOrder[state.stage % state.questionOrder.length];
    state.currentQuestion = q;
    els.picBox.innerHTML = q.image;
    els.cnHint.textContent = q.zh;
    els.wordMask.textContent = q.mask;
    els.options.innerHTML = '';
    els.feedback.textContent = '';
    els.feedback.className = 'feedback';
    els.statusMini.textContent = '等待作答';
    els.instructionText.textContent = '选对后，拖动竖直路段到左路 / 中路 / 右路。';
    els.dragHint.classList.remove('show');
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => checkAnswer(opt, btn));
      els.options.appendChild(btn);
    });
    const active = getActiveCar();
    placeCar(active, startPos.x, startPos.y, 0, true);
    const next = getNextCar();
    placeCar(next, hiddenPos.x, hiddenPos.y, 0, false);
    updateHUD();
  }

  function checkAnswer(opt, btn) {
    if (state.answeredThisStage || state.draggingEnabled || state.isAnimating) return;
    state.answeredThisStage = true;
    const q = state.currentQuestion;
    const buttons = [...els.options.querySelectorAll('.option-btn')];
    buttons.forEach(b => b.disabled = true);

    if (opt === q.answer) {
      btn.classList.add('correct');
      state.solved = true;
      state.draggingEnabled = true;
      els.feedback.textContent = `答对了！完整单词：${q.word}`;
      els.feedback.className = 'feedback ok';
      els.statusMini.textContent = '可以修路';
      els.instructionText.textContent = '把中间的竖直路段拖到你想走的那条路上。';
      els.quizPanel.classList.add('repair-mode');
      els.bridgeZone.classList.add('active');
      els.dragHint.classList.add('show');
    } else {
      btn.classList.add('wrong');
      const correctBtn = buttons.find(b => b.textContent === q.answer);
      if (correctBtn) correctBtn.classList.add('correct');
      state.wrong += 1;
      updateHUD();
      els.feedback.textContent = `答错了，正确答案是：${q.answer}（${q.word}）`;
      els.feedback.className = 'feedback bad';
      els.statusMini.textContent = '本题跳过';
      if (state.wrong >= 3) {
        setTimeout(() => endGame(false), 1200);
      } else {
        setTimeout(() => {
          state.stage += 1;
          loadStage();
        }, 1200);
      }
    }
  }

  function snapBridge(targetName) {
    const slot = slots[targetName];
    state.draggingEnabled = false;
    els.bridgePiece.classList.add('locked');
    setBridgePosition(slot.x, slot.y);
    els.bridgeZone.classList.remove('active');
    els.quizPanel.classList.remove('repair-mode');
    els.dragHint.classList.remove('show');
    els.statusMini.textContent = `已接到${targetName === 'left' ? '左路' : targetName === 'center' ? '中路' : '右路'}`;
    animateDrive(targetName);
  }

  function animateDrive(targetName) {
    state.isAnimating = true;
    const active = getActiveCar();
    const next = getNextCar();
    placeCar(next, hiddenPos.x, hiddenPos.y, 0, false);

    const segs = buildPath(targetName);
    const total = 2650;
    const nextStart = 1550;
    const nextDuration = 850;
    const start = performance.now();

    cancelAnimationFrame(state.raf);
    clearTimeout(state.transitionTimer);

    function tick(now) {
      const t = Math.min(1, (now - start) / total);
      const pose = sampleSegments(segs, t);
      placeCar(active, pose.x, pose.y, pose.angle, true);

      const t2 = Math.max(0, Math.min(1, (now - start - nextStart) / nextDuration));
      if (t2 > 0) {
        const y = hiddenPos.y + (startPos.y - hiddenPos.y) * easeOutCubic(t2);
        placeCar(next, startPos.x, y, 0, true);
      }

      if (t < 1) {
        state.raf = requestAnimationFrame(tick);
      } else {
        placeCar(active, exits[targetName].x, exits[targetName].y, pose.angle, false);
        placeCar(next, startPos.x, startPos.y, 0, true);
        state.activeCarKey = state.activeCarKey === 'A' ? 'B' : 'A';
        state.stage += 1;
        loadStage();
      }
    }
    state.raf = requestAnimationFrame(tick);
  }

  function buildPath(targetName) {
    const lg = lowerGap[targetName];
    const ug = upperGap[targetName];
    const ex = exits[targetName];
    const segs = [];
    segs.push({ type:'line', p0:startPos, p1:fork, weight:0.28 });
    if (targetName === 'center') {
      segs.push({ type:'line', p0:fork, p1:lg, weight:0.10 });
      segs.push({ type:'line', p0:lg, p1:ug, weight:0.18 });
      segs.push({ type:'line', p0:ug, p1:ex, weight:0.44 });
    } else if (targetName === 'left') {
      segs.push({ type:'quad', p0:fork, c:{x:170,y:612}, p1:lg, weight:0.14 });
      segs.push({ type:'line', p0:lg, p1:ug, weight:0.18 });
      segs.push({ type:'quad', p0:ug, c:{x:96,y:170}, p1:ex, weight:0.40 });
    } else {
      segs.push({ type:'quad', p0:fork, c:{x:260,y:612}, p1:lg, weight:0.14 });
      segs.push({ type:'line', p0:lg, p1:ug, weight:0.18 });
      segs.push({ type:'quad', p0:ug, c:{x:334,y:170}, p1:ex, weight:0.40 });
    }
    return segs;
  }

  function sampleSegments(segs, t) {
    let acc = 0;
    for (const seg of segs) {
      const nextAcc = acc + seg.weight;
      if (t <= nextAcc || seg === segs[segs.length - 1]) {
        const localT = seg.weight === 0 ? 1 : Math.max(0, Math.min(1, (t - acc) / seg.weight));
        return sampleSegment(seg, localT);
      }
      acc = nextAcc;
    }
    return sampleSegment(segs[segs.length - 1], 1);
  }

  function sampleSegment(seg, t) {
    let x, y, dx, dy;
    if (seg.type === 'line') {
      x = lerp(seg.p0.x, seg.p1.x, t);
      y = lerp(seg.p0.y, seg.p1.y, t);
      dx = seg.p1.x - seg.p0.x;
      dy = seg.p1.y - seg.p0.y;
    } else {
      x = quadAt(seg.p0.x, seg.c.x, seg.p1.x, t);
      y = quadAt(seg.p0.y, seg.c.y, seg.p1.y, t);
      dx = 2 * (1 - t) * (seg.c.x - seg.p0.x) + 2 * t * (seg.p1.x - seg.c.x);
      dy = 2 * (1 - t) * (seg.c.y - seg.p0.y) + 2 * t * (seg.p1.y - seg.c.y);
    }
    const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
    return { x, y, angle };
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function quadAt(a, b, c, t) { return (1-t)*(1-t)*a + 2*(1-t)*t*b + t*t*c; }
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function endGame(success) {
    state.isAnimating = false;
    cancelAnimationFrame(state.raf);
    els.endOverlay.classList.remove('hidden');
    els.bridgeZone.classList.remove('active');
    els.dragHint.classList.remove('show');
    if (success) {
      els.endTitle.textContent = '闯关成功';
      els.endDesc.textContent = `太棒了！你帮小车修完了所有道路，累计答错 ${state.wrong} 次。`;
    } else {
      els.endTitle.textContent = '游戏结束';
      els.endDesc.textContent = '累计答错 3 次，小车没法继续前进了。可以重新开始。';
    }
  }

  function startGame() {
    initState();
    els.startOverlay.classList.add('hidden');
    loadStage();
  }

  function setupDrag() {
    const piece = els.bridgePiece;
    const zone = els.bridgeZone;
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function getPoint(e) {
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX, y: p.clientY };
    }

    function onDown(e) {
      if (!state.draggingEnabled || state.isAnimating) return;
      dragging = true;
      piece.classList.add('active');
      const rect = piece.getBoundingClientRect();
      const p = getPoint(e);
      offsetX = p.x - rect.left;
      offsetY = p.y - rect.top;
      e.preventDefault();
    }

    function onMove(e) {
      if (!dragging || !state.draggingEnabled) return;
      const zoneRect = zone.getBoundingClientRect();
      const p = getPoint(e);
      let left = p.x - zoneRect.left - offsetX;
      let top = p.y - zoneRect.top - offsetY;
      left = Math.max(0, Math.min(zoneRect.width - piece.offsetWidth, left));
      top = Math.max(0, Math.min(zoneRect.height - piece.offsetHeight, top));
      piece.style.left = `${left}px`;
      piece.style.top = `${top}px`;
      e.preventDefault();
    }

    function onUp() {
      if (!dragging) return;
      dragging = false;
      piece.classList.remove('active');
      if (!state.draggingEnabled) return;
      const rect = piece.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const zoneRect = zone.getBoundingClientRect();
      const candidates = Object.entries(slots).map(([name, pos]) => {
        const tx = zoneRect.left + pos.x;
        const ty = zoneRect.top + pos.y + 78;
        return { name, d: Math.hypot(centerX - tx, centerY - ty) };
      }).sort((a,b) => a.d - b.d);

      if (candidates[0].d < 82) {
        snapBridge(candidates[0].name);
      } else {
        setBridgePosition(215, 396);
      }
    }

    piece.addEventListener('pointerdown', onDown);
    window.addEventListener('pointermove', onMove, { passive:false });
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
  }

  els.startBtn.addEventListener('click', startGame);
  els.restartBtn.addEventListener('click', startGame);
  els.closeBtn.addEventListener('click', () => els.endOverlay.classList.add('hidden'));
  setupDrag();
  initState();
