<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RAG 与语义搜索系统评估｜知识卡片</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#f4f7fb;color:#1f2937}.app{display:grid;grid-template-columns:310px 1fr;min-height:100vh}.side{background:#101827;color:white;padding:24px;position:sticky;top:0;height:100vh;overflow:auto}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#14b8a6);display:grid;place-items:center;font-weight:900;font-size:24px}.brand{display:flex;gap:12px;align-items:center}.brand h1{font-size:18px;margin:0}.brand p{font-size:12px;color:#cbd5e1;margin:4px 0}.panel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:15px;margin:16px 0}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:rgba(255,255,255,.08);border-radius:14px;padding:10px}.stat b{font-size:24px;display:block}.stat span{font-size:11px;color:#cbd5e1}label{font-size:12px;color:#cbd5e1;display:block;margin:10px 0 6px}select,input{width:100%;padding:11px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);color:white}select option{color:#111;background:white}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;background:#2563eb;color:white}.btn:hover{filter:brightness(.95)}.btn.gray{background:#e5e7eb;color:#111}.btn.green{background:#16a34a}.btn.orange{background:#f59e0b}.btn.red{background:#ef4444}.btn.full{width:100%;margin-top:9px}.main{padding:34px;max-width:1200px;margin:0 auto;width:100%}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.top h2{font-size:30px;margin:0 0 8px}.top p{color:#6b7280;line-height:1.65;margin:0}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs .active{background:#2563eb;color:white}.study{display:grid;grid-template-columns:1fr 320px;gap:24px;margin-top:26px}.stage{display:grid;place-items:center;min-height:500px}.card{width:min(720px,100%);min-height:430px;perspective:1200px}.inner{position:relative;width:100%;min-height:430px;transform-style:preserve-3d;transition:.55s;cursor:pointer}.card.flip .inner{transform:rotateY(180deg)}.face{position:absolute;width:100%;min-height:430px;backface-visibility:hidden;background:white;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.1);padding:34px;display:flex;flex-direction:column;justify-content:space-between}.back{transform:rotateY(180deg)}.badges{display:flex;gap:8px;flex-wrap:wrap}.badge{font-size:12px;border-radius:99px;padding:6px 10px;background:#eef2ff;color:#3730a3;font-weight:700}.term{text-align:center;font-size:52px;font-weight:900;margin:58px 0 18px;word-break:break-word}.hint{text-align:center;color:#6b7280}.box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:14px 16px;margin:6px 0 14px;line-height:1.7}.explain{font-size:17px;line-height:1.9}.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.right{background:white;border:1px solid #e5e7eb;border-radius:22px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.06)}.list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}.li{border:1px solid #e5e7eb;border-radius:14px;padding:10px;cursor:pointer}.li span{display:block;font-size:12px;color:#6b7280}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:20px}.mini{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:16px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.05)}.mini h3{margin:0 0 8px}.mini p{color:#6b7280;font-size:13px}.hide{display:none}.note{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:16px;padding:14px;margin-top:14px;line-height:1.7}.bar{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px}.bar i{height:100%;display:block;background:linear-gradient(90deg,#2563eb,#14b8a6);width:0}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.study{grid-template-columns:1fr}.top{display:block}.term{font-size:40px}.main{padding:22px}}</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="logo">R</div><div><h1>RAG Flashcards</h1><p>在线知识卡片学习系统</p></div></div><div class="panel"><h3>学习统计</h3><div class="stats"><div class="stat"><b id="total">0</b><span>卡片总数</span></div><div class="stat"><b id="shown">0</b><span>当前筛选</span></div><div class="stat"><b id="viewed">0</b><span>已学习</span></div><div class="stat"><b id="knownN">0</b><span>已熟悉</span></div><div class="stat"><b id="wrongN">0</b><span>错卡</span></div><div class="stat"><b id="pct">0%</b><span>进度</span></div></div><div class="bar"><i id="bar"></i></div></div><div class="panel"><h3>筛选</h3><label>模块</label><select id="module"></select><label>难度</label><select id="difficulty"></select><label>关键词</label><input id="search" placeholder="术语 / 中文 / 英文"><button class="btn full" id="shuffle">随机打乱</button></div><div class="panel"><h3>导出与管理</h3><button class="btn full" id="exportJson">导出 JSON</button><button class="btn full" id="exportCsv">导出 CSV</button><button class="btn full" id="exportProgress">导出进度</button><button class="btn red full" id="reset">清空进度</button></div></aside><main class="main"><div class="top"><div><h2>RAG 与语义搜索系统评估｜知识卡片</h2><p>正面是术语/缩写；背面包含 English Full Name、中文全称和中文 explain。可离线使用，也可部署到 GitHub Pages。</p></div><div class="tabs"><button class="btn active" id="studyTab">翻卡学习</button><button class="btn gray" id="browseTab">卡片总览</button><button class="btn gray" id="wrongTab">错卡复习</button></div></div><section class="study" id="studyView"><div><div class="stage"><div class="card" id="card"><div class="inner"><div class="face front" id="front"></div><div class="face back" id="back"></div></div></div></div><div class="actions"><button class="btn gray" id="prev">上一张</button><button class="btn" id="flip">翻卡</button><button class="btn gray" id="next">下一张</button><button class="btn orange" id="unknown">不熟悉</button><button class="btn green" id="known">已熟悉</button></div></div><aside class="right"><h3>错卡 / 不熟卡片</h3><div class="list" id="wrongList"></div><div class="note">快捷键：空格翻卡，←/→ 切换，1 标记不熟，2 标记熟悉。学习进度保存在本机浏览器。</div></aside></section><section id="browseView" class="hide"><div class="note">当前显示 <b id="browseCount">0</b> 张卡片。点击任一卡片进入学习。</div><div class="grid" id="browseGrid"></div></section></main></div><script>window.CARDS=[{"id": "C001", "module": "RAG 基础", "difficulty": "基础", "term": "RAG", "english": "Retrieval-Augmented Generation", "chinese": "检索增强生成", "explain": "先检索外部证据，再让大语言模型基于证据生成答案，用于降低知识过期和幻觉。"}, {"id": "C002", "module": "RAG 基础", "difficulty": "基础", "term": "Semantic Search", "english": "Semantic Search", "chinese": "语义搜索", "explain": "根据语义相似度而不是单纯词面匹配进行搜索，常用 embedding 和向量检索实现。"}, {"id": "C003", "module": "RAG 基础", "difficulty": "中级", "term": "Keyword Search", "english": "Keyword Search", "chinese": "关键词搜索", "explain": "基于词面、词频和关键词匹配的检索方式，适合编号、代码、机构名、术语等精确查询。"}, {"id": "C004", "module": "RAG 基础", "difficulty": "基础", "term": "Hybrid Search", "english": "Hybrid Search", "chinese": "混合搜索", "explain": "结合关键词搜索、向量搜索和元数据过滤，兼顾精确匹配与语义召回。"}, {"id": "C005", "module": "RAG 基础", "difficulty": "基础", "term": "LLM", "english": "Large Language Model", "chinese": "大语言模型", "explain": "能够理解和生成自然语言的模型，在 RAG 中通常负责基于上下文生成最终回答。"}, {"id": "C006", "module": "RAG 基础", "difficulty": "中级", "term": "Embedding", "english": "Embedding", "chinese": "嵌入向量", "explain": "将文本转换为数值向量的表示方式，语义相近的文本在向量空间中通常距离更近。"}, {"id": "C007", "module": "RAG 基础", "difficulty": "基础", "term": "Vector Database", "english": "Vector Database", "chinese": "向量数据库", "explain": "用于存储和相似度检索向量的数据库，是语义搜索和 RAG 检索层的重要基础设施。"}, {"id": "C008", "module": "RAG 基础", "difficulty": "基础", "term": "Knowledge Base", "english": "Knowledge Base", "chinese": "知识库", "explain": "RAG 连接的外部知识来源，如企业制度、论文、FAQ、技术文档、数据库或网页。"}, {"id": "C009", "module": "RAG 基础", "difficulty": "中级", "term": "Ground Truth", "english": "Ground Truth", "chinese": "标准答案 / 真实标签", "explain": "用于判断系统输出是否正确的人工标注答案、权威答案或参考依据。"}, {"id": "C010", "module": "RAG 基础", "difficulty": "基础", "term": "Query", "english": "Query", "chinese": "查询 / 用户问题", "explain": "用户输入给系统的问题或搜索请求，是检索、生成和评估的起点。"}, {"id": "C011", "module": "RAG 管道架构", "difficulty": "基础", "term": "Retriever", "english": "Retriever", "chinese": "检索器", "explain": "负责从知识库中召回候选文档或片段，决定系统是否能获得正确证据。"}, {"id": "C012", "module": "RAG 管道架构", "difficulty": "中级", "term": "Reranker", "english": "Reranker", "chinese": "重排序器", "explain": "对初步召回结果进行精排，把更相关的证据排到前面。"}, {"id": "C013", "module": "RAG 管道架构", "difficulty": "基础", "term": "Chunk", "english": "Chunk", "chinese": "文本块 / 文档切片", "explain": "长文档切分后的检索单位，大小和边界会影响检索与生成质量。"}, {"id": "C014", "module": "RAG 管道架构", "difficulty": "基础", "term": "Chunking", "english": "Chunking", "chinese": "文档切分", "explain": "把长文档拆成可检索片段的过程，应尽量保留语义完整性和标题层级。"}, {"id": "C015", "module": "RAG 管道架构", "difficulty": "高级", "term": "Context Builder", "english": "Context Builder", "chinese": "上下文构造器", "explain": "将检索结果去重、排序、压缩并放入 prompt，决定 LLM 实际看到的证据。"}, {"id": "C016", "module": "RAG 管道架构", "difficulty": "基础", "term": "Query Rewriting", "english": "Query Rewriting", "chinese": "查询改写", "explain": "将用户问题改写为更适合检索的表达，如补全术语、扩展同义词或拆分多跳问题。"}, {"id": "C017", "module": "RAG 管道架构", "difficulty": "基础", "term": "Metadata", "english": "Metadata", "chinese": "元数据", "explain": "描述文档或 chunk 的附加信息，如版本、时间、权限、部门、作者和来源。"}, {"id": "C018", "module": "RAG 管道架构", "difficulty": "中级", "term": "Top-K", "english": "Top-K Retrieval Results", "chinese": "前 K 个检索结果", "explain": "检索系统排序后返回的前 K 个候选结果，是 Recall@K 和 Precision@K 的基础。"}, {"id": "C019", "module": "RAG 管道架构", "difficulty": "基础", "term": "Context Window", "english": "Context Window", "chinese": "上下文窗口", "explain": "LLM 单次输入可容纳的 token 范围，限制了可放入 prompt 的证据数量。"}, {"id": "C020", "module": "RAG 管道架构", "difficulty": "基础", "term": "Prompt Template", "english": "Prompt Template", "chinese": "提示词模板", "explain": "组织系统规则、用户问题、检索上下文和输出格式的固定模板。"}, {"id": "C021", "module": "评估数据集", "difficulty": "中级", "term": "Evaluation Dataset", "english": "Evaluation Dataset", "chinese": "评估数据集", "explain": "用于测试系统质量的样本集合，通常包含问题、标准答案、相关文档和评分标签。"}, {"id": "C022", "module": "评估数据集", "difficulty": "基础", "term": "Gold Dataset", "english": "Gold Dataset", "chinese": "金标准数据集", "explain": "由领域专家人工标注和审核的高质量评估集，适合上线判断和校准 Judge。"}, {"id": "C023", "module": "评估数据集", "difficulty": "基础", "term": "Silver Dataset", "english": "Silver Dataset", "chinese": "银标准数据集", "explain": "由模型辅助生成并经抽查的数据集，规模较大，适合日常回归测试。"}, {"id": "C024", "module": "评估数据集", "difficulty": "中级", "term": "Synthetic Test Set", "english": "Synthetic Test Set", "chinese": "合成测试集", "explain": "由 LLM 或程序自动生成的测试题集，需人工抽查和质量控制。"}, {"id": "C025", "module": "评估数据集", "difficulty": "基础", "term": "Required Facts", "english": "Required Facts", "chinese": "必要事实", "explain": "标准答案中必须出现的关键事实、条件或步骤，用于评估答案完整性。"}, {"id": "C026", "module": "评估数据集", "difficulty": "基础", "term": "Forbidden Claims", "english": "Forbidden Claims", "chinese": "禁止错误表述", "explain": "答案中不应出现的错误断言，用于发现幻觉和高风险错误。"}, {"id": "C027", "module": "评估数据集", "difficulty": "中级", "term": "Negative Query", "english": "Negative Query", "chinese": "无答案 / 负样本查询", "explain": "知识库中没有答案或系统不应回答的问题，用于测试拒答和澄清能力。"}, {"id": "C028", "module": "评估数据集", "difficulty": "基础", "term": "Hard Case", "english": "Hard Case", "chinese": "难例", "explain": "容易暴露系统缺陷的样本，如旧版本干扰、相似文档干扰和多条件问题。"}, {"id": "C029", "module": "评估数据集", "difficulty": "基础", "term": "Query Type", "english": "Query Type", "chinese": "查询类型", "explain": "对问题的分类，如事实、流程、对比、时间敏感、多跳、无答案和安全查询。"}, {"id": "C030", "module": "评估数据集", "difficulty": "高级", "term": "Risk Level", "english": "Risk Level", "chinese": "风险等级", "explain": "问题或错误可能造成影响的严重程度，用于决定审核强度和上线门槛。"}, {"id": "C031", "module": "检索评估指标", "difficulty": "基础", "term": "Recall@K", "english": "Recall at K", "chinese": "前 K 召回率", "explain": "衡量前 K 个结果中召回了多少相关文档，关注正确证据是否被找出。"}, {"id": "C032", "module": "检索评估指标", "difficulty": "基础", "term": "Precision@K", "english": "Precision at K", "chinese": "前 K 精确率", "explain": "衡量前 K 个结果中有多少真正相关，关注检索噪音比例。"}, {"id": "C033", "module": "检索评估指标", "difficulty": "中级", "term": "MRR", "english": "Mean Reciprocal Rank", "chinese": "平均倒数排名", "explain": "衡量第一个相关结果出现的位置，正确结果越靠前分数越高。"}, {"id": "C034", "module": "检索评估指标", "difficulty": "基础", "term": "nDCG@K", "english": "Normalized Discounted Cumulative Gain at K", "chinese": "归一化折损累计增益", "explain": "同时考虑相关性等级和排序位置的检索指标。"}, {"id": "C035", "module": "检索评估指标", "difficulty": "基础", "term": "Hit Rate@K", "english": "Hit Rate at K", "chinese": "前 K 命中率", "explain": "判断 top-k 中是否至少包含一个相关结果，适合单证据问答。"}, {"id": "C036", "module": "检索评估指标", "difficulty": "中级", "term": "MAP", "english": "Mean Average Precision", "chinese": "平均精确率均值", "explain": "对多个查询的平均精确率再求均值，适合多相关文档检索任务。"}, {"id": "C037", "module": "检索评估指标", "difficulty": "基础", "term": "Relevance Grade", "english": "Relevance Grade", "chinese": "相关性等级", "explain": "将文档标注为完全相关、部分相关、弱相关或不相关。"}, {"id": "C038", "module": "检索评估指标", "difficulty": "基础", "term": "Retrieval Miss", "english": "Retrieval Miss", "chinese": "检索漏召回", "explain": "正确文档没有被召回，常见原因是 embedding、索引、query 改写或过滤策略问题。"}, {"id": "C039", "module": "检索评估指标", "difficulty": "中级", "term": "Low Rank", "english": "Low Ranking of Relevant Document", "chinese": "相关文档排序过低", "explain": "正确文档被召回但排名靠后，未进入上下文，常需重排序器改善。"}, {"id": "C040", "module": "检索评估指标", "difficulty": "基础", "term": "Retrieval Noise", "english": "Retrieval Noise", "chinese": "检索噪音", "explain": "检索结果中大量不相关内容，会干扰生成并增加幻觉风险。"}, {"id": "C041", "module": "检索优化", "difficulty": "基础", "term": "BM25", "english": "Best Matching 25", "chinese": "BM25 关键词排序算法", "explain": "经典关键词检索算法，适合精确术语、编号、错误代码和专有名词。"}, {"id": "C042", "module": "检索优化", "difficulty": "中级", "term": "ANN", "english": "Approximate Nearest Neighbor", "chinese": "近似最近邻搜索", "explain": "在大规模向量集合中高效寻找相似向量的方法。"}, {"id": "C043", "module": "检索优化", "difficulty": "基础", "term": "Chunk Size", "english": "Chunk Size", "chinese": "文本块大小", "explain": "每个 chunk 的长度。太小会语义不完整，太大会引入噪音和成本。"}, {"id": "C044", "module": "检索优化", "difficulty": "基础", "term": "Chunk Overlap", "english": "Chunk Overlap", "chinese": "文本块重叠", "explain": "相邻文本块之间重复保留的内容，可降低关键上下文被切断的风险。"}, {"id": "C045", "module": "检索优化", "difficulty": "高级", "term": "Metadata Filter", "english": "Metadata Filter", "chinese": "元数据过滤", "explain": "根据版本、时间、权限、部门、地区等元数据过滤候选结果。"}, {"id": "C046", "module": "检索优化", "difficulty": "基础", "term": "Query Expansion", "english": "Query Expansion", "chinese": "查询扩展", "explain": "给原查询增加同义词、缩写、相关术语或翻译，提高召回率但可能增加噪音。"}, {"id": "C047", "module": "检索优化", "difficulty": "基础", "term": "Multi-hop Retrieval", "english": "Multi-hop Retrieval", "chinese": "多跳检索", "explain": "需要跨多个文档或多个步骤才能获得答案的检索方式。"}, {"id": "C048", "module": "检索优化", "difficulty": "中级", "term": "Candidate Pool", "english": "Candidate Pool", "chinese": "候选结果池", "explain": "初步检索得到的一批候选文档，通常再交给 reranker 精排。"}, {"id": "C049", "module": "检索优化", "difficulty": "基础", "term": "Context Packing", "english": "Context Packing", "chinese": "上下文打包", "explain": "按重要性和 token 预算把检索片段组织进 prompt 的过程。"}, {"id": "C050", "module": "检索优化", "difficulty": "基础", "term": "Deduplication", "english": "Deduplication", "chinese": "去重", "explain": "去除重复或高度相似片段，以降低噪音并节省上下文窗口。"}, {"id": "C051", "module": "生成评估", "difficulty": "中级", "term": "Faithfulness", "english": "Faithfulness", "chinese": "忠实性", "explain": "答案是否完全由检索上下文支持，是识别无依据生成的重要指标。"}, {"id": "C052", "module": "生成评估", "difficulty": "基础", "term": "Groundedness", "english": "Groundedness", "chinese": "证据扎根性 / 有据性", "explain": "答案是否扎根于给定证据，强调每个关键结论都应可由上下文支持。"}, {"id": "C053", "module": "生成评估", "difficulty": "基础", "term": "Correctness", "english": "Correctness", "chinese": "正确性", "explain": "答案在事实、逻辑和参考答案层面是否正确。"}, {"id": "C054", "module": "生成评估", "difficulty": "中级", "term": "Completeness", "english": "Completeness", "chinese": "完整性", "explain": "答案是否覆盖所有必要事实、条件、限制和步骤。"}, {"id": "C055", "module": "生成评估", "difficulty": "基础", "term": "Relevance", "english": "Relevance", "chinese": "相关性", "explain": "答案是否直接回应用户问题，而不是回答相近但不同的问题。"}, {"id": "C056", "module": "生成评估", "difficulty": "基础", "term": "Conciseness", "english": "Conciseness", "chinese": "简洁性", "explain": "答案是否避免无关和冗长内容，但不能牺牲正确性与完整性。"}, {"id": "C057", "module": "生成评估", "difficulty": "中级", "term": "Citation Quality", "english": "Citation Quality", "chinese": "引用质量", "explain": "引用是否真实、准确，并能支持对应结论。"}, {"id": "C058", "module": "生成评估", "difficulty": "基础", "term": "Hallucination", "english": "Hallucination", "chinese": "幻觉", "explain": "模型生成上下文中不存在或无法支持的信息，是 RAG 的高风险错误。"}, {"id": "C059", "module": "生成评估", "difficulty": "基础", "term": "Unsupported Claim", "english": "Unsupported Claim", "chinese": "无证据断言", "explain": "模型输出当前上下文无法支持的断言，即使看似合理也应判为问题。"}, {"id": "C060", "module": "生成评估", "difficulty": "高级", "term": "Missing Constraint", "english": "Missing Constraint", "chinese": "遗漏限制条件", "explain": "答案遗漏时间、地点、权限、员工类型、适用范围或审批条件等关键限制。"}, {"id": "C061", "module": "生成评估", "difficulty": "基础", "term": "Overgeneralization", "english": "Overgeneralization", "chinese": "过度泛化", "explain": "把局部规则或特定条件推广为普遍结论。"}, {"id": "C062", "module": "生成评估", "difficulty": "基础", "term": "Refusal Accuracy", "english": "Refusal Accuracy", "chinese": "拒答准确性", "explain": "系统在无依据、越权或不安全问题上正确拒答，同时不误拒可回答问题。"}, {"id": "C063", "module": "LLM-as-a-Judge", "difficulty": "中级", "term": "LLM-as-a-Judge", "english": "Large Language Model as a Judge", "chinese": "大语言模型作为评审者", "explain": "用一个 LLM 按 rubric 对另一个系统输出打分或分类，适合开放式复杂答案评估。"}, {"id": "C064", "module": "LLM-as-a-Judge", "difficulty": "基础", "term": "Judge LLM", "english": "Judge Large Language Model", "chinese": "评审大语言模型", "explain": "承担评估角色的模型，应稳定、可复现，并用人工标注结果校准。"}, {"id": "C065", "module": "LLM-as-a-Judge", "difficulty": "基础", "term": "Rubric", "english": "Rubric", "chinese": "评分细则 / 评价量规", "explain": "定义评价维度、分数范围和判分标准，是自动评估可靠性的核心。"}, {"id": "C066", "module": "LLM-as-a-Judge", "difficulty": "中级", "term": "Structured Output", "english": "Structured Output", "chinese": "结构化输出", "explain": "要求模型按 JSON 或固定 schema 输出，便于程序解析、统计和回归测试。"}, {"id": "C067", "module": "LLM-as-a-Judge", "difficulty": "基础", "term": "Judge Calibration", "english": "Judge Calibration", "chinese": "评审模型校准", "explain": "用人工评分对 Judge 输出进行对齐，分析分歧并改进 prompt 和 rubric。"}, {"id": "C068", "module": "LLM-as-a-Judge", "difficulty": "基础", "term": "Inter-rater Agreement", "english": "Inter-rater Agreement", "chinese": "评分者一致性", "explain": "衡量多个评估者判断是否一致，可用于检验 Judge 与人工的对齐程度。"}, {"id": "C069", "module": "LLM-as-a-Judge", "difficulty": "中级", "term": "Cohen’s Kappa", "english": "Cohen’s Kappa", "chinese": "科恩 κ 一致性系数", "explain": "衡量两个评分者分类一致性并校正随机一致性的统计指标。"}, {"id": "C070", "module": "LLM-as-a-Judge", "difficulty": "基础", "term": "Fluency Bias", "english": "Fluency Bias", "chinese": "流畅性偏差", "explain": "Judge 因答案语言流畅而高估质量的倾向，应强调证据和事实优先。"}, {"id": "C071", "module": "LLM-as-a-Judge", "difficulty": "基础", "term": "Position Bias", "english": "Position Bias", "chinese": "位置偏差", "explain": "比较答案时偏好先出现或后出现答案的倾向，可通过随机交换顺序缓解。"}, {"id": "C072", "module": "LLM-as-a-Judge", "difficulty": "中级", "term": "NaN Score", "english": "Not-a-Number Score", "chinese": "不可解析分数 / 空分数", "explain": "Judge 输出格式不符合要求导致无法解析，严格结构化输出可减少该问题。"}, {"id": "C073", "module": "领域化评估", "difficulty": "基础", "term": "Domain-specific Evaluation", "english": "Domain-specific Evaluation", "chinese": "领域特定评估", "explain": "针对行业或学科特点设计的评估方法，关注术语、证据标准和合规边界。"}, {"id": "C074", "module": "领域化评估", "difficulty": "基础", "term": "Domain Rubric", "english": "Domain Rubric", "chinese": "领域评分细则", "explain": "根据医学、法律、金融、科研或企业制度特点制定的专门评分标准。"}, {"id": "C075", "module": "领域化评估", "difficulty": "高级", "term": "Terminology Accuracy", "english": "Terminology Accuracy", "chinese": "术语准确性", "explain": "评估系统是否正确使用专业术语、缩写和概念边界。"}, {"id": "C076", "module": "领域化评估", "difficulty": "基础", "term": "Scope of Applicability", "english": "Scope of Applicability", "chinese": "适用范围", "explain": "规则或结论适用的人群、地区、时间、部门或条件。"}, {"id": "C077", "module": "领域化评估", "difficulty": "基础", "term": "Causality vs Correlation", "english": "Causality versus Correlation", "chinese": "因果性与相关性区分", "explain": "科研评估中不能把相关性证据直接表述为因果证明。"}, {"id": "C078", "module": "领域化评估", "difficulty": "中级", "term": "Evidence Standard", "english": "Evidence Standard", "chinese": "证据标准", "explain": "某领域支持结论所需的证据强度，如指南、实验设计、统计结果或法规依据。"}, {"id": "C079", "module": "领域化评估", "difficulty": "基础", "term": "Expert Review", "english": "Expert Review", "chinese": "专家审核", "explain": "由领域专家审核关键样本、评分规则或高风险输出。"}, {"id": "C080", "module": "领域化评估", "difficulty": "基础", "term": "High-stakes Domain", "english": "High-stakes Domain", "chinese": "高风险领域", "explain": "错误可能造成严重后果的领域，如医疗、法律、金融、隐私和企业合规。"}, {"id": "C081", "module": "时间与版本评估", "difficulty": "中级", "term": "Temporal Evaluation", "english": "Temporal Evaluation", "chinese": "时间信息评估", "explain": "检查系统是否正确处理当前日期、生效日期、废止日期和版本变化。"}, {"id": "C082", "module": "时间与版本评估", "difficulty": "基础", "term": "valid_from", "english": "Valid From", "chinese": "生效起始日期", "explain": "文档或规则开始生效的日期，是时间感知检索的重要元数据。"}, {"id": "C083", "module": "时间与版本评估", "difficulty": "基础", "term": "valid_to", "english": "Valid To", "chinese": "生效截止日期 / 废止日期", "explain": "文档或规则结束有效的日期，用于避免使用过期内容。"}, {"id": "C084", "module": "时间与版本评估", "difficulty": "中级", "term": "Outdated Document", "english": "Outdated Document", "chinese": "过期文档", "explain": "已被替代或失效的文档，不应作为当前答案的主要依据。"}, {"id": "C085", "module": "时间与版本评估", "difficulty": "基础", "term": "Version Conflict", "english": "Version Conflict", "chinese": "版本冲突", "explain": "多个版本文档内容不一致时，需要根据时间、版本号和权威来源解决冲突。"}, {"id": "C086", "module": "时间与版本评估", "difficulty": "基础", "term": "Temporal Filter", "english": "Temporal Filter", "chinese": "时间过滤器", "explain": "根据当前日期或问题中的时间条件过滤文档的机制。"}, {"id": "C087", "module": "时间与版本评估", "difficulty": "中级", "term": "Relative Time Expression", "english": "Relative Time Expression", "chinese": "相对时间表达", "explain": "如今天、今年、上季度等依赖当前日期解释的表达。"}, {"id": "C088", "module": "时间与版本评估", "difficulty": "基础", "term": "Temporal Drift", "english": "Temporal Drift", "chinese": "时间漂移", "explain": "随着时间推移，答案或评估样本过期，需要更新测试集和标准答案。"}, {"id": "C089", "module": "安全与合规评估", "difficulty": "基础", "term": "Access Control", "english": "Access Control", "chinese": "访问控制", "explain": "根据用户身份和权限决定可访问哪些文档和答案。"}, {"id": "C090", "module": "安全与合规评估", "difficulty": "高级", "term": "ACL", "english": "Access Control List", "chinese": "访问控制列表", "explain": "记录资源访问权限的列表，可用于检索阶段过滤无权文档。"}, {"id": "C091", "module": "安全与合规评估", "difficulty": "基础", "term": "PII", "english": "Personally Identifiable Information", "chinese": "个人身份识别信息", "explain": "能够识别个人身份的信息，如身份证号、电话、住址、邮箱和工资信息。"}, {"id": "C092", "module": "安全与合规评估", "difficulty": "基础", "term": "Prompt Injection", "english": "Prompt Injection", "chinese": "提示词注入", "explain": "通过用户输入或文档内容诱导模型忽略规则、泄露提示词或执行恶意指令。"}, {"id": "C093", "module": "安全与合规评估", "difficulty": "中级", "term": "Data Leakage", "english": "Data Leakage", "chinese": "数据泄露", "explain": "系统向无权限用户输出敏感、隐私或机密信息。"}, {"id": "C094", "module": "安全与合规评估", "difficulty": "基础", "term": "Safe Refusal", "english": "Safe Refusal", "chinese": "安全拒答", "explain": "对越权、违法、不安全或无依据请求进行礼貌拒绝。"}, {"id": "C095", "module": "安全与合规评估", "difficulty": "基础", "term": "Compliance Evaluation", "english": "Compliance Evaluation", "chinese": "合规评估", "explain": "检查输出是否符合企业政策、法规、行业规范和安全要求。"}, {"id": "C096", "module": "安全与合规评估", "difficulty": "中级", "term": "Policy Violation", "english": "Policy Violation", "chinese": "政策违规", "explain": "系统输出违反内部制度、法规或安全政策的内容。"}, {"id": "C097", "module": "错误归因", "difficulty": "基础", "term": "Error Attribution", "english": "Error Attribution", "chinese": "错误归因", "explain": "把错误定位到数据、检索、排序、上下文、生成、安全或评估标签等环节。"}, {"id": "C098", "module": "错误归因", "difficulty": "基础", "term": "Root Cause Analysis", "english": "Root Cause Analysis", "chinese": "根因分析", "explain": "分析错误背 控与回归", "difficulty": "基础", "term": "P95 Latency", "english": "95th Percentile Latency", "chinese": "第 95 百分位延迟", "explain": "95% 请求响应时间不超过该值，比平均值更能反映慢请求体验。"}, {"id": "C111", "module": "生产监控与回归", "difficulty": "中级", "term": "Token Cost", "english": "Token Cost", "chinese": "Token 成本", "explain": "模型输入和输出 token 带来的调用成本，受 top-k、上下文长度和生成长度影响。"}, {"id": "C112", "module": "生产监控与回归", "difficulty": "基础", "term": "Query Drift", "english": "Query Drift", "chinese": "查询分布漂移", "explain": "用户问题主题、表达或难度变化，导致原测试集不再代表生产环境。"}, {"id": "C113", "module": "生产监控与回归", "difficulty": "基础", "term": "Document Drift", "english": "Document Drift", "chinese": "文档分布漂移", "explain": "知识库内容、版本或结构变化，导致检索效果和标准答案变化。"}, {"id": "C114", "module": "生产监控与回归", "difficulty": "中级", "term": "Monitoring Dashboard", "english": "Monitoring Dashboard", "chinese": "监控仪表盘", "explain": "集中展示质量、成本、延迟、安全和用户反馈等指标的界面。"}, {"id": "C115", "module": "生产监控与回归", "difficulty": "基础", "term": "Quality Gate", "english": "Quality Gate", "chinese": "质量门槛", "explain": "上线前必须达到的最低指标要求，如 Recall、faithfulness、安全失败率和延迟。"}, {"id": "C116", "module": "生产监控与回归", "difficulty": "基础", "term": "Canary Release", "english": "Canary Release", "chinese": "金丝雀发布", "explain": "先向少量用户发布新版本，观察质量和风险后再扩大流量。"}, {"id": "C117", "module": "生产监控与回归", "difficulty": "中级", "term": "Human-in-the-loop", "english": "Human in the Loop", "chinese": "人在环路", "explain": "在关键环节引入人工审核、反馈或决策，高风险系统尤其需要。"}, {"id": "C118", "module": "生产监控与回归", "difficulty": "基础", "term": "Scorecard", "english": "Evaluation Scorecard", "chinese": "评估记分卡", "explain": "汇总指标、阈值、版本对比和上线结论的评估报告。"}, {"id": "C119", "module": "生产监控与回归", "difficulty": "基础", "term": "SLO", "english": "Service Level Objective", "chinese": "服务水平目标", "explain": "系统期望达到的服务质量目标，如可用性、延迟、错误率或安全失败率。"}, {"id": "C120", "module": "生产监控与回归", "difficulty": "高级", "term": "Feedback Loop", "english": "Feedback Loop", "chinese": "反馈闭环", "explain": "把用户反馈、人工审核和生产日志用于更新测试集、修复错误和持续优化。"}];</script><script>const CARDS=window.CARDS;let filtered=[...CARDS],idx=0,mode='study';const K='rag_fc_progress_v1';const st=JSON.parse(localStorage.getItem(K)||'{}');st.viewed=st.viewed||{};st.known=st.known||{};st.wrong=st.wrong||{};const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function save(){localStorage.setItem(K,JSON.stringify(st))}function init(){let mods=[...new Set(CARDS.map(c=>c.module))],diffs=[...new Set(CARDS.map(c=>c.difficulty))];module.innerHTML='<option value="">全部模块</option>'+mods.map(x=>`<option>${x}</option>`).join('');difficulty.innerHTML='<option value="">全部难度</option>'+diffs.map(x=>`<option>${x}</option>`).join('');[module,difficulty,search].forEach(e=>e.oninput=filter);shuffle.onclick=()=>{filtered.sort(()=>Math.random()-.5);idx=0;render()};reset.onclick=()=>{if(confirm('清空学习进度？')){localStorage.removeItem(K);location.reload()}};exportCsv.onclick=csv;exportJson.onclick=()=>dl('rag_flashcards_cards.json',JSON.stringify(CARDS,null,2),'application/json');exportProgress.onclick=()=>dl('rag_flashcards_progress.json',JSON.stringify(st,null,2),'application/json');studyTab.onclick=()=>setMode('study');browseTab.onclick=()=>setMode('browse');wrongTab.onclick=()=>setMode('wrong');card.onclick=e=>{card.classList.toggle('flip')};prev.onclick=e=>{e.stopPropagation();idx=(idx-1+filtered.length)%filtered.length;render()};next.onclick=e=>{e.stopPropagation();idx=(idx+1)%filtered.length;render()};flip.onclick=e=>{e.stopPropagation();card.classList.toggle('flip')};known.onclick=e=>{e.stopPropagation();mark(1)};unknown.onclick=e=>{e.stopPropagation();mark(0)};document.onkeydown=e=>{if(e.key===' '){e.preventDefault();card.classList.toggle('flip')}if(e.key==='ArrowRight')next.click();if(e.key==='ArrowLeft')prev.click();if(e.key==='1')mark(0);if(e.key==='2')mark(1)};render()}function setMode(m){mode=m;$$('.tabs .btn').forEach(b=>b.classList.remove('active'));({study:studyTab,browse:browseTab,wrong:wrongTab}[m]).classList.add('active');filter()}function filter(){let q=search.value.toLowerCase(),m=module.value,d=difficulty.value;filtered=CARDS.filter(c=>(!m||c.module==m)&&(!d||c.difficulty==d)&&(mode!='wrong'||st.wrong[c.id])&&(!q||[c.term,c.english,c.chinese,c.explain,c.module].join(' ').toLowerCase().includes(q)));idx=0;render()}function render(){stats();if(mode==='browse'){studyView.classList.add('hide');browseView.classList.remove('hide');browseCount.textContent=filtered.length;browseGrid.innerHTML=filtered.map((c,i)=>`<div class="mini" data-i="${i}"><h3>${esc(c.term)}</h3><p>${esc(c.english)}<br>${esc(c.chinese)}<br>${esc(c.module)} · ${esc(c.difficulty)}</p></div>`).join('');$$('.mini').forEach(x=>x.onclick=()=>{idx=+x.dataset.i;setMode('study')});return}browseView.classList.add('hide');studyView.classList.remove('hide');let c=filtered[idx];card.classList.remove('flip');if(!c){front.innerHTML='<div class="note">当前没有卡片，请调整筛选条件。</div>';back.innerHTML='';return}st.viewed[c.id]=1;save();front.innerHTML=`<div><div class="badges"><span class="badge">${esc(c.module)}</span><span class="badge">${esc(c.difficulty)}</span><span class="badge">${idx+1}/${filtered.length}</span></div><div class="term">${esc(c.term)}</div><div class="hint">点击翻卡；←/→ 切换；1 不熟悉；2 已熟悉</div></div>`;back.innerHTML=`<div><div class="badges"><span class="badge">${esc(c.id)}</span><span class="badge">${esc(c.module)}</span></div><h4>English Full Name</h4><div class="box"><b>${esc(c.english)}</b></div><h4>中文全称</h4><div class="box"><b>${esc(c.chinese)}</b></div><h4>中文 explain</h4><div class="explain">${esc(c.explain)}</div></div>`;wrongList.innerHTML=CARDS.filter(c=>st.wrong[c.id]).slice(-25).map(c=>`<div class="li" data-id="${c.id}"><b>${esc(c.term)}</b><span>${esc(c.chinese)} · ${esc(c.module)}</span></div>`).join('')||'<div class="note">暂无错卡。</div>';$$('.li').forEach(x=>x.onclick=()=>{let id=x.dataset.id;idx=filtered.findIndex(c=>c.id==id);if(idx<0){filtered=CARDS;idx=filtered.findIndex(c=>c.id==id)}render()})}function mark(k){let c=filtered[idx];if(!c)return;if(k){st.known[c.id]=1;delete st.wrong[c.id]}else{st.wrong[c.id]=1;delete st.known[c.id]}save();idx=(idx+1)%filtered.length;render()}function stats(){total.textContent=CARDS.length;shown.textContent=filtered.length;viewed.textContent=Object.keys(st.viewed).length;knownN.textContent=Object.keys(st.known).length;wrongN.textContent=Object.keys(st.wrong).length;let p=Math.round(Object.keys(st.viewed).length/CARDS.length*100);pct.textContent=p+'%';bar.style.width=p+'%'}function dl(n,s,t){let a=document.createElement('a'),b=new Blob([s],{type:t});a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href)}function csv(){let h=['id','term','english','chinese','module','difficulty','explain'];let rows=CARDS.map(c=>h.map(k=>'"'+String(c[k]).replace(/"/g,'""')+'"').join(','));dl('rag_flashcards_cards.csv',h.join(',')+'
'+rows.join('
'),'text/csv;charset=utf-8')}init();</script></body></html>
