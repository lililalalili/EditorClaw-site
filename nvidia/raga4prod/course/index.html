<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生产级 RAG Pipeline 在线课程平台</title>
<style>
:root{
  --bg:#f5f7fb; --card:#fff; --text:#172033; --muted:#667085;
  --primary:#4f46e5; --primary2:#06b6d4; --line:#e5e7eb;
  --green:#16a34a; --red:#dc2626; --amber:#f59e0b; --purple:#7c3aed;
  --shadow:0 20px 60px rgba(15,23,42,.10); --radius:22px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; font-family:"Segoe UI","Microsoft YaHei",Arial,sans-serif; color:var(--text);
  background:
    radial-gradient(circle at 0 0, rgba(79,70,229,.16), transparent 33%),
    radial-gradient(circle at 100% 0, rgba(6,182,212,.16), transparent 33%),
    linear-gradient(180deg,#f8fafc,#eef2ff 55%,#f8fafc);
  min-height:100vh;
}
.app{display:grid; grid-template-columns:290px 1fr; min-height:100vh}
.sidebar{
  position:sticky; top:0; height:100vh; overflow:auto;
  padding:20px 16px; border-right:1px solid rgba(226,232,240,.9);
  background:rgba(255,255,255,.78); backdrop-filter: blur(18px);
}
.brand{
  padding:16px; border-radius:20px; background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white; box-shadow:var(--shadow); margin-bottom:16px;
}
.brand h1{font-size:20px; margin:0 0 8px; line-height:1.25; letter-spacing:-.03em}
.brand p{margin:0; opacity:.92; font-size:12px; line-height:1.55}
.nav{display:flex; flex-direction:column; gap:8px; margin:16px 0}
.nav button{
  width:100%; text-align:left; border:1px solid transparent; background:transparent; color:var(--text);
  padding:12px 13px; border-radius:14px; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:10px;
}
.nav button:hover{background:#f1f5f9}
.nav button.active{background:#eef2ff; color:#3730a3; border-color:#c7d2fe; font-weight:700}
.progressBox{background:white; border:1px solid var(--line); border-radius:18px; padding:14px; margin-top:14px}
.progressBox h3{font-size:14px; margin:0 0 10px}
.progressLine{display:flex; justify-content:space-between; color:var(--muted); font-size:12px; margin-bottom:7px}
.bar{height:9px; background:#e5e7eb; border-radius:99px; overflow:hidden}
.fill{height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); width:0%; transition:.25s}
.tinyStats{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px}
.tiny{background:#f8fafc; border:1px solid #edf2f7; border-radius:14px; padding:10px}
.tiny b{display:block; color:var(--primary); font-size:18px}
.tiny span{font-size:11px; color:var(--muted)}
.main{padding:26px; max-width:1280px; width:100%; margin:0 auto}
.hero{
  background:rgba(255,255,255,.82); border:1px solid rgba(255,255,255,.9);
  border-radius:28px; padding:28px; box-shadow:var(--shadow); margin-bottom:18px;
}
.hero h2{font-size:34px; margin:0 0 10px; letter-spacing:-.04em}
.hero p{color:var(--muted); line-height:1.8; margin:0; max-width:920px}
.cards{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:18px 0}
.metric{
  background:white; border:1px solid var(--line); border-radius:20px; padding:16px; box-shadow:0 8px 24px rgba(15,23,42,.06)
}
.metric b{display:block; font-size:28px; color:var(--primary)}
.metric span{font-size:13px; color:var(--muted)}
.panel{
  background:rgba(255,255,255,.86); border:1px solid rgba(226,232,240,.92);
  border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; margin-bottom:18px;
}
.panel h3{font-size:22px; margin:0 0 12px; letter-spacing:-.02em}
.panel h4{font-size:17px; margin:18px 0 8px}
.panel p,.panel li{line-height:1.85}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
.pill{display:inline-flex; align-items:center; gap:7px; background:#eef2ff; color:#3730a3; border:1px solid #c7d2fe; border-radius:999px; padding:6px 10px; font-size:12px}
.btnrow{display:flex; flex-wrap:wrap; gap:10px; margin:12px 0}
button,.btn{
  font-family:inherit; border:1px solid var(--line); background:white; color:var(--text);
  border-radius:14px; padding:10px 14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:8px;
  box-shadow:0 6px 18px rgba(15,23,42,.06); transition:.18s;
}
button:hover,.btn:hover{transform:translateY(-1px); box-shadow:0 10px 22px rgba(15,23,42,.10)}
.primary{background:linear-gradient(135deg,var(--primary),var(--primary2)); color:white; border-color:transparent}
.green{background:#ecfdf5; color:#166534; border-color:#bbf7d0}
.red{background:#fef2f2; color:#991b1b; border-color:#fecaca}
.amber{background:#fffbeb; color:#92400e; border-color:#fde68a}
input,select{
  font-family:inherit; border:1px solid var(--line); border-radius:14px; padding:11px 12px;
  background:white; outline:none; min-height:42px;
}
input:focus,select:focus{border-color:var(--primary); box-shadow:0 0 0 4px rgba(79,70,229,.10)}
.toolbar{display:grid; grid-template-columns:1.3fr .8fr .7fr; gap:12px; margin:12px 0 18px}
.chapterNav{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0}
.chapterNav button{box-shadow:none; padding:8px 11px; font-size:12px}
.chapterNav button.active{background:#eef2ff; border-color:#c7d2fe; color:#3730a3; font-weight:700}
.chapterContent{display:grid; grid-template-columns:280px 1fr; gap:18px}
.outline{
  border:1px solid var(--line); border-radius:18px; padding:14px; background:#f8fafc; align-self:start; position:sticky; top:20px;
}
.outline h4{margin:0 0 10px}
.outline button{width:100%; text-align:left; box-shadow:none; margin-bottom:6px; font-size:13px; padding:9px 10px; display:block}
.reading h2{font-size:28px; margin:0 0 10px}
.objectives{background:#f8fafc; border:1px dashed #cbd5e1; border-radius:18px; padding:14px 18px}
.section{padding:16px 0; border-bottom:1px solid var(--line)}
.section:last-child{border-bottom:0}
.flashWrap{display:grid; grid-template-columns:1fr 320px; gap:18px}
.flashcard{min-height:380px; perspective:1200px}
.flashInner{position:relative; height:100%; min-height:380px; transition:transform .55s; transform-style:preserve-3d}
.flashInner.flipped{transform:rotateY(180deg)}
.face{
  position:absolute; inset:0; border-radius:24px; backface-visibility:hidden; padding:32px;
  background:linear-gradient(145deg,#fff,#f8fafc); border:1px solid var(--line);
  box-shadow:inset 0 1px 0 white, 0 12px 32px rgba(15,23,42,.08);
  display:flex; flex-direction:column; justify-content:center;
}
.face.back{transform:rotateY(180deg); justify-content:flex-start; overflow:auto}
.term{font-size:54px; font-weight:850; text-align:center; letter-spacing:-.05em; margin:0}
.face .hint{text-align:center; color:var(--muted)}
.field{border-bottom:1px solid var(--line); padding:12px 0}
.field:last-child{border-bottom:0}
.label{font-size:12px; color:var(--muted); margin-bottom:6px}
.value{font-size:17px; line-height:1.75}
.list{display:flex; flex-direction:column; gap:8px; max-height:420px; overflow:auto}
.listItem{
  padding:10px 12px; border:1px solid var(--line); background:white; border-radius:14px; cursor:pointer; font-size:13px;
}
.listItem.active{background:#eef2ff; border-color:#c7d2fe; color:#3730a3; font-weight:700}
.quizCard{border:1px solid var(--line); border-radius:20px; background:white; padding:18px}
.option{
  border:1px solid var(--line); border-radius:14px; padding:11px 12px; margin:8px 0; cursor:pointer; background:#f8fafc;
}
.option.selected{border-color:#818cf8; background:#eef2ff}
.option.correct{border-color:#86efac; background:#ecfdf5}
.option.wrong{border-color:#fca5a5; background:#fef2f2}
.quizMeta{display:flex; flex-wrap:wrap; gap:10px; align-items:center; color:var(--muted); font-size:13px; margin-bottom:10px}
.explain{background:#f8fafc; border-left:4px solid var(--primary); border-radius:12px; padding:12px 14px; margin-top:12px; line-height:1.75}
.examTop{display:flex; justify-content:space-between; gap:10px; align-items:center; margin:10px 0 16px}
.timer{font-size:22px; font-weight:800; color:#3730a3; background:#eef2ff; padding:8px 12px; border-radius:14px}
.labGrid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
.labCard{background:white; border:1px solid var(--line); border-radius:18px; padding:16px}
.labCard h4{margin-top:0}
.downloadGrid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
.download{background:white; border:1px solid var(--line); border-radius:18px; padding:16px}
.download b{display:block; margin-bottom:6px}
.download p{font-size:13px; color:var(--muted); margin:0 0 12px; line-height:1.6}
.tableWrap{overflow:auto}
table{border-collapse:collapse; width:100%; background:white; border-radius:14px; overflow:hidden}
td,th{border:1px solid var(--line); padding:10px; text-align:left; vertical-align:top; font-size:13px}
th{background:#f8fafc}
.hidden{display:none!important}
.toast{
  position:fixed; right:22px; bottom:22px; background:#111827; color:white; padding:12px 14px; border-radius:14px;
  box-shadow:var(--shadow); opacity:0; pointer-events:none; transform:translateY(10px); transition:.2s; z-index:99
}
.toast.show{opacity:1; transform:translateY(0)}
.kbd{font-family:ui-monospace,SFMono-Regular,Consolas,monospace; background:white; border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:1px 6px}
@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.main{padding:16px}.cards,.grid3,.downloadGrid{grid-template-columns:1fr 1fr}.chapterContent,.flashWrap{grid-template-columns:1fr}.outline{position:static}.labGrid{grid-template-columns:1fr}}
@media(max-width:680px){.cards,.grid2,.grid3,.toolbar,.downloadGrid{grid-template-columns:1fr}.hero h2{font-size:26px}.term{font-size:38px}.examTop{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>生产级 RAG Pipeline 在线课程</h1>
      <p>教材阅读 · 知识卡片 · 在线刷题 · 模拟考试 · 实验手册 · 进度追踪</p>
    </div>
    <nav class="nav" id="nav">
      <button data-view="home" class="active">🏠 首页</button>
      <button data-view="course">📖 教材阅读</button>
      <button data-view="cards">🧠 知识卡片</button>
      <button data-view="practice">✅ 在线刷题</button>
      <button data-view="exam">⏱️ 模拟考试</button>
      <button data-view="labs">🧪 实验手册</button>
      <button data-view="progress">📊 学习进度</button>
      <button data-view="resources">📦 资源下载</button>
    </nav>
    <div class="progressBox">
      <h3>总体学习进度</h3>
      <div class="progressLine"><span>完成度</span><span id="overallPct">0%</span></div>
      <div class="bar"><div id="overallFill" class="fill"></div></div>
      <div class="tinyStats">
        <div class="tiny"><b id="readCount">0</b><span>已读章节</span></div>
        <div class="tiny"><b id="masteredCount">0</b><span>掌握卡片</span></div>
        <div class="tiny"><b id="quizCount">0</b><span>已答题</span></div>
        <div class="tiny"><b id="bestScore">0%</b><span>最佳考试</span></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <section id="view-home" class="view"></section>
    <section id="view-course" class="view hidden"></section>
    <section id="view-cards" class="view hidden"></section>
    <section id="view-practice" class="view hidden"></section>
    <section id="view-exam" class="view hidden"></section>
    <section id="view-labs" class="view hidden"></section>
    <section id="view-progress" class="view hidden"></section>
    <section id="view-resources" class="view hidden"></section>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const DATA = {"chapters": [{"id": "ch01", "title": "第1章 从 RAG 原型到生产级系统", "objectives": ["理解 RAG 的基本思想与企业级价值", "区分 Demo 级 RAG 与生产级 RAG 的核心差异", "掌握生产部署需要关注的质量、性能、安全和运维维度"], "content": [{"heading": "1.1 RAG 的核心思想", "body": "RAG（Retrieval-Augmented Generation，检索增强生成）把外部知识检索系统与大语言模型结合起来。用户提问后，系统先从知识库中召回相关证据，再把这些证据作为上下文交给 LLM 生成答案。这样可以降低模型仅依赖参数记忆造成的幻觉，并让答案具备可追溯来源。"}, {"heading": "1.2 企业为什么需要 RAG", "body": "企业知识通常不断变化，并分布在 PDF、网页、内部文档、数据库、工单系统和知识库中。RAG 允许模型在受控权限下使用最新、可审计、可引用的企业知识，而不必频繁重新训练大模型。"}, {"heading": "1.3 生产级 RAG 的要求", "body": "生产级系统不仅要“能回答”，还要稳定、低延迟、可扩展、可监控、可回滚、可评估、可审计，并能处理权限、安全和成本问题。这是本课程区别于普通 RAG 入门课程的关键。"}], "exercise": "请列出 Demo 级 RAG 与生产级 RAG 的 5 个差异，并说明为什么这些差异会影响上线。", "answer": "可从数据规模、部署方式、监控、权限控制、评估体系、回滚机制、并发性能和成本管理等方面回答。Demo 级 RAG 关注跑通流程，生产级 RAG 关注真实业务条件下的可靠运行。"}, {"id": "ch02", "title": "第2章 生产级 RAG 总体架构", "objectives": ["理解离线 ingestion pipeline 与在线 query pipeline", "掌握 chunk、metadata、embedding、vector store、rerank、generation 的角色", "能够画出端到端 RAG 架构图"], "content": [{"heading": "2.1 两条主线", "body": "生产级 RAG 通常包含离线数据摄取管线和在线查询管线。离线管线负责文档解析、清洗、切分、向量化和索引构建；在线管线负责问题处理、检索、重排序、上下文组装、生成和引用返回。"}, {"heading": "2.2 Chunk 与 Metadata", "body": "chunk 是检索的基本单元。每个 chunk 应记录来源文档、页码、标题层级、更新时间、版本号和权限标签等 metadata。metadata 是权限过滤、引用溯源和索引维护的基础。"}, {"heading": "2.3 Context Assembly", "body": "上下文组装不是简单拼接文本，而是要综合排序、去重、token 限制、引用标记、权限边界和 prompt 模板要求。好的上下文组装决定最终答案是否准确、完整和可引用。"}], "exercise": "画出一个包含 ingestion pipeline 与 query pipeline 的 RAG 架构图，并标出每个组件输入输出。", "answer": "图中应包含数据源、解析、清洗、chunking、embedding、向量库、用户问题、query embedding、检索、rerank、prompt/context assembly、LLM、答案与引用。"}, {"id": "ch03", "title": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈", "objectives": ["理解 NVIDIA NIM microservices 的生产部署价值", "掌握 Embedding NIM、Reranking NIM 和 LLM NIM 在 RAG 中的作用", "理解 RAG Blueprint 与 NIM Operator 的工程意义"], "content": [{"heading": "3.1 NIM Microservices", "body": "NIM 是 NVIDIA 面向生产部署的模型推理微服务形态。它把模型服务封装为可部署、可扩展、可调用的 API 服务，适合在云端或数据中心运行。"}, {"heading": "3.2 NeMo Retriever", "body": "NeMo Retriever 关注企业信息检索与 RAG。Embedding NIM 负责把问题和文档片段编码为向量；Reranking NIM 负责对初始召回结果重新排序，提高进入 LLM 的上下文质量。"}, {"heading": "3.3 Blueprint 与 Operator", "body": "RAG Blueprint 可作为端到端 RAG 架构参考；NIM Operator 则帮助在 Kubernetes 中管理 NIM 服务的生命周期、模型缓存、扩缩容和运维配置。"}], "exercise": "解释 Embedding NIM 与 Reranking NIM 的区别，并说明二者如何协同提高 RAG 质量。", "answer": "Embedding NIM 用于召回候选文档，Reranking NIM 用于对候选文档进行精排。前者追求召回，后者提高排序质量和上下文相关性。"}, {"id": "ch04", "title": "第4章 Kubernetes 与 Helm 基础", "objectives": ["理解 Kubernetes 中 Pod、Deployment、Service、Ingress、Secret、ConfigMap 的作用", "理解 Helm chart 与 values.yaml 的意义", "掌握为什么生产级 RAG 适合在 Kubernetes 上部署"], "content": [{"heading": "4.1 Kubernetes 的价值", "body": "RAG pipeline 由多个服务组成，包括 embedding、reranker、LLM、RAG server、向量数据库、对象存储和监控服务。Kubernetes 提供统一的调度、健康检查、滚动更新和弹性扩缩容能力。"}, {"heading": "4.2 配置与密钥", "body": "ConfigMap 用于保存非敏感配置，如 top_k、模型名称和日志级别；Secret 用于保存 NGC API key、数据库密码和服务 token。生产系统应避免把密钥写入代码或明文配置。"}, {"heading": "4.3 Helm 的价值", "body": "Helm 将多个 Kubernetes YAML 文件组织为 chart，并通过 values.yaml 参数化部署。它让同一套 RAG 服务可以更容易地部署到 dev、staging 和 prod 环境。"}], "exercise": "说明为什么不建议直接手写并手动维护大量 Kubernetes YAML 文件。", "answer": "手动维护 YAML 易出错、难复用、难版本化、难跨环境迁移。Helm 可以模板化和参数化部署，提高一致性和可维护性。"}, {"id": "ch05", "title": "第5章 端到端部署流程", "objectives": ["掌握部署前的环境准备清单", "理解 namespace、secret、NIM 服务、RAG server 的部署顺序", "能够用 kubectl 检查服务状态"], "content": [{"heading": "5.1 部署前准备", "body": "部署前应确认 Kubernetes 集群、GPU 节点、NVIDIA GPU Operator、Helm、NGC 凭据、镜像网络、存储类和监控组件可用。任何一个基础设施问题都可能导致服务启动失败。"}, {"heading": "5.2 推荐部署顺序", "body": "通常先创建 namespace 和 secret，再部署 embedding、reranker、LLM、向量数据库、RAG server 和 ingestor server，最后配置入口路由和监控。"}, {"heading": "5.3 验证与回滚", "body": "部署后应使用 kubectl get pods、kubectl describe pod、kubectl logs 和服务健康检查确认状态。上线系统应支持版本回滚，包括服务版本、模型版本、prompt 版本和索引版本。"}], "exercise": "写出你会在 RAG 部署后执行的 6 个验证命令或检查点。", "answer": "可包括 kubectl get pods、get svc、describe pod、logs、检查 GPU 资源、访问健康检查接口、发起测试 query、查看监控 dashboard 等。"}, {"id": "ch06", "title": "第6章 性能优化与容量规划", "objectives": ["理解 QPS、P95/P99、TTFT、tokens/s 等指标", "掌握 RAG 总延迟的拆解方式", "能够提出 embedding、检索、rerank 和 LLM 推理优化策略"], "content": [{"heading": "6.1 延迟拆解", "body": "一次 RAG 请求的总延迟包括网关、query embedding、向量检索、reranking、上下文组装、LLM prefill、LLM decode 和后处理。优化必须定位瓶颈，而不是只盯着 LLM。"}, {"heading": "6.2 检索与 Rerank 优化", "body": "top_k 太小会漏召回，太大会增加噪声和延迟。rerank 能提高上下文质量，但候选集过大会显著增加耗时。生产系统应通过评估集和压力测试找到平衡点。"}, {"heading": "6.3 LLM 推理优化", "body": "常见策略包括选择合适模型、限制 max_tokens、启用缓存、批处理、优化 KV cache、流式输出和自动扩缩容。GPU 利用率过低或过高都可能说明资源配置不合理。"}], "exercise": "如果 RAG 系统 P95 latency 过高，你会如何逐层定位瓶颈？", "answer": "应拆分记录 embedding、vector search、rerank、prompt assembly、LLM prefill/decode 和后处理耗时，再结合 GPU、队列长度、top_k、rerank_k、token 数和错误日志定位。"}, {"id": "ch07", "title": "第7章 可观测性、日志与监控", "objectives": ["理解 metrics、logs、tracing 的差异与互补关系", "掌握 RAG 应记录的质量日志", "能够设计一个基础 Grafana 监控面板"], "content": [{"heading": "7.1 为什么 RAG 需要可观测性", "body": "RAG 的问题不一定表现为服务宕机，也可能是答案质量下降、检索召回变差、引用不准或权限过滤异常。因此可观测性必须覆盖系统指标与质量指标。"}, {"heading": "7.2 系统指标", "body": "应监控请求数、错误率、P95/P99 延迟、GPU 利用率、显存、tokens/s、embedding latency、rerank latency、vector search latency、Pod 重启次数和超时率。"}, {"heading": "7.3 质量日志", "body": "建议记录 query、retrieved chunks、rerank scores、final context、answer、citations、model version、prompt version、index version 和用户反馈。这些数据构成后续评估和数据飞轮。"}], "exercise": "设计一个 RAG 监控 dashboard，至少列出 10 个指标。", "answer": "可包括 QPS、错误率、P95/P99、TTFT、tokens/s、GPU 使用率、显存、retrieval latency、rerank latency、LLM latency、timeout rate、cache hit rate、citation accuracy 等。"}, {"id": "ch08", "title": "第8章 RAG 质量评估与回归测试", "objectives": ["掌握 Recall@k、Precision@k、MRR、nDCG 等检索指标", "理解 faithfulness、answer correctness、citation accuracy 等生成指标", "能够设计 RAG 离线评估集"], "content": [{"heading": "8.1 检索评估", "body": "检索阶段需要回答：正确证据是否被召回？是否排在足够靠前的位置？常用指标包括 Recall@k、Precision@k、MRR、nDCG 和 Hit Rate。"}, {"heading": "8.2 生成评估", "body": "生成阶段需要回答：答案是否正确？是否忠实于上下文？引用是否支持结论？不可回答时是否拒答？这些指标决定 RAG 是否可信。"}, {"heading": "8.3 回归测试", "body": "每次更换模型、修改 prompt、更新 chunking 策略、重建索引或接入新数据源后，都应运行评估集，防止新版本破坏已有能力。"}], "exercise": "设计一个包含 20 个问题的小型 RAG 评估集，应覆盖哪些问题类型？", "answer": "应覆盖普通事实问题、多跳问题、同义表达问题、不可回答问题、权限边界问题、时间敏感问题、引用要求问题和高相似文档干扰问题。"}, {"id": "ch09", "title": "第9章 安全、权限与合规", "objectives": ["理解 RAG 中权限过滤必须进入检索层", "掌握 prompt injection、数据泄露和 PII 风险", "能够提出生产环境中的密钥与审计方案"], "content": [{"heading": "9.1 权限过滤", "body": "生产级 RAG 最危险的问题之一是用户通过模型间接访问无权限文档。因此每个 chunk 应带权限 metadata，检索阶段和上下文组装阶段都应执行权限检查。"}, {"heading": "9.2 Prompt Injection", "body": "被检索文档可能包含恶意指令，例如要求模型忽略系统提示、泄露密钥或输出内部信息。应把文档内容视为不可信数据，并通过 guardrails 与提示隔离降低风险。"}, {"heading": "9.3 审计与密钥管理", "body": "生产系统应使用 Secret、Vault 或 KMS 管理密钥，并记录谁在何时访问了哪些数据、系统返回了哪些引用和答案，以满足审计与合规要求。"}], "exercise": "说明为什么只在前端 UI 做权限控制不足以保护 RAG 知识库。", "answer": "因为用户请求仍可能绕过 UI 或通过检索与模型间接访问数据。权限必须在检索层、上下文组装层和服务端审计层执行。"}, {"id": "ch10", "title": "第10章 常见故障与排查", "objectives": ["识别 Pod Pending、ImagePullBackOff、CrashLoopBackOff、OOMKilled 等状态", "掌握 kubectl describe/logs 的排查思路", "能够从系统、模型、索引和配置多个层面定位 RAG 问题"], "content": [{"heading": "10.1 部署故障", "body": "Pod Pending 常由 GPU 不足、PVC 未绑定、node selector 不匹配或资源请求过高导致。ImagePullBackOff 常由镜像名、凭据或网络问题导致。"}, {"heading": "10.2 运行故障", "body": "CrashLoopBackOff 说明容器反复崩溃，OOMKilled 说明资源限制不足。模型服务常因模型下载、显存不足、配置错误或依赖不可用而失败。"}, {"heading": "10.3 质量故障", "body": "答案不准可能来自 chunking、embedding、检索 top_k、rerank、prompt、知识库过期或评估集不足。排查时应分离检索问题与生成问题。"}], "exercise": "如果用户反馈答案引用错误，你会如何定位原因？", "answer": "检查 retrieved chunks、rerank scores、context assembly、citation mapping、prompt 模板和答案生成逻辑，确认引用是否在后处理阶段错配或检索本身不相关。"}, {"id": "ch11", "title": "第11章 实验手册与工程实践", "objectives": ["能够完成最小 RAG pipeline 的实验设计", "掌握压力测试、监控接入、回归评估和故障演练的实践流程", "形成从实验到上线的工程闭环"], "content": [{"heading": "11.1 实验设计原则", "body": "每个实验应包含目标、环境、步骤、预期结果、验证命令、常见问题和思考题。生产课程的实验不应只追求跑通，还要训练排查与评估能力。"}, {"heading": "11.2 压力测试", "body": "可使用 k6、Locust 或自写异步脚本模拟并发请求，记录 QPS、P95/P99、错误率、GPU 使用率和各阶段耗时。"}, {"heading": "11.3 上线演练", "body": "上线前应完成配置检查、权限检查、评估集回归、监控告警、备份恢复、回滚演练和灾难恢复预案。"}], "exercise": "为本课程设计一个 2 小时实验课安排，包括实验目标、步骤和验收标准。", "answer": "可安排部署前检查、创建 namespace/secret、部署 mock embedding/rerank/RAG server、导入测试文档、发起查询、查看日志、压测和填写上线 checklist。"}, {"id": "ch12", "title": "第12章 生产上线 Checklist 与持续改进", "objectives": ["掌握生产上线前的架构、性能、质量、安全和运维检查项", "理解数据飞轮和持续改进机制", "能够设计 RAG 系统的版本管理与发布策略"], "content": [{"heading": "12.1 上线 Checklist", "body": "上线前应检查数据摄取、索引版本、模型版本、prompt 版本、权限规则、监控告警、备份、回滚、评估结果和安全扫描。Checklist 是将工程经验制度化的工具。"}, {"heading": "12.2 数据飞轮", "body": "生产日志、用户反馈、错误分析和专家标注应持续进入评估集与改进流程。RAG 系统不是一次性上线，而是持续评估和迭代的系统。"}, {"heading": "12.3 发布策略", "body": "重要变更应使用 staging 验证、回归测试、金丝雀发布、灰度放量和回滚预案。模型、prompt、索引和配置都应有版本记录。"}], "exercise": "请为一个企业知识库 RAG 系统制定上线前 15 项检查清单。", "answer": "可包括数据源、解析、chunk、metadata、权限、embedding、索引、rerank、prompt、LLM、引用、评估集、性能压测、监控告警、日志审计、备份、回滚、密钥和网络策略。"}], "flashcards": [{"id": "fc001", "front": "RAG", "en": "Retrieval-Augmented Generation", "zh": "检索增强生成", "explain": "将检索系统与大语言模型结合，让模型基于外部知识证据生成答案。", "chapter": "第1章 从 RAG 原型到生产级系统"}, {"id": "fc002", "front": "LLM", "en": "Large Language Model", "zh": "大语言模型", "explain": "能够理解和生成自然语言的基础模型，在 RAG 中负责根据检索上下文生成答案。", "chapter": "第1章 从 RAG 原型到生产级系统"}, {"id": "fc003", "front": "NIM", "en": "NVIDIA Inference Microservice", "zh": "NVIDIA 推理微服务", "explain": "NVIDIA 提供的面向生产部署的模型推理微服务形态。", "chapter": "第1章 从 RAG 原型到生产级系统"}, {"id": "fc004", "front": "NeMo Retriever", "en": "NVIDIA NeMo Retriever", "zh": "NVIDIA NeMo 检索组件", "explain": "面向企业检索和 RAG 的 NVIDIA 组件集合，包含 embedding 与 reranking 等能力。", "chapter": "第1章 从 RAG 原型到生产级系统"}, {"id": "fc005", "front": "Embedding", "en": "Text Embedding", "zh": "文本嵌入/向量表示", "explain": "把文本转换为向量，使系统可以计算语义相似度并进行向量检索。", "chapter": "第1章 从 RAG 原型到生产级系统"}, {"id": "fc006", "front": "Reranking", "en": "Text Reranking", "zh": "文本重排序", "explain": "对初始检索候选结果进行精排，提高进入 LLM 上下文的证据质量。", "chapter": "第1章 从 RAG 原型到生产级系统"}, {"id": "fc007", "front": "Vector Store", "en": "Vector Database", "zh": "向量数据库", "explain": "存储 embedding 并支持相似度检索、metadata filter 和索引管理的数据库。", "chapter": "第2章 生产级 RAG 总体架构"}, {"id": "fc008", "front": "Chunk", "en": "Text Chunk", "zh": "文本片段", "explain": "文档被切分后的检索基本单元。", "chapter": "第2章 生产级 RAG 总体架构"}, {"id": "fc009", "front": "Chunking", "en": "Text Chunking", "zh": "文本切分", "explain": "将文档按长度、标题、段落或语义切分成多个 chunk 的过程。", "chapter": "第2章 生产级 RAG 总体架构"}, {"id": "fc010", "front": "Metadata", "en": "Metadata", "zh": "元数据", "explain": "描述文档或 chunk 的来源、页码、权限、版本、更新时间等信息。", "chapter": "第2章 生产级 RAG 总体架构"}, {"id": "fc011", "front": "Context Assembly", "en": "Context Assembly", "zh": "上下文组装", "explain": "将检索和重排序后的片段组合进 prompt 的过程。", "chapter": "第2章 生产级 RAG 总体架构"}, {"id": "fc012", "front": "Prompt Template", "en": "Prompt Template", "zh": "提示词模板", "explain": "组织系统指令、用户问题、上下文和输出格式要求的模板。", "chapter": "第2章 生产级 RAG 总体架构"}, {"id": "fc013", "front": "Kubernetes", "en": "Kubernetes", "zh": "容器编排平台", "explain": "用于部署、调度、扩缩容和管理容器化应用的平台。", "chapter": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈"}, {"id": "fc014", "front": "K8s", "en": "Kubernetes", "zh": "Kubernetes 缩写", "explain": "Kubernetes 的常用缩写，常用于生产级 AI 服务部署。", "chapter": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈"}, {"id": "fc015", "front": "Pod", "en": "Kubernetes Pod", "zh": "Kubernetes 最小调度单元", "explain": "运行一个或多个容器的基本单位。", "chapter": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈"}, {"id": "fc016", "front": "Deployment", "en": "Kubernetes Deployment", "zh": "部署控制器", "explain": "声明和维护一组 Pod 副本，支持滚动更新和回滚。", "chapter": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈"}, {"id": "fc017", "front": "Service", "en": "Kubernetes Service", "zh": "服务暴露对象", "explain": "为 Pod 提供稳定访问入口和负载均衡。", "chapter": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈"}, {"id": "fc018", "front": "Ingress", "en": "Kubernetes Ingress", "zh": "入口路由", "explain": "将外部 HTTP/HTTPS 请求路由到内部服务。", "chapter": "第3章 NVIDIA NIM 与 NeMo Retriever 技术栈"}, {"id": "fc019", "front": "Namespace", "en": "Kubernetes Namespace", "zh": "命名空间", "explain": "用于隔离 Kubernetes 资源的逻辑空间。", "chapter": "第4章 Kubernetes 与 Helm 基础"}, {"id": "fc020", "front": "Secret", "en": "Kubernetes Secret", "zh": "密钥对象", "explain": "保存 API key、数据库密码等敏感信息。", "chapter": "第4章 Kubernetes 与 Helm 基础"}, {"id": "fc021", "front": "ConfigMap", "en": "Kubernetes ConfigMap", "zh": "配置映射", "explain": "保存非敏感配置，如模型名称、top_k 和日志级别。", "chapter": "第4章 Kubernetes 与 Helm 基础"}, {"id": "fc022", "front": "PVC", "en": "PersistentVolumeClaim", "zh": "持久卷声明", "explain": "为应用申请持久化存储的 Kubernetes 对象。", "chapter": "第4章 Kubernetes 与 Helm 基础"}, {"id": "fc023", "front": "Helm", "en": "Helm", "zh": "Kubernetes 应用包管理器", "explain": "用于模板化、参数化和部署 Kubernetes 应用。", "chapter": "第4章 Kubernetes 与 Helm 基础"}, {"id": "fc024", "front": "Helm Chart", "en": "Helm Chart", "zh": "Helm 应用包", "explain": "一组模板化 Kubernetes 资源文件和默认配置。", "chapter": "第4章 Kubernetes 与 Helm 基础"}, {"id": "fc025", "front": "values.yaml", "en": "Helm Values File", "zh": "Helm 参数配置文件", "explain": "为 Helm chart 提供环境相关参数的配置文件。", "chapter": "第5章 端到端部署流程"}, {"id": "fc026", "front": "GPU Operator", "en": "NVIDIA GPU Operator", "zh": "NVIDIA GPU 运维算子", "explain": "自动化管理 Kubernetes GPU 驱动、设备插件和运行环境。", "chapter": "第5章 端到端部署流程"}, {"id": "fc027", "front": "RAG Server", "en": "RAG Server", "zh": "RAG 服务端", "explain": "编排 embedding、检索、rerank、LLM 和后处理的核心服务。", "chapter": "第5章 端到端部署流程"}, {"id": "fc028", "front": "Ingestor Server", "en": "Ingestor Server", "zh": "数据摄取服务端", "explain": "负责文档导入、解析、切分、向量化和索引写入。", "chapter": "第5章 端到端部署流程"}, {"id": "fc029", "front": "QPS", "en": "Queries Per Second", "zh": "每秒查询数", "explain": "衡量系统吞吐能力的指标。", "chapter": "第5章 端到端部署流程"}, {"id": "fc030", "front": "P95 Latency", "en": "95th Percentile Latency", "zh": "第 95 百分位延迟", "explain": "95% 请求的响应时间低于该值。", "chapter": "第5章 端到端部署流程"}, {"id": "fc031", "front": "P99 Latency", "en": "99th Percentile Latency", "zh": "第 99 百分位延迟", "explain": "99% 请求的响应时间低于该值。", "chapter": "第6章 性能优化与容量规划"}, {"id": "fc032", "front": "TTFT", "en": "Time To First Token", "zh": "首 token 延迟", "explain": "从请求发起到生成第一个 token 的时间。", "chapter": "第6章 性能优化与容量规划"}, {"id": "fc033", "front": "tokens/s", "en": "Tokens Per Second", "zh": "每秒生成 token 数", "explain": "衡量 LLM 解码吞吐速度的指标。", "chapter": "第6章 性能优化与容量规划"}, {"id": "fc034", "front": "GPU Utilization", "en": "GPU Utilization", "zh": "GPU 利用率", "explain": "GPU 计算资源被使用的比例。", "chapter": "第6章 性能优化与容量规划"}, {"id": "fc035", "front": "Batching", "en": "Request Batching", "zh": "请求批处理", "explain": "将多个请求合并执行以提升 GPU 吞吐。", "chapter": "第6章 性能优化与容量规划"}, {"id": "fc036", "front": "KV Cache", "en": "Key-Value Cache", "zh": "键值缓存", "explain": "LLM 推理中缓存历史 token 的注意力键值以减少重复计算。", "chapter": "第6章 性能优化与容量规划"}, {"id": "fc037", "front": "Autoscaling", "en": "Autoscaling", "zh": "自动扩缩容", "explain": "根据负载或指标自动增加或减少服务副本。", "chapter": "第7章 可观测性、日志与监控"}, {"id": "fc038", "front": "top_k", "en": "Top-K Retrieval", "zh": "前 K 个检索结果", "explain": "检索阶段返回的候选结果数量。", "chapter": "第7章 可观测性、日志与监控"}, {"id": "fc039", "front": "rerank_k", "en": "Top-K After Reranking", "zh": "重排序后保留数量", "explain": "reranker 精排后进入上下文的候选数量。", "chapter": "第7章 可观测性、日志与监控"}, {"id": "fc040", "front": "Observability", "en": "Observability", "zh": "可观测性", "explain": "通过指标、日志和链路追踪了解系统状态的能力。", "chapter": "第7章 可观测性、日志与监控"}, {"id": "fc041", "front": "Metrics", "en": "Metrics", "zh": "指标", "explain": "QPS、延迟、错误率、GPU 使用率等可量化数据。", "chapter": "第7章 可观测性、日志与监控"}, {"id": "fc042", "front": "Logs", "en": "Logs", "zh": "日志", "explain": "系统运行时记录的事件、请求和错误信息。", "chapter": "第7章 可观测性、日志与监控"}, {"id": "fc043", "front": "Tracing", "en": "Distributed Tracing", "zh": "分布式链路追踪", "explain": "记录一次请求跨多个服务的调用链和耗时。", "chapter": "第8章 RAG 质量评估与回归测试"}, {"id": "fc044", "front": "Prometheus", "en": "Prometheus", "zh": "指标采集系统", "explain": "常用的开源监控和指标采集工具。", "chapter": "第8章 RAG 质量评估与回归测试"}, {"id": "fc045", "front": "Grafana", "en": "Grafana", "zh": "可视化看板", "explain": "展示监控指标、日志和告警状态的平台。", "chapter": "第8章 RAG 质量评估与回归测试"}, {"id": "fc046", "front": "OpenTelemetry", "en": "OpenTelemetry", "zh": "开放遥测框架", "explain": "统一采集 metrics、logs 和 traces 的标准。", "chapter": "第8章 RAG 质量评估与回归测试"}, {"id": "fc047", "front": "Recall@k", "en": "Recall at K", "zh": "前 K 召回率", "explain": "正确证据是否出现在前 K 个检索结果中的比例。", "chapter": "第8章 RAG 质量评估与回归测试"}, {"id": "fc048", "front": "Precision@k", "en": "Precision at K", "zh": "前 K 精确率", "explain": "前 K 个结果中真正相关结果所占比例。", "chapter": "第8章 RAG 质量评估与回归测试"}, {"id": "fc049", "front": "MRR", "en": "Mean Reciprocal Rank", "zh": "平均倒数排名", "explain": "衡量第一个相关结果排名位置的指标。", "chapter": "第9章 安全、权限与合规"}, {"id": "fc050", "front": "nDCG", "en": "Normalized Discounted Cumulative Gain", "zh": "归一化折损累计增益", "explain": "考虑相关性等级和排序位置的检索排序指标。", "chapter": "第9章 安全、权限与合规"}, {"id": "fc051", "front": "Faithfulness", "en": "Faithfulness", "zh": "忠实性", "explain": "答案是否严格由检索上下文支持。", "chapter": "第9章 安全、权限与合规"}, {"id": "fc052", "front": "Answer Correctness", "en": "Answer Correctness", "zh": "答案正确性", "explain": "答案是否准确回答用户问题。", "chapter": "第9章 安全、权限与合规"}, {"id": "fc053", "front": "Citation Accuracy", "en": "Citation Accuracy", "zh": "引用准确性", "explain": "引用来源是否真正支持对应答案结论。", "chapter": "第9章 安全、权限与合规"}, {"id": "fc054", "front": "Refusal Accuracy", "en": "Refusal Accuracy", "zh": "拒答准确性", "explain": "不可回答或越权时系统是否正确拒答。", "chapter": "第9章 安全、权限与合规"}, {"id": "fc055", "front": "LLM-as-a-Judge", "en": "Large Language Model as a Judge", "zh": "以大模型作为评判器", "explain": "使用 LLM 辅助评估答案质量和忠实性的方法。", "chapter": "第10章 常见故障与排查"}, {"id": "fc056", "front": "Regression Testing", "en": "Regression Testing", "zh": "回归测试", "explain": "变更后重新运行评估集，确认已有能力未被破坏。", "chapter": "第10章 常见故障与排查"}, {"id": "fc057", "front": "RBAC", "en": "Role-Based Access Control", "zh": "基于角色的访问控制", "explain": "根据用户角色分配访问权限。", "chapter": "第10章 常见故障与排查"}, {"id": "fc058", "front": "ABAC", "en": "Attribute-Based Access Control", "zh": "基于属性的访问控制", "explain": "根据用户、资源和环境属性动态决定权限。", "chapter": "第10章 常见故障与排查"}, {"id": "fc059", "front": "Prompt Injection", "en": "Prompt Injection", "zh": "提示注入攻击", "explain": "通过输入或文档中的恶意指令诱导模型违反规则。", "chapter": "第10章 常见故障与排查"}, {"id": "fc060", "front": "PII", "en": "Personally Identifiable Information", "zh": "个人可识别信息", "explain": "可识别个人身份的信息，如姓名、电话、邮箱和证件号。", "chapter": "第10章 常见故障与排查"}, {"id": "fc061", "front": "Audit Log", "en": "Audit Log", "zh": "审计日志", "explain": "记录访问、操作、引用和答案的合规日志。", "chapter": "第11章 实验 const STORE = "rag_production_course_platform_v1";
let state = loadState();

function loadState(){
  try{return JSON.parse(localStorage.getItem(STORE)) || {read:{}, cards:{}, quiz:{}, exams:[]};}
  catch(e){return {read:{}, cards:{}, quiz:{}, exams:[]};}
}
function saveState(){localStorage.setItem(STORE, JSON.stringify(state)); updateProgress();}
function showToast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}
function pct(n,d){return d?Math.round(n/d*100):0}
function updateProgress(){
  const read = Object.keys(state.read||{}).length;
  const mastered = Object.values(state.cards||{}).filter(x=>x.mastered).length;
  const quizDone = Object.keys(state.quiz||{}).length;
  const best = (state.exams||[]).reduce((m,e)=>Math.max(m,e.scorePct||0),0);
  const overall = Math.round((pct(read,DATA.chapters.length)+pct(mastered,DATA.flashcards.length)+pct(quizDone,DATA.questions.length)+best)/4);
  document.getElementById("readCount").textContent=read+"/"+DATA.chapters.length;
  document.getElementById("masteredCount").textContent=mastered+"/"+DATA.flashcards.length;
  document.getElementById("quizCount").textContent=quizDone+"/"+DATA.questions.length;
  document.getElementById("bestScore").textContent=best+"%";
  document.getElementById("overallPct").textContent=overall+"%";
  document.getElementById("overallFill").style.width=overall+"%";
}
function switchView(v){
  currentView=v;
  document.querySelectorAll(".view").forEach(x=>x.classList.add("hidden"));
  document.getElementById("view-"+v).classList.remove("hidden");
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  if(v==="home") renderHome();
  if(v==="course") renderCourse();
  if(v==="cards") renderCards();
  if(v==="practice") renderPractice();
  if(v==="exam") renderExam();
  if(v==="labs") renderLabs();
  if(v==="progress") renderProgress();
  if(v==="resources") renderResources();
  updateProgress();
  window.scrollTo({top:0,behavior:"smooth"});
}
document.getElementById("nav").addEventListener("click", e=>{
  const btn=e.target.closest("button"); if(btn) switchView(btn.dataset.view);
});

function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));}
function list(items){return "<ul>"+items.map(x=>"<li>"+esc(x)+"</li>").join("")+"</ul>";}

  </div>
  <div class="chapterNav">${DATA.chapters.map((c,i)=>`<button class="${i===currentChapter?'active':''}" onclick="currentChapter=${i};renderCourse()">第${i+1}章</button>`).join("")}</div>
  <div class="chapterContent">
    <aside class="outline">
      <h4>章节导航</h4>
      ${DATA.chapters.map((c,i)=>`<button class="${i===currentChapter?'active':''}" onclick="currentChapter=${i};renderCourse()">${esc(c.title.replace(/^第\\d+章\\s*/,'第'+(i+1)+'章 '))}</button>`).join("")}
    </aside>
    <article class="panel reading">
      <h2>${esc(ch.title)}</h2>
      <div class="objectives"><b>学习目标</b>${list(ch.objectives)}</div>
      ${ch.content.map(s=>`<div class="section"><h3>${esc(s.heading)}</h3><p>${esc(s.body)}</p></div>`).join("")}
      <div class="section"><h3>课堂练习</h3><p>${esc(ch.exercise)}</p></div>
      <details class="section"><summary><b>参考答案</b></summary><p>${esc(ch.answer)}</p></details>
      <div class="btnrow">
        <button class="green" onclick="markRead('${ch.id}')">标记本章已读</button>
        <button onclick="currentChapter=Math.max(0,currentChapter-1);renderCourse()">上一章</button>
        <button class="primary" onclick="currentChapter=Math.min(DATA.chapters.length-1,currentChapter+1);renderCourse()">下一章</button>
      </div>
    </article>
  </div>`;
}
function markRead(id){state.read[id]=Date.now(); saveState(); showToast("已标记本章已读");}

function renderCards(){
  const c = DATA.flashcards[currentCard] || DATA.flashcards[0];
  const st = state.cards[c.id] || {};
  document.getElementById("view-cards").innerHTML = `
  <div class="hero">
    <span class="pill">知识卡片</span>
    <h2>术语 / 缩写双语知识卡片</h2>
    <p>正面是术语或缩写，背面包含英文全称、中文全称和中文解释。支持收藏、标记已掌握和需复习。</p>
  </div>
  <div class="toolbar">
    <input id="cardSearch" placeholder="搜索术语，例如 NIM / Helm / Faithfulness" oninput="filterCardList()">
    <select id="cardStatus" onchange="filterCardList()">
      <option value="all">全部卡片</option><option value="mastered">已掌握</option><option value="review">需复习</option><option value="starred">已收藏</option>
    </select>
    <button onclick="randomCard()">随机一张</button>
  </div>
  <div class="flashWrap">
    <div>
      <div class="flashcard" onclick="flipCard()">
        <div id="flashInner" class="flashInner ${cardFlipped?'flipped':''}">
          <div class="face">
            <p class="term">${esc(c.front)}</p>
            <p class="hint">点击卡片或按 <span class="kbd">Space</span> 翻面</p>
          </div>
          <div class="face back">
            <h2>${esc(c.front)}</h2>
            <div class="field"><div class="label">英文全称</div><div class="value">${esc(c.en)}</div></div>
            <div class="field"><div class="label">中文全称</div><div class="value">${esc(c.zh)}</div></div>
            <div class="field"><div class="label">中文解释</div><div class="value">${esc(c.explain)}</div></div>
            <div class="field"><div class="label">所属章节</div><div class="value">${esc(c.chapter)}</div></div>
          </div>
        </div>
      </div>
      <div class="btnrow">
        <button onclick="prevCard()">上一张</button>
        <button class="primary" onclick="flipCard()">翻卡</button>
        <button onclick="nextCard()">下一张</button>
        <button class="green" onclick="setCardState('${c.id}','mastered')">${st.mastered?'取消掌握':'标记已掌握'}</button>
        <button class="amber" onclick="setCardState('${c.id}','review')">${st.review?'取消复习':'标记需复习'}</button>
        <button onclick="setCardState('${c.id}','starred')">${st.starred?'取消收藏':'收藏'}</button>
      </div>
    </div>
    <aside class="panel">
      <h3>卡片列表</h3>
      <div id="cardList" class="list"></div>
    </aside>
  </div>`;
  filterCardList();
}
function flipCard(){cardFlipped=!cardFlipped; const el=document.getElementById("flashInner"); if(el) el.classList.toggle("flipped",cardFlipped);}
function nextCard(){currentCard=(currentCard+1)%DATA.flashcards.length; cardFlipped=false; renderCards();}
function prevCard(){currentCard=(currentCard-1+DATA.flashcards.length)%DATA.flashcards.length; cardFlipped=false; renderCards();}
function randomCard(){currentCard=Math.floor(Math.random()*DATA.flashcards.length); cardFlipped=false; renderCards();}
function setCardState(id,kind){
  state.cards[id]=state.cards[id]||{};
  state.cards[id][kind]=!state.cards[id][kind];
  if(kind==="mastered" && state.cards[id].mastered) state.cards[id].review=false;
  if(kind==="review" && state.cards[id].review) state.cards[id].mastered=false;
  saveState(); renderCards(); showToast("卡片状态已更新");
}
function filterCardList(){
  const q=(document.getElementById("cardSearch")?.value||"").toLowerCase();
  const status=document.getElementById("cardStatus")?.value||"all";
  const listEl=document.getElementById("cardList"); if(!listEl) return;
  const arr=DATA.flashcards.filter(c=>{
    const text=[c.front,c.en,c.zh,c.explain,c.chapter].join(" ").toLowerCase();
    const st=state.cards[c.id]||{};
    if(q && !text.includes(q)) return false;
    if(status!=="all" && !st[status]) return false;
    return true;
  });
  listEl.innerHTML=arr.map(c=>{
    const idx=DATA.flashcards.findIndex(x=>x.id===c.id);
    const st=state.cards[c.id]||{};
    const tags=[st.mastered?"✅": "", st.review?"🟡":"", st.starred?"⭐":""].join("");
    return `<div class="listItem ${idx===currentCard?'active':''}" onclick="currentCard=${idx};cardFlipped=false;renderCards()">${tags} <b>${esc(c.front)}</b><br><span style="color:var(--muted)">${esc(c.zh)}</span></div>`;
  }).join("") || `<p style="color:var(--muted)">没有匹配卡片。</p>`;
}

function renderPractice(){
  const q = practiceList[practiceIndex] || DATA.questions[0];
  const saved = state.quiz[q.id];
  document.getElementById("view-practice").innerHTML = `
  <div class="hero">
    <span class="pill">在线刷题</span>
    <h2>练习模式：提交后立即显示答案解析</h2>
    <p>题型包括单选与多选，多选题正确答案为 2–4 个。练习记录会自动保存在本机浏览器。</p>
  </div>
  <div class="toolbar">
    <input id="qSearch" placeholder="搜索题干、选项或解析" oninput="filterQuestions()">
    <select id="qType" onchange="filterQuestions()"><option value="all">全部题型</option><option value="single">单选</option><option value="multi">多选</option></select>
    <select id="qStatus" onchange="filterQuestions()"><option value="all">全部状态</option><option value="wrong">错题</option><option value="correct">做对</option><option value="new">未做</option></select>
  </div>
  <div class="grid2">
    <div class="quizCard">
      <div class="quizMeta"><span>${esc(q.chapter)}</span><span>${q.type==="single"?"单选题":"多选题"}</span><span>${practiceIndex+1} / ${practiceList.length}</span>${saved?`<span>${saved.correct?'✅ 已做对':'❌ 错题'}</span>`:""}</div>
      <h3>${esc(q.q)}</h3>
      <div>${q.options.map((op,i)=>renderOption(q,i,op)).join("")}</div>
      <div class="btnrow">
        <button onclick="prevQuestion()">上一题</button>
        <button class="primary" onclick="submitPractice()">提交答案</button>
        <button onclick="nextQuestion()">下一题</button>
        <button onclick="randomQuestion()">随机题</button>
      </div>
      ${practiceSubmitted ? renderExplain(q) : ""}
    </div>
    <div class="panel">
      <h3>题目导航</h3>
      <div id="questionList" class="list"></div>
    </div>
  </div>`;
  renderQuestionList();
}
function renderOption(q,i,op){
  let cls="option";
  if(practiceSelected.has(i)) cls+=" selected";
  if(practiceSubmitted){
    if(q.answer.includes(i)) cls+=" correct";
    else if(practiceSelected.has(i)) cls+=" wrong";
  }
  return `<div class="${cls}" onclick="togglePractice(${i})">${String.fromCharCode(65+i)}. ${esc(op)}</div>`;
}
function togglePractice(i){
  const q=practiceList[practiceIndex]; if(practiceSubmitted) return;
  if(q.type==="single"){practiceSelected=new Set([i]);}
  else{practiceSelected.has(i)?practiceSelected.delete(i):practiceSelected.add(i);}
  renderPractice();
}
function arraysEq(a,b){a=[...a].sort();b=[...b].sort();return a.length===b.length && a.every((x,i)=>x===b[i]);}
function submitPractice(){
  const q=practiceList[practiceIndex];
  if(practiceSelected.size===0){showToast("请先选择答案"); return;}
  const correct=arraysEq([...practiceSelected],q.answer);
  state.quiz[q.id]={answer:[...practiceSelected],correct, time:Date.now()};
  practiceSubmitted=true; saveState(); renderPractice();
}
function renderExplain(q){
  const ans=q.answer.map(i=>String.fromCharCode(65+i)).join("、");
  return `<div class="explain"><b>正确答案：${ans}</b><br>${esc(q.explain)}</div>`;
}
function nextQuestion(){practiceIndex=(practiceIndex+1)%practiceList.length; practiceSelected=new Set(); practiceSubmitted=false; renderPractice();}
function prevQuestion(){practiceIndex=(practiceIndex-1+practiceList.length)%practiceList.length; practiceSelected=new Set(); practiceSubmitted=false; renderPractice();}
function randomQuestion(){practiceIndex=Math.floor(Math.random()*practiceList.length); practiceSelected=new Set(); practiceSubmitted=false; renderPractice();}
function filterQuestions(){
  const qtext=(document.getElementById("qSearch")?.value||"").toLowerCase();
  const type=document.getElementById("qType")?.value||"all";
  const status=document.getElementById("qStatus")?.value||"all";
  practiceList=DATA.questions.filter(q=>{
    const txt=[q.q,...q.options,q.explain,q.chapter].join(" ").toLowerCase();
    const saved=state.quiz[q.id];
    if(qtext && !txt.includes(qtext)) return false;
    if(type!=="all" && q.type!==type) return false;
    if(status==="new" && saved) return false;
    if(status==="wrong" && (!saved || saved.correct)) return false;
    if(status==="correct" && (!saved || !saved.correct)) return false;
    return true;
  });
  practiceIndex=0; practiceSelected=new Set(); practiceSubmitted=false; renderPractice();
}
function renderQuestionList(){
  const el=document.getElementById("questionList"); if(!el) return;
  el.innerHTML=practiceList.map((q,i)=>{
    const saved=state.quiz[q.id];
    const mark=saved?(saved.correct?"✅":"❌"):"▫️";
    return `<div class="listItem ${i===practiceIndex?'active':''}" onclick="practiceIndex=${i};practiceSelected=new Set();practiceSubmitted=false;renderPractice()">${mark} ${esc(q.q.slice(0,45))}${q.q.length>45?"...":""}</div>`;
  }).join("") || `<p style="color:var(--muted)">没有匹配题目。</p>`;
}

function renderExam(){
  if(!exam.active){
    document.getElementById("view-exam").innerHTML = `
    <div class="hero">
      <span class="pill">模拟考试</span>
      <h2>随机抽题 · 自动评分 · 保存成绩</h2>
      <p>默认随机抽取 30 题，考试时间 30 分钟。单选题只有 1 个正确答案，多选题正确答案为 2–4 个。</p>
    </div>
    <div class="grid2">
      <div class="panel">
        <h3>开始考试</h3>
        <div class="toolbar" style="grid-template-columns:1fr 1fr 1fr">
          <select id="examCount"><option>20</option><option selected>30</option><option>40</option><option>50</option></select>
          <select id="examMins"><option>20</option><option selected>30</option><option>45</option><option>60</option></select>
          <button class="primary" onclick="startExam()">开始模拟考试</button>
        </div>
      </div>
      <div class="panel">
        <h3>历史成绩</h3>
        ${(state.exams||[]).length ? `<table><tr><th>时间</th><th>题数</th><th>正确</th><th>得分</th></tr>${state.exams.slice().reverse().map(e=>`<tr><td>${new Date(e.time).toLocaleString()}</td><td>${e.total}</td><td>${e.correct}</td><td>${e.scorePct}%</td></tr>`).join("")}</table>` : `<p style="color:var(--muted)">暂无考试记录。</p>`}
      </div>
    </div>`;
    return;
  }
  const q=exam.list[exam.index];
  const chosen=new Set(exam.answers[q.id]||[]);
  document.getElementById("view-exam").innerHTML = `
  <div class="hero">
    <span class="pill">模拟考试进行中</span>
    <div class="examTop"><h2 style="margin:0">第 ${exam.index+1} / ${exam.list.length} 题</h2><div class="timer" id="timerText">${formatTime(exam.remaining)}</div></div>
  </div>
  <div class="quizCard">
    <div class="quizMeta"><span>${esc(q.chapter)}</span><span>${q.type==="single"?"单选题":"多选题"}</span></div>
    <h3>${esc(q.q)}</h3>
    ${q.options.map((op,i)=>`<div class="option ${chosen.has(i)?'selected':''}" onclick="toggleExam(${i})">${String.fromCharCode(65+i)}. ${esc(op)}</div>`).join("")}
    <div class="btnrow">
      <button onclick="examPrev()">上一题</button>
      <button onclick="examNext()">下一题</button>
      <button class="primary" onclick="finishExam()">交卷</button>
    </div>
  </div>`;
}
function startExam(){
  const count=Number(document.getElementById("examCount").value);
  const mins=Number(document.getElementById("examMins").value);
  exam={active:true, list:shuffle(DATA.questions).slice(0,count), index:0, answers:{}, remaining:mins*60, timer:null};
  exam.timer=setInterval(()=>{
    exam.remaining--; const t=document.getElementById("timerText"); if(t) t.textContent=formatTime(exam.remaining);
    if(exam.remaining<=0) finishExam();
  },1000);
  renderExam();
}
function shuffle(a){a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;}
function formatTime(s){return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
function toggleExam(i){
  const q=exam.list[exam.index]; const arr=new Set(exam.answers[q.id]||[]);
  if(q.type==="single"){exam.answers[q.id]=[i];}
  else{arr.has(i)?arr.delete(i):arr.add(i); exam.answers[q.id]=[...arr];}
  renderExam();
}
function examNext(){exam.index=Math.min(exam.list.length-1,exam.index+1); renderExam();}
function examPrev(){exam.index=Math.max(0,exam.index-1); renderExam();}
function finishExam(){
  if(exam.timer) clearInterval(exam.timer);
  let correct=0;
  exam.list.forEach(q=>{ if(arraysEq(exam.answers[q.id]||[],q.answer)) correct++; });
  const scorePct=pct(correct,exam.list.length);
  state.exams=state.exams||[];
  state.exams.push({time:Date.now(), total:exam.list.length, correct, scorePct});
  exam.active=false; saveState();
  document.getElementById("view-exam").innerHTML = `
  <div class="hero"><span class="pill">考试结果</span><h2>得分：${scorePct}%</h2><p>共 ${exam.list.length} 题，答对 ${correct} 题。</p></div>
  <div class="panel">
    <h3>错题解析</h3>
    ${exam.list.filter(q=>!arraysEq(exam.answers[q.id]||[],q.answer)).map(q=>`<div class="quizCard" style="margin-bottom:12px"><b>${esc(q.q)}</b><p>正确答案：${q.answer.map(i=>String.fromCharCode(65+i)).join("、")}</p><p style="color:var(--muted)">${esc(q.explain)}</p></div>`).join("") || "<p>本次没有错题。</p>"}
    <div class="btnrow"><button class="primary" onclick="renderExam()">返回考试首页</button><button onclick="switchView('practice')">去练习模式复习</button></div>
  </div>`;
}
function renderLabs(){
  document.getElementById("view-labs").innerHTML = `
  <div class="hero">
    <span class="pill">实验手册</span>
    <h2>8 个实验项目：从架构拆解到上线演练</h2>
    <p>每个实验包含目标、步骤、验收标准和常见陷阱，可用于课堂实训或企业内训。</p>
  </div>
  <div class="labGrid">
    ${DATA.labs.map(l=>`<div class="labCard">
      <span class="pill">${esc(l.duration)}</span>
      <h4>${esc(l.title)}</h4>
      <p><b>目标：</b>${esc(l.objective)}</p>
      <details><summary><b>实验步骤</b></summary>${list(l.steps)}</details>
      <details><summary><b>验收标准</b></summary><p>${esc(l.validation)}</p></details>
      <details><summary><b>常见陷阱</b></summary>${list(l.pitfalls)}</details>
    </div>`).join("")}
  </div>`;
}
function renderProgress(){
  const read=Object.keys(state.read||{}).length;
  const mastered=Object.values(state.cards||{}).filter(x=>x.mastered).length;
  const review=Object.values(state.cards||{}).filter(x=>x.review).length;
  const starred=Object.values(state.cards||{}).filter(x=>x.starred).length;
  const quizDone=Object.keys(state.quiz||{}).length;
  const correct=Object.values(state.quiz||{}).filter(x=>x.correct).length;
  document.getElementById("view-progress").innerHTML = `
  <div class="hero"><span class="pill">学习进度</span><h2>你的本地学习记录</h2><p>所有记录保存在当前浏览器 localStorage 中，不会上传到服务器。</p></div>
  <div class="cards">
    <div class="metric"><b>${pct(read,DATA.chapters.length)}%</b><span>教材阅读</span></div>
    <div class="metric"><b>${pct(mastered,DATA.flashcards.length)}%</b><span>卡片掌握</span></div>
    <div class="metric"><b>${pct(quizDone,DATA.questions.length)}%</b><span>刷题完成</span></div>
    <div class="metric"><b>${quizDone?pct(correct,quizDone):0}%</b><span>练习正确率</span></div>
  </div>
  <div class="grid2">
    <div class="panel"><h3>卡片状态</h3><p>已掌握：${mastered}；需复习：${review}；已收藏：${starred}</p><button onclick="switchView('cards')">继续复习卡片</button></div>
    <div class="panel"><h3>考试记录</h3>${(state.exams||[]).length?`<table><tr><th>时间</th><th>题数</th><th>正确</th><th>得分</th></tr>${state.exams.slice().reverse().map(e=>`<tr><td>${new Date(e.time).toLocaleString()}</td><td>${e.total}</td><td>${e.correct}</td><td>${e.scorePct}%</td></tr>`).join("")}</table>`:"<p>暂无考试记录。</p>"}</div>
  </div>
  <div class="panel"><h3>进度管理</h3><button class="red" onclick="resetProgress()">清空全部学习进度</button></div>`;
}
function resetProgress(){
  if(confirm("确定清空所有阅读、卡片、刷题和考试记录吗？")){
    state={read:{},cards:{},quiz:{},exams:[]}; saveState(); renderProgress(); showToast("进度已清空");
  }
}
function renderResources(){
  const checklistRows = DATA.checklistCsv.trim().split(/\r?\n/).map(r=>r.split(","));
  document.getElementById("view-resources").innerHTML = `
  <div class="hero">
    <span class="pill">资源下载</span>
    <h2>下载课程数据与生产上线检查表</h2>
    <p>这里可以导出平台内置数据，便于二次编辑、导入 LMS、制作 PPT 或用于企业内训。</p>
  </div>
  <div class="downloadGrid">
    <div class="download"><b>教材章节 JSON</b><p>包含 12 章教材内容、学习目标、练习和答案。</p><button onclick="downloadJson('course_chapters.json',DATA.chapters)">下载</button></div>
    <div class="download"><b>知识卡片 JSON</b><p>包含术语、英文全称、中文全称和中文解释。</p><button onclick="downloadJson('flashcards.json',DATA.flashcards)">下载</button></div>
    <div class="download"><b>题库 JSON</b><p>包含单选、多选、正确答案和解析。</p><button onclick="downloadJson('question_bank.json',DATA.questions)">下载</button></div>
    <div class="download"><b>实验手册 JSON</b><p>包含 8 个实验项目。</p><button onclick="downloadJson('labs.json',DATA.labs)">下载</button></div>
    <div class="download"><b>生产上线 Checklist CSV</b><p>可用 Excel 打开和编辑。</p><button onclick="downloadText('production_checklist.csv',DATA.checklistCsv,'text/csv')">下载</button></div>
    <div class="download"><b>学习进度 JSON</b><p>导出当前浏览器中的本地学习记录。</p><button onclick="downloadJson('my_learning_progress.json',state)">下载</button></div>
  </div>
  <div class="panel">
    <h3>生产上线 Checklist 预览</h3>
    <div class="tableWrap"><table>${checklistRows.map((r,i)=>`<tr>${r.map(c=>i===0?`<th>${esc(c)}</th>`:`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</table></div>
  </div>`;
}
function downloadText(filename,text,mime){
  const blob=new Blob([text],{type:mime||"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
function downloadJson(filename,obj){downloadText(filename,JSON.stringify(obj,null,2),"application/json;charset=utf-8");}
document.addEventListener("keydown",e=>{
  if(e.target && ["INPUT","SELECT","TEXTAREA"].includes(e.target.tagName)) return;
  if(currentView==="cards"){
    if(e.code==="Space"){e.preventDefault(); flipCard();}
    if(e.code==="ArrowRight") nextCard();
    if(e.code==="ArrowLeft") prevCard();
  }
});
updateProgress();
renderHome();
</script>
