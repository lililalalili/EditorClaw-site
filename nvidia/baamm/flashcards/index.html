<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAAMM 缩写知识卡片学习系统</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#637089;--line:#e4e8f1;--brand:#2563eb;--brand2:#7c3aed;--good:#16a34a;--bad:#dc2626;--soft:#eef4ff;--shadow:0 18px 42px rgba(15,23,42,.10)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 20% -10%,rgba(37,99,235,.22),transparent 35%),radial-gradient(circle at 90% 0%,rgba(124,58,237,.17),transparent 30%),var(--bg)}
header{max-width:1180px;margin:0 auto;padding:30px 24px 12px}h1{margin:0 0 8px;font-size:31px;letter-spacing:-.02em}.subtitle{color:var(--muted);line-height:1.7;max-width:920px}.container{max-width:1180px;margin:0 auto 52px;padding:0 24px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}.stat{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}.num{font-size:28px;font-weight:900;color:var(--brand)}.lab{color:var(--muted);font-size:13px;margin-top:4px}
.tabs{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}.tab{border:1px solid var(--line);background:#fff;color:var(--ink);padding:10px 15px;border-radius:999px;font-weight:750;cursor:pointer}.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.panel{display:none;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:20px}.panel.active{display:block}
.controls{display:grid;grid-template-columns:1.4fr 1.2fr 1fr 1fr;gap:12px;margin-bottom:16px}label.small{display:block;color:var(--muted);font-weight:800;font-size:12px;margin:0 0 6px}
select,input[type=text],input[type=number]{width:100%;border:1px solid var(--line);border-radius:13px;padding:10px 12px;background:#fff;color:var(--ink);font-size:14px}
button{border:0;border-radius:13px;padding:10px 14px;background:var(--brand);color:#fff;font-weight:800;cursor:pointer}button:hover{filter:brightness(.95)}button.secondary{background:#e8edf8;color:#1e293b}button.good{background:var(--good)}button.bad{background:var(--bad)}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.flash-wrap{perspective:1500px;max-width:760px;margin:22px auto}.flash-card{min-height:360px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.8,.2,1);cursor:pointer}.flash-card.flipped{transform:rotateY(180deg)}
.side{position:absolute;inset:0;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);box-shadow:var(--shadow);backface-visibility:hidden;padding:28px;display:flex;flex-direction:column;justify-content:center}.back{transform:rotateY(180deg);justify-content:flex-start;overflow:auto}
.abbr{font-size:64px;font-weight:950;text-align:center;color:var(--brand);letter-spacing:-.04em;word-break:break-word}.hint{text-align:center;color:var(--muted);margin-top:14px}.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px}.badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;color:#1e40af;background:var(--soft)}.badge.note{color:#7c2d12;background:#fff7ed}
.back h2{margin:0 0 12px;font-size:32px;color:var(--brand)}.back-item{border-left:4px solid var(--brand);background:#f8fafc;padding:10px 12px;border-radius:12px;margin:10px 0;line-height:1.65}.back-item strong{color:#0f172a}.navline{justify-content:center;margin:10px 0 6px}
.progress{height:10px;border-radius:999px;background:#e8edf8;overflow:hidden;margin:12px auto;max-width:760px}.progress>div{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0}.counter{text-align:center;color:var(--muted);font-weight:700}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}table{border-collapse:collapse;width:100%;min-width:900px;background:#fff}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top;line-height:1.5}th{background:#f8fafc;position:sticky;top:0;z-index:1}
.quiz-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:18px;margin-top:14px}.option{display:block;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:8px 0;cursor:pointer}.option:hover{background:#f8fafc}.feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.75}.feedback.good{display:block;background:#f0fdf4;border:1px solid #bbf7d0}.feedback.bad{display:block;background:#fff1f2;border:1px solid #fecaca}.notice{border:1px solid #fde68a;background:#fffbeb;color:#92400e;border-radius:14px;padding:12px 14px;line-height:1.7;margin:12px 0}.footer{color:var(--muted);text-align:center;margin-top:26px;font-size:13px}
@media(max-width:850px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.controls{grid-template-columns:1fr}.abbr{font-size:48px}.flash-card{min-height:420px}}@media print{body{background:#fff}.tabs,.controls,.navline,button,.footer,.notice{display:none!important}.panel{display:block!important;box-shadow:none;border:0}}
</style>
</head>
<body>
<header><h1>BAAMM 缩写知识卡片学习系统</h1><div class="subtitle">正面是缩写；反面是英文全称、中文全称和含义。覆盖课程讲义中的 AI、多模态、RAG、VLM、OCR、VSS、NIM、硬件平台、文件格式与开发工具等术语。</div></header>
<div class="container">
<div class="stats" id="stats"></div>
<div class="tabs"><button class="tab active" data-tab="learn">卡片学习</button><button class="tab" data-tab="quiz">自测模式</button><button class="tab" data-tab="list">完整列表</button><button class="tab" data-tab="mastered">掌握记录</button></div>
<section class="panel active" id="learn"><div class="controls"><div><label class="small">类别</label><select id="categoryFilter"></select></div><div><label class="small">备注类型</label><select id="noteFilter"></select></div><div><label class="small">搜索</label><input type="text" id="searchBox" placeholder="输入缩写 / 英文 / 中文 / 含义"></div><div style="display:flex;align-items:end"><button id="applyFilter">应用筛选</button></div></div><div class="progress"><div id="progressBar"></div></div><div class="counter" id="counter"></div><div class="flash-wrap"><div class="flash-card" id="flashCard"><div class="side front"><div class="abbr" id="frontAbbr"></div><div class="hint">点击卡片翻面</div><div class="badges" id="frontBadges"></div></div><div class="side back"><h2 id="backAbbr"></h2><div class="back-item"><strong>英文全称：</strong><span id="backEnglish"></span></div><div class="back-item"><strong>中文全称：</strong><span id="backChinese"></span></div><div class="back-item"><strong>含义：</strong><span id="backMeaning"></span></div><div class="back-item"><strong>类别：</strong><span id="backCategory"></span></div><div class="back-item"><strong>备注：</strong><span id="backNote"></span></div></div></div></div><div class="row navline"><button class="secondary" id="prevBtn">上一张</button><button id="flipBtn">翻面</button><button class="secondary" id="nextBtn">下一张</button><button class="secondary" id="shuffleBtn">随机顺序</button><button class="good" id="knownBtn">标记已掌握</button><button class="bad" id="unknownBtn">标记待复习</button></div></section>
<section class="panel" id="quiz"><div class="notice">自测模式：系统随机显示一个英文/中文/含义提示，让你选择对应缩写。答错会自动加入待复习。</div><div class="controls"><div><label class="small">类别</label><select id="quizCategory"></select></div><div><label class="small">题量</label><input id="quizCount" type="number" value="20" min="5" max="200"></div><div><label class="small">题目方向</label><select id="quizMode"><option value="meaning">看含义选缩写</option><option value="english">看英文全称选缩写</option><option value="chinese">看中文全称选缩写</option></select></div><div style="display:flex;align-items:end"><button id="startQuiz">开始自测</button></div></div><div id="quizArea"></div></section>
<section class="panel" id="list"><div class="row" style="margin-bottom:12px"><button class="secondary" onclick="window.print()">打印 / 另存为 PDF</button><button class="secondary" id="downloadJson">下载 JSON</button><button class="secondary" id="downloadCsv">下载 Anki CSV</button></div><div class="table-wrap"><table id="cardTable"></table></div></section>
<section class="panel" id="mastered"><div class="notice">掌握记录保存在当前浏览器 localStorage 中。换浏览器或清空缓存后记录会消失。</div><div class="row"><button id="refreshMastery">刷新记录</button><button class="secondary" id="clearMastery">清空记录</button></div><div id="masteryArea" style="margin-top:14px"></div></section>
<div class="footer">静态网页系统：可离线打开，也可部署到 GitHub Pages、校内网站或本地服务器。</div>
</div>
<script>
const CARDS = [{"abbr": "AI", "english": "Artificial Intelligence", "chinese": "人工智能", "meaning": "让计算机系统执行感知、推理、生成、决策等智能任务的技术总称。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "DLI", "english": "Deep Learning Institute", "chinese": "深度学习学院 / 深度学习培训机构", "meaning": "NVIDIA 的官方培训体系，课程来自 NVIDIA DLI。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "BAAMM", "english": "Building AI Agents with Multimodal Models", "chinese": "使用多模态模型构建 AI 智能体", "meaning": "本课程标题的缩写式代号，指用多模态模型构建 AI Agent 的课程主题。", "category": "课程与 AI 基础", "note": "课程缩写"}, {"abbr": "ML", "english": "Machine Learning", "chinese": "机器学习", "meaning": "AI 的重要分支，让模型从数据中学习规律并进行预测、分类或生成。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "DL", "english": "Deep Learning", "chinese": "深度学习", "meaning": "基于深层神经网络的机器学习方法，是现代多模态模型的重要基础。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "NN", "english": "Neural Network", "chinese": "神经网络", "meaning": "由多层可训练参数组成的模型结构，用于表示、分类、生成或预测。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "API", "english": "Application Programming Interface", "chinese": "应用程序编程接口", "meaning": "程序之间相互调用服务的接口，例如调用 OCR、LLM、VLM 或 NIM 服务。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "UI", "english": "User Interface", "chinese": "用户界面", "meaning": "用户与系统交互的界面，例如视频问答系统或刷题系统的网页界面。", "category": "课程与 AI 基础", "note": "严格缩写"}, {"abbr": "Q&A / QA", "english": "Question and Answering / Question Answering", "chinese": "问答", "meaning": "系统根据文本、图像、视频或检索结果回答用户问题。本讲义中 QA 主要指问答，而不是 Quality Assurance。", "category": "课程与 AI 基础", "note": "常见缩写"}, {"abbr": "LiDAR", "english": "Light Detection and Ranging", "chinese": "激光雷达", "meaning": "通过激光测距获得三维空间信息，常与相机数据融合，用于自动驾驶、机器人和空间感知。", "category": "多模态、视觉与传感器", "note": "严格缩写"}, {"abbr": "2D", "english": "Two-Dimensional", "chinese": "二维", "meaning": "平面数据或二维坐标，例如图像中的像素位置。", "category": "多模态、视觉与传感器", "note": "严格缩写"}, {"abbr": "3D", "english": "Three-Dimensional", "chinese": "三维", "meaning": "三维空间数据，例如点云、物体三维位置和深度信息。", "category": "多模态、视觉与传感器", "note" document.querySelectorAll(".tab").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));btn.classList.add("active");byId(btn.dataset.tab).classList.add("active");if(btn.dataset.tab==="list")renderTable();if(btn.dataset.tab==="mastered")renderMastery()})})
let deck=CARDS.slice(),idx=0;function filteredCards(){const cat=byId("categoryFilter").value,note=byId("noteFilter").value,q=byId("searchBox").value.trim().toLowerCase();return CARDS.filter(c=>(cat==="all"||c.category===cat)&&(note==="all"||c.note===note)&&(!q||[c.abbr,c.english,c.chinese,c.meaning,c.category,c.note].join(" ").toLowerCase().includes(q)))}
function renderCard(){if(!deck.length){byId("frontAbbr").textContent="无卡片";byId("frontBadges").innerHTML="";byId("counter").textContent="没有符合筛选条件的卡片";byId("progressBar").style.width="0%";return}if(idx<0)idx=deck.length-1;if(idx>=deck.length)idx=0;const c=deck[idx];byId("flashCard").classList.remove("flipped");byId("frontAbbr").textContent=c.abbr;byId("frontBadges").innerHTML=`<span class="badge">${esc(c.category)}</span><span class="badge note">${esc(c.note)}</span>`;byId("backAbbr").textContent=c.abbr;byId("backEnglish").textContent=c.english;byId("backChinese").textContent=c.chinese;byId("backMeaning").textContent=c.meaning;byId("backCategory").textContent=c.category;byId("backNote").textContent=c.note;byId("counter").textContent=`第 ${idx+1} / ${deck.length} 张`;byId("progressBar").style.width=((idx+1)/deck.length*100)+"%"}
byId("applyFilter").onclick=()=>{deck=filteredCards();idx=0;renderCard()};byId("prevBtn").onclick=()=>{idx--;renderCard()};byId("nextBtn").onclick=()=>{idx++;renderCard()};byId("shuffleBtn").onclick=()=>{deck=shuffle(deck);idx=0;renderCard()};byId("flipBtn").onclick=()=>byId("flashCard").classList.toggle("flipped");byId("flashCard").onclick=()=>byId("flashCard").classList.toggle("flipped");byId("knownBtn").onclick=()=>{if(deck.length)setStatus(deck[idx].abbr,"known");idx++;renderCard()};byId("unknownBtn").onclick=()=>{if(deck.length)setStatus(deck[idx].abbr,"review");idx++;renderCard()}
function renderTable(){byId("cardTable").innerHTML=`<thead><tr><th>缩写</th><th>英文全称</th><th>中文全称</th><th>含义</th><th>类别</th><th>备注</th></tr></thead><tbody>${CARDS.map(c=>`<tr><td><strong>${esc(c.abbr)}</strong></td><td>${esc(c.english)}</td><td>${esc(c.chinese)}</td><td>${esc(c.meaning)}</td><td>${esc(c.category)}</td><td>${esc(c.note)}</td></tr>`).join("")}</tbody>`}
function download(filename,text,type="text/plain"){const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}
byId("downloadJson").onclick=()=>download("flashcards.json",JSON.stringify(CARDS,null,2),"application/json");byId("downloadCsv").onclick=()=>{const rows=[["Front","Back","English Full Name","Chinese Full Name","Meaning","Category","Note"]];CARDS.forEach(c=>{const back=`英文全称：${c.english}<br>中文全称：${c.chinese}<br>含义：${c.meaning}<br>类别：${c.category}<br>备注：${c.note}`;rows.push([c.abbr,back,c.english,c.chinese,c.meaning,c.category,c.note])});const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(",")).join("\n");download("BAAMM_缩写知识卡片_Anki导入.csv","\ufeff"+csv,"text/csv;charset=utf-8")}
let quiz=[],qidx=0,score=0;function startQuiz(){const cat=byId("quizCategory").value;let pool=CARDS.filter(c=>cat==="all"||c.category===cat);const count=Math.min(parseInt(byId("quizCount").value||"20"),pool.length);quiz=shuffle(pool).slice(0,count);qidx=0;score=0;renderQuizQ()}
function renderQuizQ(){const area=byId("quizArea");if(qidx>=quiz.length){area.innerHTML=`<div class="quiz-card"><h2>自测完成</h2><p><strong>得分：</strong>${score} / ${quiz.length}</p><p>答错的卡片已标记为待复习。</p></div>`;renderStats();return}const c=quiz[qidx],mode=byId("quizMode").value,prompt=mode==="english"?c.english:mode==="chinese"?c.chinese:c.meaning;let opts=shuffle([c,...shuffle(CARDS.filter(x=>x.abbr!==c.abbr)).slice(0,3)]);area.innerHTML=`<div class="quiz-card"><div class="badges"><span class="badge">第 ${qidx+1} / ${quiz.length} 题</span><span class="badge">${esc(c.category)}</span></div><h2>请选择对应缩写</h2><div class="back-item">${esc(prompt)}</div><div>${opts.map(o=>`<label class="option"><input type="radio" name="quizOpt" value="${esc(o.abbr)}"> <strong>${esc(o.abbr)}</strong></label>`).join("")}</div><div class="row" style="margin-top:12px"><button id="checkQuiz">提交</button><button class="secondary" id="skipQuiz">跳过</button></div><div id="quizFeedback" class="feedback"></div></div>`;byId("checkQuiz").onclick=()=>{const selected=document.querySelector('input[name="quizOpt"]:checked');if(!selected){alert("请先选择答案。");return}const ok=selected.value===c.abbr;const fb=byId("quizFeedback");fb.className="feedback "+(ok?"good":"bad");if(ok){score++;setStatus(c.abbr,"known")}else{setStatus(c.abbr,"review")}fb.innerHTML=`<strong>${ok?"回答正确":"回答错误"}</strong><br><strong>正确答案：</strong>${esc(c.abbr)}<br><strong>英文全称：</strong>${esc(c.english)}<br><strong>中文全称：</strong>${esc(c.chinese)}<br><strong>含义：</strong>${esc(c.meaning)}<br><br><button id="nextQuiz">下一题</button>`;byId("nextQuiz").onclick=()=>{qidx++;renderQuizQ()}};byId("skipQuiz").onclick=()=>{setStatus(c.abbr,"review");qidx++;renderQuizQ()}}
byId("startQuiz").onclick=startQuiz
function renderMastery(){const s=getStatus(),known=CARDS.filter(c=>s[c.abbr]==="known"),review=CARDS.filter(c=>s[c.abbr]==="review");byId("masteryArea").innerHTML=`<div class="stats"><div class="stat"><div class="num">${known.length}</div><div class="lab">已掌握</div></div><div class="stat"><div class="num">${review.length}</div><div class="lab">待复习</div></div><div class="stat"><div class="num">${CARDS.length-known.length-review.length}</div><div class="lab">未学习</div></div><div class="stat"><div class="num">${Math.round(known.length/CARDS.length*100)}%</div><div class="lab">掌握率</div></div></div><h3>待复习</h3><div class="table-wrap"><table><thead><tr><th>缩写</th><th>英文全称</th><th>中文全称</th><th>含义</th></tr></thead><tbody>${review.map(c=>`<tr><td><strong>${esc(c.abbr)}</strong></td><td>${esc(c.english)}</td><td>${esc(c.chinese)}</td><td>${esc(c.meaning)}</td></tr>`).join("")||`<tr><td colspan="4">暂无待复习卡片。</td></tr>`}</tbody></table></div>`}
byId("refreshMastery").onclick=renderMastery;byId("clearMastery").onclick=()=>{if(confirm("确定清空所有掌握记录吗？")){clearStatus();renderMastery()}}
renderCard();renderTable();
</script></body></html>
