<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAAMM 课程在线刷题与模拟考试系统</title>
<style>
:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --ink: #172033;
  --muted: #5d6882;
  --line: #e4e7f0;
  --brand: #2563eb;
  --brand-dark: #1d4ed8;
  --good: #16a34a;
  --bad: #dc2626;
  --warn: #f59e0b;
  --soft: #eef4ff;
  --shadow: 0 10px 25px rgba(15, 23, 42, .08);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
  color: var(--ink);
  background: linear-gradient(180deg, #eef4ff 0, var(--bg) 260px);
}
header {
  padding: 28px 26px 18px;
  max-width: 1180px;
  margin: 0 auto;
}
h1 {
  margin: 0 0 8px;
  font-size: 30px;
  letter-spacing: -0.02em;
}
.subtitle {
  color: var(--muted);
  line-height: 1.7;
  max-width: 920px;
}
.container {
  max-width: 1180px;
  margin: 0 auto 48px;
  padding: 0 26px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin: 18px 0;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  box-shadow: var(--shadow);
}
.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--brand);
}
.stat-label { color: var(--muted); font-size: 13px; margin-top: 4px; }
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 18px 0;
}
.tab {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--ink);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 650;
}
.tab.active {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.panel {
  display: none;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 20px;
}
.panel.active { display: block; }
.controls {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
label.small {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 6px;
}
select, input[type="number"] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  font-size: 14px;
}
button {
  appearance: none;
  border: 0;
  background: var(--brand);
  color: #fff;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
}
button:hover { background: var(--brand-dark); }
button.secondary {
  background: #e8edf8;
  color: #1e293b;
}
button.secondary:hover { background: #dce5f6; }
button.good { background: var(--good); }
button.bad { background: var(--bad); }
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.question-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px;
  background: #fff;
  margin-top: 14px;
}
.q-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  background: var(--soft);
  color: #1e40af;
}
.badge.multi { background: #fff7ed; color: #c2410c; }
.badge.single { background: #ecfdf5; color: #047857; }
.stem {
  font-size: 18px;
  line-height: 1.65;
  font-weight: 750;
  margin: 10px 0 14px;
}
.option {
  display: block;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 14px;
  margin: 8px 0;
  cursor: pointer;
  line-height: 1.5;
}
.option:hover { background: #f8fafc; }
.option input { margin-right: 10px; transform: translateY(1px); }
.feedback {
  display: none;
  margin-top: 14px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #f8fafc;
  line-height: 1.7;
}
.feedback.correct {
  display: block;
  border-color: #bbf7d0;
  background: #f0fdf4;
}
.feedback.wrong {
  display: block;
  border-color: #fecaca;
  background: #fff1f2;
}
.feedback.neutral {
  display: block;
  background: #f8fafc;
}
.progress {
  height: 10px;
  background: #e8edf8;
  border-radius: 999px;
  overflow: hidden;
  margin: 12px 0 4px;
}
.progress > div {
  height: 100%;
  background: var(--brand);
  width: 0%;
}
.bank-grid {
  display: grid;
  gap: 12px;
}
.bank-item {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  background: #fff;
}
.bank-item summary {
  cursor: pointer;
  font-weight: 800;
  line-height: 1.5;
}
.exam-grid {
  display: grid;
  gap: 14px;
}
.exam-q {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  background: #fff;
}
.exam-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 14px;
}
.timer {
  font-weight: 900;
  color: var(--bad);
  background: #fff1f2;
  padding: 8px 10px;
  border-radius: 12px;
}
.result {
  margin-top: 16px;
  padding: 16px;
  border-radius: 16px;
  background: #f8fafc;
  border: 1px solid var(--line);
  line-height: 1.75;
}
.notice {
  padding: 12px 14px;
  border-radius: 14px;
  background: #fffbeb;
  color: #92400e;
  border: 1px solid #fde68a;
  margin: 12px 0;
  line-height: 1.7;
}
.footer {
  color: var(--muted);
  text-align: center;
  margin: 28px 0;
  font-size: 13px;
}
@media (max-width: 850px) {
  .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .controls { grid-template-columns: 1fr; }
  h1 { font-size: 24px; }
}
@media print {
  body { background: white; }
  .tabs, .controls, button, .footer { display: none !important; }
  .panel { display: block !important; box-shadow: none; border: 0; }
}
</style>
</head>
<body>
<header>
  <h1>BAAMM 课程在线刷题与模拟考试系统</h1>
  <div class="subtitle">
    Building AI Agents with Multimodal Models 题库。覆盖早期/后期融合、中期融合、对比预训练、向量数据库、跨模态投影、VLM、OCR/PDF、模型编排、VSS、NIM 与 NVIDIA AI Blueprints。
  </div>
</header>

<div class="container">
  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" data-tab="practice">逐题刷题</button>
    <button class="tab" data-tab="exam">模拟考试</button>
    <button class="tab" data-tab="bank">完整题库与解析</button>
    <button class="tab" data-tab="wrong">错题本</button>
  </div>

  <section class="panel active" id="practice">
    <div class="notice">逐题刷题会立即显示答案和详细解析；多选题必须完全选对才算正确。</div>
    <div class="controls">
      <div><label class="small">模块</label><select id="practiceModule"></select></div>
      <div><label class="small">题型</label><select id="practiceType"><option value="all">全部</option><option value="single">单选</option><option value="multi">多选</option></select></div>
      <div><label class="small">顺序</label><select id="practiceOrder"><option value="normal">按题号</option><option value="shuffle">随机</option></select></div>
      <div><label class="small">知识点</label><select id="practiceKP"></select></div>
      <div style="display:flex; align-items:end;"><button id="startPractice">开始刷题</button></div>
    </div>
    <div class="progress"><div id="practiceProgress"></div></div>
    <div id="practiceInfo" class="subtitle"></div>
    <div id="practiceArea"></div>
  </section>

  <section class="panel" id="exam">
    <div class="notice">模拟考试会随机抽题，提交后才显示成绩、错题和解析。建议：30 题 / 30 分钟。</div>
    <div class="controls">
      <div><label class="small">模块</label><select id="examModule"></select></div>
      <div><label class="small">题型</label><select id="examType"><option value="all">全部</option><option value="single">单选</option><option value="multi">多选</option></select></div>
      <div><label class="small">题量</label><input id="examCount" type="number" min="5" max="76" value="30"></div>
      <div><label class="small">时间（分钟）</label><input id="examMinutes" type="number" min="1" max="180" value="30"></div>
      <div style="display:flex; align-items:end;"><button id="startExam">开始考试</button></div>
    </div>
    <div id="examArea"></div>
  </section>

  <section class="panel" id="bank">
    <div class="controls">
      <div><label class="small">模块</label><select id="bankModule"></select></div>
      <div><label class="small">题型</label><select id="bankType"><option value="all">全部</option><option value="single">单选</option><option value="multi">多选</option></select></div>
      <div><label class="small">知识点</label><select id="bankKP"></select></div>
      <div style="display:flex; align-items:end;"><button id="renderBank">筛选题库</button></div>
      <div style="display:flex; align-items:end;"><button class="secondary" onclick="window.print()">打印/另存为 PDF</button></div>
    </div>
    <div id="bankArea" class="bank-grid"></div>
  </section>

  <section class="panel" id="wrong">
    <div class="row">
      <button id="loadWrong">刷新错题本</button>
      <button class="secondary" id="clearWrong">清空错题本</button>
    </div>
    <div id="wrongArea" class="bank-grid" style="margin-top:12px;"></div>
  </section>

  <div class="footer">本系统为静态网页，可离线使用，也可上传到 GitHub Pages / 校内网站作为在线刷题系统。</div>
</div>

<script>
const QUESTIONS = [{"id": "Q001", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "多模态数据类型与差异", "type": "single", "difficulty": "中", "stem": "在多模态 AI 中，为什么不能把相机图像、LiDAR 点云、文本和表格数据简单地当作同一种输入处理？", "options": {"A": "因为不同模态的数据结构、噪声来源、空间/时间分辨率和语义层级不同", "B": "因为所有神经网络只能处理文本输入", "C": "因为 LiDAR 数据不能用于神经网络", "D": "因为多模态任务不需要预处理"}, "answer": ["A"], "explanation": "不同模态具有不同的数据结构和统计特性。例如图像是二维像素网格，LiDAR 通常是三维点云或深度信息，文本是离散 token 序列。进入神经网络前，需要将它们转换为可学习的张量表示，并处理对齐、归一化和噪声问题。"}, {"id": "Q002", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "多模态数据类型与差异", "type": "multi", "difficulty": "中", "stem": "下列哪些属于多模态系统设计时需要考虑的数据差异？", "options": {"A": "空间分辨率与坐标系", "B": "时间同步与采样频率", "C": "噪声模式和缺失模式", "D": "所有模态都天然共享同一个语义空间"}, "answer": ["A", "B", "C"], "explanation": "图像、LiDAR、文本、视频等模态往往在坐标系、分辨率、采样频率和噪声来源上不同，因此需要专门的预处理与对齐。D 错在“天然共享同一个语义空间”，共享语义空间通常需要通过编码器、投影层或对比学习训练得到。"}, {"id": "Q003", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "相机与 LiDAR 的互补性", "type": "single", "difficulty": "中", "stem": "在机器人或自动驾驶场景中，相机与 LiDAR 的主要互补关系是什么？", "options": {"A": "相机通常提供丰富外观纹理，LiDAR 提供更直接的几何/距离信息", "B": "相机只能提供三维点云，LiDAR 只能提供颜色", "C": "LiDAR 一定比相机包含更多语义信息", "D": "相机和 LiDAR 的数据完全等价"}, "answer": ["A"], "explanation": "相机擅长记录颜色、纹理、边缘和语义外观；LiDAR 擅长提供距离、深度和三维几何结构。多模态融合的动机之一就是利用这种互补性。"}, {"id": "Q004", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "相机与 LiDAR 的互补性", "type": "multi", "difficulty": "中", "stem": "关于相机和 LiDAR 的表述，哪些是合理的？", "options": {"A": "相机数据通常受光照、遮挡和天气影响", "B": "LiDAR 数据可提供点云或深度相关信息", "C": "相机与 LiDAR 融合可以提升物体位置预测的鲁棒性", "D": "融合后不再需要坐标标定"}, "answer": ["A", "B", "C"], "explanation": "A、B、C 都是多传感器融合中的常见事实。D 错，融合前通常仍需相机内外参、LiDAR 坐标系、时间同步等标定或对齐步骤。"}, {"id": "Q005", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "神经网络可处理格式", "type": "single", "difficulty": "中", "stem": "“将不同数据类型转换为 neural-network ready”的核心含义是什么？", "options": {"A": "把原始数据转换为神经网络可输入的数值张量，并进行必要的归一化、编码和对齐", "B": "把所有数据都转换为自然语言句子", "C": "只保留文件名，不读取内容", "D": "删除所有元数据和坐标信息"}, "answer": ["A"], "explanation": "神经网络通常接收张量输入。图像要调整尺寸、归一化；点云可能要投影、体素化或提取特征；文本要分词与向量化；表格要编码数值和类别变量。"}, {"id": "Q006", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "神经网络可处理格式", "type": "multi", "difficulty": "中", "stem": "以下哪些操作有助于把数据转换为神经网络可处理的形式？", "options": {"A": "图像 resize、归一化和通道排列调整", "B": "点云投影到 BEV 或转换为体素/特征张量", "C": "文本 tokenization 和 embedding", "D": "忽略缺失值和异常值，让模型自行解决一切"}, "answer": ["A", "B", "C"], "explanation": "A、B、C 是典型预处理方式。D 不严谨，缺失值和异常值常会显著影响模型训练，需要标记、填补、过滤或建模处理。"}, {"id": "Q007", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "空间标定与时间同步", "type": "single", "difficulty": "中", "stem": "多传感器融合中，标定和时间同步的主要目的是什么？", "options": {"A": "确保来自不同传感器的观测能够对应到同一物理对象或同一时刻", "B": "让所有传感器使用同一个品牌", "C": "减少模型参数数量到 0", "D": "避免使用任何神经网络"}, "answer": ["A"], "explanation": "如果相机帧和 LiDAR 扫描在空间或时间上不对齐，模型可能把不同对象或不同时刻的数据错误融合，导致定位、检测和推理错误。"}, {"id": "Q008", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "空间标定与时间同步", "type": "multi", "difficulty": "中", "stem": "关于多模态对齐，哪些说法正确？", "options": {"A": "空间对齐常涉及坐标变换、投影关系和外参标定", "B": "时间对齐可减少运动目标带来的错配", "C": "语义对齐可通过共享 embedding 或对比学习实现", "D": "只要模型足够大，对齐永远不重要"}, "answer": ["A", "B", "C"], "explanation": "空间、时间和语义对齐分别解决“在哪里”“什么时候”“表达是否可比较”的问题。D 是常见误解，模型容量不能替代基本的数据质量与对齐。"}, {"id": "Q009", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "早期融合", "type": "single", "difficulty": "中", "stem": "早期融合（early fusion）的典型做法是？", "options": {"A": "在较低层或输入阶段将多个模态合并，再输入同一模型或共享主干", "B": "各模态独立预测，最后只平均结果", "C": "只使用文本，不使用其他模态", "D": "完全不做特征提取"}, "answer": ["A"], "explanation": "早期融合强调在输入或低层特征阶段合并信息，例如把图像特征和深度特征拼接，或将 LiDAR 投影到图像/BEV 后一起送入网络。"}, {"id": "Q010", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "早期融合", "type": "multi", "difficulty": "中", "stem": "早期融合的潜在优点包括哪些？", "options": {"A": "模型可较早学习跨模态低层互补关系", "B": "可能充分利用空间上精细对齐的信息", "C": "通常对输入对齐和预处理要求较高", "D": "完全不需要设计网络结构"}, "answer": ["A", "B", "C"], "explanation": "A、B 是优点，C 是伴随的要求/代价。早期融合不是“无需设计结构”，相反常需要认真设计输入表示、维度匹配和对齐方式。"}, {"id": "Q011", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "后期融合", "type": "single", "difficulty": "中", "stem": "后期融合（late fusion）更强调在哪个阶段合并多模态信息？", "options": {"A": "各模态模型分别输出预测或高层特征后再合并", "B": "原始文件下载前合并", "C": "数据采集硬件内部合并", "D": "训练完成后删除一个模态"}, "answer": ["A"], "explanation": "后期融合通常让每个模态拥有自己的编码器或预测器，最后融合 logits、概率、决策结果或高层语义特征。"}, {"id": "Q012", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "后期融合", "type": "multi", "difficulty": "中", "stem": "后期融合的特点包括哪些？", "options": {"A": "可保留各模态专用模型", "B": "相对便于处理某个模态缺失的情况", "C": "可通过加权平均、投票或元分类器融合结果", "D": "一定比早期融合效果差"}, "answer": ["A", "B", "C"], "explanation": "后期融合具有模块化、可解释性较强、容错性较好的特点。D 错，早期/中期/后期融合没有绝对优劣，应结合任务、数据量、对齐质量和部署约束选择。"}, {"id": "Q013", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "模态专用编码器", "type": "single", "difficulty": "中", "stem": "为什么多模态模型常为不同模态使用不同编码器？", "options": {"A": "不同模态的数据结构不同，需要不同归纳偏置和特征提取方式", "B": "因为一个编码器不能含有任何参数", "C": "因为图像和文本一定不能融合", "D": "因为编码器只用于加密数据"}, "answer": ["A"], "explanation": "图像适合 CNN/ViT 等视觉编码器，文本适合 Transformer 语言编码器，点云适合 PointNet、体素网络或 BEV 编码器。模态专用编码器可以更有效提取各模态特征。"}, {"id": "Q014", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "模态专用编码器", "type": "multi", "difficulty": "中", "stem": "以下哪些可以作为模态专用编码器或特征提取器？", "options": {"A": "图像 CNN 或 Vision Transformer", "B": "文本 Transformer 编码器", "C": "点云/BEV 编码器", "D": "随机删除全部输入的函数"}, "answer": ["A", "B", "C"], "explanation": "A、B、C 都是常见编码器类型。D 不是有效编码器，因为它破坏了输入信息，无法支持稳定学习。"}, {"id": "Q015", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "物体位置预测", "type": "single", "difficulty": "中", "stem": "使用相机和 LiDAR 预测物体位置时，最关键的输出通常是什么？", "options": {"A": "目标在图像或三维空间中的位置/边界框/坐标", "B": "课程讲师姓名", "C": "操作系统版本", "D": "网页背景颜色"}, "answer": ["A"], "explanation": "机器人和自动驾驶中的物体定位任务通常关注 2D/3D bounding box、中心点、深度、姿态或轨迹等空间信息。"}, {"id": "Q016", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "物体位置预测", "type": "multi", "difficulty": "中", "stem": "为了提升物体位置预测，哪些信息通常有帮助？", "options": {"A": "相机图像中的外观和语义线索", "B": "LiDAR 的距离和几何线索", "C": "传感器之间的标定关系", "D": "与任务无关的随机噪声"}, "answer": ["A", "B", "C"], "explanation": "物体位置预测依赖语义外观、几何距离与正确对齐。随机噪声通常会干扰模型。"}, {"id": "Q017", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "缺失/噪声模态", "type": "single", "difficulty": "中", "stem": "如果部署时 LiDAR 偶发失效，而训练时模型强依赖 LiDAR，最可能出现什么问题？", "options": {"A": "模型性能显著下降，需要缺失模态鲁棒性设计", "B": "模型一定自动变得更准确", "C": "相机也会自动失效", "D": "不影响任何结果"}, "answer": ["A"], "explanation": "多模态系统应考虑模态缺失、噪声变化和传感器故障。常见方法包括 modality dropout、后期融合容错、缺失标记和单模态 fallback。"}, {"id": "Q018", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "缺失/噪声模态", "type": "multi", "difficulty": "中", "stem": "增强多模态系统鲁棒性的策略包括哪些？", "options": {"A": "训练时随机丢弃部分模态", "B": "设计单模态 fallback 或后期融合分支", "C": "对传感器噪声进行数据增强", "D": "假设所有传感器永远完美工作"}, "answer": ["A", "B", "C"], "explanation": "A、B、C 都是常见鲁棒性方法。D 是不现实假设，真实部署中传感器可能出现噪声、遮挡、漂移或断连。"}, {"id": "Q019", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "融合策略权衡", "type": "single", "difficulty": "中", "stem": "选择 early fusion、intermediate fusion 或 late fusion 时，最合理的原则是？", "options": {"A": "根据任务目标、模态对齐质量、数据规模、可解释性和部署约束综合选择", "B": "永远选择 early fusion", "C": "永远选择 late fusion", "D": "只看模型名字是否流行"}, "answer": ["A"], "explanation": "融合策略没有绝对最优。早期融合适合低层信息强对齐，中期融合适合共享表示学习，后期融合适合模块化和缺失模态容错。"}, {"id": "Q020", "module": "模块1 Early and Late Fusion：早期融合与后期融合", "knowledge_point": "融合策略权衡", "type": "multi", "difficulty": "中", "stem": "影响融合策略选择的因素包括哪些？", "options": {"A": "输入模态是否精确对齐", "B": "训练数据量与标注质量", "C": "推理延迟、可解释性和容错需求", "D": "完全不考虑任务类型"}, "answer": ["A", "B", "C"], "explanation": "融合策略取决于数据与任务条件。D 错，多模态融合必须围绕具体任务和实际部署约束设计。"}, {"id": "Q021", "module": "模块2 Intermediate Fusion：中期融合、对比预训练与向量数据库", "knowledge_point": "中期融合", "type": "single", "difficulty": "中", "stem": "中期融合（intermediate fusion）通常指什么？", "options": {"A": "在各模态经过初步编码后，在特征/表示层进行交 function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sameSet(a,b) {
  if (a.length !== b.length) return false;
  const A = a.slice().sort().join(",");
  const B = b.slice().sort().join(",");
  return A === B;
}

  sel.innerHTML = `<option value="all">${allLabel}</option>` + items.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
}
function getFiltered(prefix) {
  const mod = byId(prefix+"Module").value;
  const type = byId(prefix+"Type") ? byId(prefix+"Type").value : "all";
  const kp = byId(prefix+"KP") ? byId(prefix+"KP").value : "all";
  return QUESTIONS.filter(q => (mod==="all" || q.module===mod) && (type==="all" || q.type===type) && (kp==="all" || q.knowledge_point===kp));
}
function optionHtml(q, name, disabled=false) {
  const inputType = q.type === "single" ? "radio" : "checkbox";
  return Object.entries(q.options).map(([key,val]) => `
    <label class="option">
      <input type="${inputType}" name="${name}" value="${key}" ${disabled ? "disabled" : ""}>
      <strong>${key}.</strong> ${escapeHtml(val)}
    </label>
  `).join("");
}
function selectedValues(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(x => x.value);
}
function answerText(q) {
  return q.answer.join("、");
}
function typeLabel(q) {
  return q.type === "single" ? "单选" : "多选";
}
function saveWrong(qid) {
  const set = new Set(JSON.parse(localStorage.getItem("baamm_wrong") || "[]"));
  set.add(qid);
  localStorage.setItem("baamm_wrong", JSON.stringify([...set]));
}
function removeWrong(qid) {
  const set = new Set(JSON.parse(localStorage.getItem("baamm_wrong") || "[]"));
  set.delete(qid);
  localStorage.setItem("baamm_wrong", JSON.stringify([...set]));
}

function renderStats() {
  const singles = QUESTIONS.filter(q => q.type === "single").length;
  const multis = QUESTIONS.filter(q => q.type === "multi").length;
  byId("stats").innerHTML = `
    <div class="stat-card"><div class="stat-num">${QUESTIONS.length}</div><div class="stat-label">总题量</div></div>
    <div class="stat-card"><div class="stat-num">${singles}</div><div class="stat-label">单选题</div></div>
    <div class="stat-card"><div class="stat-num">${multis}</div><div class="stat-label">多选题</div></div>
    <div class="stat-card"><div class="stat-num">${kps.length}</div><div class="stat-label">知识点，均二次覆盖</div></div>
  `;
}

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    byId(btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "bank") renderBank();
    if (btn.dataset.tab === "wrong") renderWrong();
  });
});

fillSelect("practiceModule", modules, "全部模块");
fillSelect("examModule", modules, "全部模块");
fillSelect("bankModule", modules, "全部模块");
fillSelect("practiceKP", kps, "全部知识点");
fillSelect("bankKP", kps, "全部知识点");
renderStats();

let practiceList = [];
let practiceIndex = 0;
function startPractice() {
  practiceList = getFiltered("practice");
  if (byId("practiceOrder").value === "shuffle") practiceList = shuffle(practiceList);
  practiceIndex = 0;
  renderPractice();
}
function renderPractice() {
  const area = byId("practiceArea");
  const info = byId("practiceInfo");
  if (!practiceList.length) {
    area.innerHTML = "<div class='question-card'>没有符合筛选条件的题目。</div>";
    info.textContent = "";
    byId("practiceProgress").style.width = "0%";
    return;
  }
  const q = practiceList[practiceIndex];
  byId("practiceProgress").style.width = ((practiceIndex) / practiceList.length * 100) + "%";
  info.textContent = `第 ${practiceIndex+1} / ${practiceList.length} 题`;
  const name = "practice_" + q.id;
  area.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="badge">${q.id}</span>
        <span class="badge ${q.type}">${typeLabel(q)}</span>
        <span class="badge">${escapeHtml(q.module)}</span>
        <span class="badge">${escapeHtml(q.knowledge_point)}</span>
      </div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div>${optionHtml(q, name)}</div>
      <div class="row" style="margin-top:14px;">
        <button id="checkPractice">查看答案与解析</button>
        <button class="secondary" id="prevPractice">上一题</button>
        <button class="secondary" id="nextPractice">下一题</button>
      </div>
      <div id="practiceFeedback" class="feedback"></div>
    </div>
  `;
  byId("checkPractice").onclick = () => {
    const sel = selectedValues(name);
    if (!sel.length) { alert("请先选择答案。"); return; }
    const ok = sameSet(sel, q.answer);
    if (!ok) saveWrong(q.id); else removeWrong(q.id);
    const fb = byId("practiceFeedback");
    fb.className = "feedback " + (ok ? "correct" : "wrong");
    fb.innerHTML = `<strong>${ok ? "回答正确" : "回答错误"}</strong><br>
      <strong>你的答案：</strong>${sel.join("、")}<br>
      <strong>正确答案：</strong>${answerText(q)}<br>
      <strong>解析：</strong>${escapeHtml(q.explanation)}`;
  };
  byId("prevPractice").onclick = () => { practiceIndex = Math.max(0, practiceIndex-1); renderPractice(); };
  byId("nextPractice").onclick = () => { practiceIndex = Math.min(practiceList.length-1, practiceIndex+1); renderPractice(); };
}
byId("startPractice").onclick = startPractice;

function renderBank() {
  const list = getFiltered("bank");
  byId("bankArea").innerHTML = list.map(q => `
    <details class="bank-item">
      <summary>${q.id} 【${typeLabel(q)}】${escapeHtml(q.stem)}</summary>
      <div class="q-meta" style="margin-top:10px;">
        <span class="badge">${escapeHtml(q.module)}</span>
        <span class="badge">${escapeHtml(q.knowledge_point)}</span>
      </div>
      <div>${Object.entries(q.options).map(([k,v]) => `<p><strong>${k}.</strong> ${escapeHtml(v)}</p>`).join("")}</div>
      <p><strong>答案：</strong>${answerText(q)}</p>
      <p><strong>解析：</strong>${escapeHtml(q.explanation)}</p>
    </details>
  `).join("");
}
byId("renderBank").onclick = renderBank;

let examTimer = null;
let examList = [];
let remainSeconds = 0;
function startExam() {
  let pool = getFiltered("exam");
  if (!pool.length) { alert("没有符合条件的题目。"); return; }
  const count = Math.min(Number(byId("examCount").value || 30), pool.length);
  const minutes = Math.max(1, Number(byId("examMinutes").value || 30));
  examList = shuffle(pool).slice(0, count);
  remainSeconds = minutes * 60;
  if (examTimer) clearInterval(examTimer);
  renderExam();
  examTimer = setInterval(() => {
    remainSeconds--;
    updateTimer();
    if (remainSeconds <= 0) {
      clearInterval(examTimer);
      submitExam();
    }
  }, 1000);
}
function updateTimer() {
  const el = byId("timer");
  if (!el) return;
  const m = Math.floor(remainSeconds / 60);
  const s = remainSeconds % 60;
  el.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function renderExam() {
  byId("examArea").innerHTML = `
    <div class="exam-header">
      <div><strong>本次考试：</strong>${examList.length} 题。多选题需完全选对。</div>
      <div class="timer" id="timer"></div>
    </div>
    <div class="exam-grid">
    ${examList.map((q,i) => `
      <div class="exam-q">
        <div class="q-meta">
          <span class="badge">${i+1}</span>
          <span class="badge ${q.type}">${typeLabel(q)}</span>
          <span class="badge">${escapeHtml(q.module)}</span>
          <span class="badge">${escapeHtml(q.knowledge_point)}</span>
        </div>
        <div class="stem">${escapeHtml(q.stem)}</div>
        ${optionHtml(q, "exam_" + q.id)}
      </div>
    `).join("")}
    </div>
    <div class="row" style="margin-top:16px;">
      <button class="good" id="submitExam">提交试卷</button>
      <button class="secondary" id="restartExam">重新抽题</button>
    </div>
    <div id="examResult"></div>
  `;
  updateTimer();
  byId("submitExam").onclick = submitExam;
  byId("restartExam").onclick = startExam;
}
function submitExam() {
  if (examTimer) clearInterval(examTimer);
  let correct = 0;
  let rows = [];
  examList.forEach((q, i) => {
    const sel = selectedValues("exam_" + q.id);
    const ok = sameSet(sel, q.answer);
    if (ok) {
      correct++;
      removeWrong(q.id);
    } else {
      saveWrong(q.id);
    }
    rows.push({q, i, sel, ok});
  });
  const score = Math.round(correct / examList.length * 100);
  const wrongRows = rows.filter(r => !r.ok);
  byId("examResult").innerHTML = `
    <div class="result">
      <h2>考试结果</h2>
      <p><strong>得分：</strong>${score} / 100　<strong>正确：</strong>${correct} / ${examList.length}</p>
      <p><strong>错题数：</strong>${wrongRows.length}</p>
      <h3>错题与解析</h3>
      ${wrongRows.length ? wrongRows.map(r => `
        <details class="bank-item" open>
          <summary>第 ${r.i+1} 题｜${r.q.id}｜${escapeHtml(r.q.stem)}</summary>
          <p><strong>你的答案：</strong>${r.sel.length ? r.sel.join("、") : "未作答"}</p>
          <p><strong>正确答案：</strong>${answerText(r.q)}</p>
          <p><strong>解析：</strong>${escapeHtml(r.q.explanation)}</p>
        </details>
      `).join("") : "<p>没有错题，很好！</p>"}
    </div>
  `;
  window.scrollTo({top: byId("examResult").offsetTop - 20, behavior:"smooth"});
}
byId("startExam").onclick = startExam;

function renderWrong() {
  const ids = JSON.parse(localStorage.getItem("baamm_wrong") || "[]");
  const list = QUESTIONS.filter(q => ids.includes(q.id));
  byId("wrongArea").innerHTML = list.length ? list.map(q => `
    <details class="bank-item" open>
      <summary>${q.id} 【${typeLabel(q)}】${escapeHtml(q.stem)}</summary>
      <div>${Object.entries(q.options).map(([k,v]) => `<p><strong>${k}.</strong> ${escapeHtml(v)}</p>`).join("")}</div>
      <p><strong>答案：</strong>${answerText(q)}</p>
      <p><strong>解析：</strong>${escapeHtml(q.explanation)}</p>
      <button class="secondary" onclick="removeWrong('${q.id}'); renderWrong();">移出错题本</button>
    </details>
  `).join("") : "<div class='question-card'>暂无错题。刷题或考试答错后会自动加入这里。</div>";
}
byId("loadWrong").onclick = renderWrong;
byId("clearWrong").onclick = () => {
  if (confirm("确定清空错题本吗？")) {
    localStorage.removeItem("baamm_wrong");
    renderWrong();
  }
};

startPractice();
renderBank();
</script>
</body>
</html>
