<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>为大语言模型添加知识：缩写知识卡片学习系统</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#162033;--muted:#667085;--primary:#2563eb;--green:#16a34a;--orange:#f59e0b;--red:#dc2626;--border:#e5e7eb;--shadow:0 12px 36px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;background:radial-gradient(circle at top left,#e0ecff 0,transparent 34%),var(--bg);color:var(--text)}header{padding:28px 24px 18px;max-width:1180px;margin:0 auto}h1{margin:0 0 8px;font-size:30px}.subtitle{color:var(--muted);line-height:1.7;max-width:880px}.app{max-width:1180px;margin:0 auto;padding:0 24px 36px;display:grid;grid-template-columns:300px 1fr;gap:22px}.panel{background:rgba(255,255,255,.94);border:1px solid rgba(229,231,235,.9);border-radius:var(--radius);box-shadow:var(--shadow)}.sidebar{padding:18px;height:fit-content;position:sticky;top:16px}.main{padding:22px;min-height:640px}.controls label{display:block;font-size:13px;color:var(--muted);margin:14px 0 7px}input,select{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 12px;font-size:15px;background:#fff;outline:none}button{border:none;border-radius:12px;padding:11px 14px;font-size:15px;cursor:pointer;background:var(--primary);color:#fff}button:hover{filter:brightness(.95)}button.secondary{background:#eef2ff;color:#1e40af}button.good{background:var(--green)}button.warn{background:var(--orange);color:#1f2937}.button-row{display:flex;gap:10px;flex-wrap:wrap}.button-row button{flex:1 1 auto}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.stat{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:12px}.stat .num{font-size:24px;font-weight:800}.stat .label{color:var(--muted);font-size:12px;margin-top:2px}.tabs{display:flex;gap:10px;border-bottom:1px solid var(--border);margin-bottom:18px;padding-bottom:12px}.tab{background:#f8fafc;color:#334155}.tab.active{background:var(--primary);color:#fff}.flashcard-wrap{min-height:430px;display:grid;place-items:center;padding:10px 0}.flashcard{width:min(720px,100%);min-height:330px;perspective:1200px;cursor:pointer}.card-inner{position:relative;width:100%;min-height:330px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.8,.2,1)}.flashcard.flipped .card-inner{transform:rotateY(180deg)}.card-face{position:absolute;inset:0;backface-visibility:hidden;background:linear-gradient(160deg,#fff,#f8fbff);border:1px solid var(--border);border-radius:26px;box-shadow:0 20px 56px rgba(37,99,235,.12);display:flex;flex-direction:column;justify-content:center;padding:34px}.card-back{transform:rotateY(180deg);justify-content:flex-start}.badge{display:inline-flex;width:fit-content;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1e40af;font-size:13px;font-weight:600;margin-bottom:18px}.abbr{font-size:clamp(48px,9vw,92px);font-weight:900;letter-spacing:-2px;line-height:1;text-align:center}.hint{color:var(--muted);text-align:center;margin-top:24px}.back-title{font-weight:800;font-size:21px;margin:12px 0 6px}.back-text{font-size:17px;line-height:1.75;color:#344054}.card-index{color:var(--muted);text-align:center;margin-top:8px}.list{display:grid;gap:10px}.list-item{border:1px solid var(--border);border-radius:14px;padding:13px 14px;background:#fff;cursor:pointer}.list-item:hover{border-color:#93c5fd;background:#f8fbff}.list-item strong{font-size:18px}.list-item .meta{color:var(--muted);font-size:13px;margin-top:4px;line-height:1.55}.test-card{border:1px solid var(--border);border-radius:22px;background:#fff;padding:24px}.question{font-size:28px;font-weight:800;margin:4px 0 18px}.options{display:grid;gap:12px}.option{text-align:left;background:#f8fafc;color:#111827;border:1px solid var(--border)}.option.correct{background:#dcfce7;border-color:#86efac;color:#14532d}.option.wrong{background:#fee2e2;border-color:#fecaca;color:#7f1d1d}.feedback{margin-top:16px;padding:14px;border-radius:14px;background:#f8fafc;color:#344054;line-height:1.7}.progress-bar{width:100%;height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px}.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#16a34a);width:0}.footer-note{color:var(--muted);font-size:13px;line-height:1.6;margin-top:16px}@media(max-width:880px){.app{grid-template-columns:1fr}.sidebar{position:static}h1{font-size:24px}.main{padding:16px}.card-face{padding:24px}}
</style></head><body>
<header><h1>《为大语言模型添加知识》缩写知识卡片</h1><div class="subtitle">正面为缩写，反面为英文全称、中文全称和含义。支持筛选、搜索、随机学习、掌握状态记录和测试模式。所有进度保存在本机浏览器中，可离线使用。</div></header>
<div class="app">
<aside class="panel sidebar"><div class="controls"><label>搜索缩写 / 全称 / 含义</label><input id="searchInput" placeholder="例如：DPO, 量化, evaluator"><label>分类筛选</label><select id="categorySelect"></select><label>学习状态</label><select id="statusSelect"><option value="all">全部</option><option value="new">未标记</option><option value="mastered">已掌握</option><option value="review">需复习</option></select><div class="button-row" style="margin-top:16px;"><button class="secondary" onclick="shuffleCards()">随机排序</button><button class="secondary" onclick="resetProgress()">清空进度</button></div><div class="stats"><div class="stat"><div class="num" id="totalNum">0</div><div class="label">当前卡片</div></div><div class="stat"><div class="num" id="masteredNum">0</div><div class="label">已掌握</div></div><div class="stat"><div class="num" id="reviewNum">0</div><div class="label">需复习</div></div><div class="stat"><div class="num" id="progressPct">0%</div><div class="label">掌握率</div></div></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="footer-note">使用方法：点击卡片翻面；使用“已掌握/需复习”记录状态；切换到“测试模式”进行选择题练习。</div></div></aside>
<main class="panel main"><div class="tabs"><button id="learnTab" class="tab active" onclick="setMode('learn')">卡片学习</button><button id="listTab" class="tab" onclick="setMode('list')">列表浏览</button><button id="testTab" class="tab" onclick="setMode('test')">测试模式</button></div>
<section id="learnMode"><div class="flashcard-wrap"><div class="flashcard" id="flashcard" onclick="flipCard()"><div class="card-inner"><div class="card-face card-front"><div class="badge" id="frontCategory">分类</div><div class="abbr" id="frontAbbr">LLM</div><div class="hint">点击卡片查看反面</div></div><div class="card-face card-back"><div class="badge" id="backCategory">分类</div><div class="back-title">英文全称</div><div class="back-text" id="backEnglish"></div><div class="back-title">中文全称</div><div class="back-text" id="backChinese"></div><div class="back-title">含义</div><div class="back-text" id="backMeaning"></div></div></div></div></div><div class="card-index" id="cardIndex"></div><div class="button-row" style="margin-top:18px;"><button class="secondary" onclick="prevCard()">上一张</button><button class="secondary" onclick="nextCard()">下一张</button><button class="good" onclick="markStatus('mastered')">已掌握</button><button class="warn" onclick="markStatus('review')">需复习</button></div></section>
<section id="listMode" style="display:none;"><div class="list" id="cardList"></div></section>
<section id="testMode" style="display:none;"><div class="test-card"><div class="badge">选择正确的英文全称</div><div class="question" id="testQuestion"></div><div class="options" id="testOptions"></div><div id="testFeedback"></div><div class="button-row" style="margin-top:18px;"><button class="secondary" onclick="newTestQuestion()">下一题</button><button class="secondary" onclick="resetTest()">重置测试成绩</button></div><div class="footer-note" id="testScore">测试成绩：0 / 0</div></div></section>
</main></div>
<script>
const ALL_CARDS = [{"abbr": "LLM", "english": "Large Language Model", "chinese": "大语言模型", "meaning": "以海量文本、代码等数据训练的大规模神经网络模型，可用于问答、写作、总结、翻译、代码生成和对话等任务。", "category": "基础概念"}, {"abbr": "LLMs", "english": "Large Language Models", "chinese": "大语言模型（复数）", "meaning": "LLM 的复数形式，指多个大语言模型，或大语言模型这一类模型。", "category": "基础概念"}, {"abbr": "AI", "english": "Artificial Intelligence", "chinese": "人工智能", "meaning": "让机器具备感知、推理、学习、生成和决策等能力的技术总称。", "category": "基础概念"}, {"abbr": "DLI", "english": "Deep Learning Institute", "chinese": "深度学习培训中心", "meaning": "NVIDIA 的培训体系，提供深度学习、生成式 AI、加速计算等课程和证书。", "category": "NVIDIA 生态"}, {"abbr": "NeMo", "english": "Neural Modules / NVIDIA NeMo", "chinese": "神经模块 / NVIDIA NeMo 框架", "meaning": "NVIDIA 面向生成式 AI 和大模型开发的框架生态，可用于数据处理、训练、微调、评估、对齐和部署相关工作。", "category": "NVIDIA 生态"}, {"abbr": "NeMo Curator", "english": "NVIDIA NeMo Curator", "chinese": "NeMo 数据策展工具", "meaning": "用于大规模数据清洗、去重、过滤、质量筛选、PII 去除和合成数据准备的工具。", "category": "数据"}, {"abbr": "PII", "english": "Personally Identifiable Information", "chinese": "个人身份信息", "meaning": "可识别个人身份的信息，如姓名、邮箱、电话、身份证号、地址等。训练数据中通常需要检测和删除，以降低隐私风险。", "category": "数据"}, {"abbr": "QA", "english": "Question Answering / Question-Answer Pair", "chinese": "问答 / 问答对", "meaning": "在课程中主要指用于 SFT 的“问题-答案”训练样本，可训练模型按照指定任务格式回答。", "category": "数据"}, {"abbr": "SFT", "english": "Supervised Fine-Tuning", "chinese": "监督微调", "meaning": "使用人工标注或高质量样本对模型进行有监督训练，让模型学会特定任务、格式、语言风格或技能。", "category": "模型定制"}, {"abbr": "CPT", "english": "Continued Pre-Training", "chinese": "持续预训练", "meaning": "在已有基础模型上继续使用领域语料进行预训练，主要用于给模型注入新的领域知识。", "category": "模型定制"}, {"abbr": "DPO", "english": "Direct Preference Optimization", "chinese": "直接偏好优化", "meaning": "使用偏好数据直接优化模型行为，使模型输出更符合人类偏好，例如更安全、更正式、更符合特定语气或风格。", "category": "模型定制"}, {"abbr": "RL", "english": "Reinforcement Learning", "chinese": "强化学习", "meaning": "通过奖励信号优化行为策略的机器学习方法。在大模型对齐中常用于让模型输出更符合人类偏好。", "category": "模型定制"}, {"abbr": "NeMo-RL", "english": "NVIDIA NeMo Reinforcement Learning", "chinese": "NeMo 强化学习框架", "meaning": "NVIDIA NeMo 生态中用于强化学习和模型对齐任务的组件，可用于运行 DPO 等对齐任务。", "category": "NVIDIA 生态"}, {"abbr": "MMLU", "english": "Massive Multitask Language Understanding", "chinese": "大规模多任务语言理解", "meaning": "常用的大语言模型评估基准，覆盖多学科、多领域知识，用于衡量模型的综合知识和推理能力。", "category": "评估"}, {"abbr": "LLM-as-a-Judge", "english": "Large Language Model as a Judge", "chinese": "大语言模型作为裁判", "meaning": "使用另一个 LLM 对模型输出进行自动评价，例如判断回答是否准确、是否符合风格、是否安全、是否有帮助。", "category": "评估"}, {"abbr": "ELO", "english": "Elo Rating System", "chinese": "Elo 等级评分系统", "meaning": "原用于棋类比赛的相对评分方法。在模型评估中可用于比较不同模型或不同回答之间的相对优劣。严格说不是首字母缩写，而是以 Arpad Elo 命名。", "category": "评估"}, {"abbr": "zero-shot", "english": "Zero-shot", "chinese": "零样本", "meaning": "模型在没有示例的情况下直接完成任务，用于测试模型本身的泛化能力。", "category": "评估"}, {"abbr": "few-shot", "english": "Few-shot", "chinese": "少样本", "meaning": "在提示词中给少量示例，让模型根据上下文学习任务格式和答案风格。", "category": "评估"}, {"abbr": "ICL", "english": "In-Context Learning", "chinese": "上下文学习", "meaning": "通过提示词中的示例或上下文让模型临时学会任务，而不更新模型参数。few-shot 通常属于 ICL。", "category": "评估"}, {"abbr": "MLflow", "english": "Machine Learning Flow", "chinese": "机器学习流程管理工具", "meaning": "用于记录、跟踪、比较和可视化实验结果的工具。课程中用于跟踪 LLM 评估实验。", "category": "评估"}, {"abbr": "TensorRT-LLM", "english": "TensorRT for Large Language Models", "chinese": "TensorRT 大语言模型推理优化库", "meaning": "NVIDIA 面向 LLM 推理加速的库，用于优化推理速度、吞吐量和显存占用。", "category": "部署优化"}, {"abbr": "PTQ", "english": "Post-Training Quantization", "chinese": "后训练量化", "meaning": "不重新完整训练模型，而是在训练后将权重或激活转换为低精度格式，以减少模型大小和显存占用、提升推理效率。", "category": "部署优化"}, {"abbr": "FP8", "english": "8-bit Floating Point", "chinese": "8 位浮点数", "meaning": "一种低精度浮点格式，常用于加速深度学习推理或训练，并降低显存消耗。", "category": "部署优化"}, {"abbr": "GPU", "english": "Graphics Processing Unit", "chinese": "图形处理器", "meaning": "擅长并行计算的处理器，是训练和部署大模型的重要硬件基础。", "category": "硬件"}, {"abbr": "RAG", "english": "Retrieval-Augmented Generation", "chinese": "检索增强生成", "meaning": "先从外部知识库检索相关内容，再让 LLM 基于检索结果生成答案，适合补充最新知识或企业私有知识。", "category": "应用"}, {"abbr": "NIM", "english": "NVIDIA Inference Microservices", "chinese": "NVIDIA 推理微服务", "meaning": "NVIDIA 提供的模型推理部署微服务，用于更方便地部署和调用 AI 模型。", "category": "NVIDIA 生态"}, {"abbr": "API", "english": "Application Programming Interface", "chinese": "应用程序编程接口", "meaning": "软件之间进行调用和交互的接口。若将刷题系统或模型系统接入其它平台，通常会使用 API。", "category": "系统开发"}, {"abbr": "JSON", "english": "JavaScript Object Notation", "chinese": "JavaScript 对象表示法", "meaning": "一种轻量级结构化数据格式。题库和卡片系统中常用 JSON 存储题目、选项、答案和解析。", "category": "系统开发"}, {"abbr": "CSV", "english": "Comma-Separated Values", "chinese": "逗号分隔值", "meaning": "一种表格数据格式，可用 Excel 打开。题库或卡片导出时常用于保存结构化内容。", "category": "系统开发"}, {"abbr": "HTML", "english": "HyperText Markup Language", "chinese": "超文本标记语言", "meaning": "网页的基础标记语言。在线学习系统通常可以以 HTML 页面形式运行。", "category": "系统开发"}, {"abbr": "UI", "english": "User Interface", "chinese": "用户界面", "meaning": "用户与系统交互的界面，例如学习页面、按钮、卡片显示区、筛选栏和测试区等。", "category": "系统开发"}, {"abbr": "UX", "english": "User Experience", "chinese": "用户体验", "meaning": "用户使用系统时的整体体验，包括是否清晰、流畅、易用、反馈及时等。", "category": "系统开发"}, {"abbr": "README", "english": "Read Me", "chinese": "说明文档", "meaning": "项目说明文件，通常包含使用方法、文件结构、运行步骤和注意事项。", "category": "系统开发"}];
let cards=[...ALL_CARDS],current=0,flipped=false,mode='learn',testAnswer=null,testCorrect=0,testTotal=0;const STORAGE_KEY='llm_abbrev_flashcard_progress_v1';
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return {}}}function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}function getStatus(a){return loadProgress()[a]||'new'}function setStatus(a,s){const p=loadProgress();p[a]=s;saveProgress(p);updateStats();renderList()}function initCategories(){const cats=['全部',...Array.from(new Set(ALL_CARDS.map(c=>c.category))).sort()];categorySelect.innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');categorySelect.addEventListener('change',applyFilters);searchInput.addEventListener('input',applyFilters);statusSelect.addEventListener('change',applyFilters)}
function applyFilters(){const q=searchInput.value.trim().toLowerCase(),cat=categorySelect.value,stat=statusSelect.value;cards=ALL_CARDS.filter(c=>{const text=[c.abbr,c.english,c.chinese,c.meaning,c.category].join(' ').toLowerCase();return(!q||text.includes(q))&&(cat==='全部'||c.category===cat)&&(stat==='all'||getStatus(c.abbr)===stat)});current=0;flipped=false;renderCard();renderList();updateStats()}function renderCard(){flashcard.classList.toggle('flipped',flipped);if(!cards.length){frontCategory.textContent='无匹配结果';frontAbbr.textContent='—';backCategory.textContent='无匹配结果';backEnglish.textContent='请调整筛选条件。';backChinese.textContent='';backMeaning.textContent='';cardIndex.textContent='0 / 0';return}const c=cards[current],s=getStatus(c.abbr),st=s==='mastered'?'已掌握':s==='review'?'需复习':'未标记';frontCategory.textContent=c.category+' · '+st;frontAbbr.textContent=c.abbr;backCategory.textContent=c.category+' · '+st;backEnglish.textContent=c.english;backChinese.textContent=c.chinese;backMeaning.textContent=c.meaning;cardIndex.textContent=`${current+1} / ${cards.length}`}function flipCard(){flipped=!flipped;renderCard()}function nextCard(){if(!cards.length)return;current=(current+1)%cards.length;flipped=false;renderCard()}function prevCard(){if(!cards.length)return;current=(current-1+cards.length)%cards.length;flipped=false;renderCard()}function markStatus(s){if(!cards.length)return;setStatus(cards[current].abbr,s);renderCard()}function shuffleCards(){for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}current=0;flipped=false;renderCard();renderList()}function resetProgress(){if(confirm('确定要清空所有学习进度吗？')){localStorage.removeItem(STORAGE_KEY);applyFilters()}}function updateStats(){const p=loadProgress(),total=cards.length,mastered=cards.filter(c=>p[c.abbr]==='mastered').length,review=cards.filter(c=>p[c.abbr]==='review').length,pct=total?Math.round(mastered/total*100):0;totalNum.textContent=total;masteredNum.textContent=mastered;reviewNum.textContent=review;progressPct.textContent=pct+'%';progressFill.style.width=pct+'%'}function setMode(m){mode=m;learnMode.style.display=m==='learn'?'block':'none';listMode.style.display=m==='list'?'block':'none';testMode.style.display=m==='test'?'block':'none';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(m+'Tab').classList.add('active');if(m==='test')newTestQuestion()}function renderList(){if(!cards.length){cardList.innerHTML='<div class="footer-note">没有符合条件的卡片。</div>';return}cardList.innerHTML=cards.map((c,i)=>{const s=getStatus(c.abbr),st=s==='mastered'?'已掌握':s==='review'?'需复习':'未标记';return `<div class="list-item" onclick="jumpToCard(${i})"><strong>${esc(c.abbr)}</strong><div class="meta">${esc(c.english)} ｜ ${esc(c.chinese)} ｜ ${esc(c.category)} ｜ ${st}</div></div>`}).join('')}function jumpToCard(i){current=i;flipped=false;setMode('learn');renderCard()}function newTestQuestion(){const pool=cards.length>=4?cards:ALL_CARDS;if(!pool.length)return;const q=pool[Math.floor(Math.random()*pool.length)];testAnswer=q;testQuestion.textContent=q.abbr;const others=ALL_CARDS.filter(c=>c.abbr!==q.abbr);for(let i=others.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[others[i],others[j]]=[others[j],others[i]]}const opts=[q,...others.slice(0,3)];for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]]}testOptions.innerHTML=opts.map(o=>`<button class="option" onclick="chooseOption(this,'${attr(o.abbr)}')">${esc(o.english)}<br><span style="color:#667085">${esc(o.chinese)}</span></button>`).join('');testFeedback.innerHTML=''}function chooseOption(btn,abbr){document.querySelectorAll('.option').forEach(b=>b.disabled=true);testTotal++;if(abbr===testAnswer.abbr){testCorrect++;btn.classList.add('correct');setStatus(testAnswer.abbr,'mastered');testFeedback.innerHTML=`<div class="feedback"><strong>回答正确。</strong><br>${esc(testAnswer.abbr)} = ${esc(testAnswer.english)}｜${esc(testAnswer.chinese)}<br>${esc(testAnswer.meaning)}</div>`}else{btn.classList.add('wrong');document.querySelectorAll('.option').forEach(b=>{if(b.textContent.includes(testAnswer.english))b.classList.add('correct')});setStatus(testAnswer.abbr,'review');testFeedback.innerHTML=`<div class="feedback"><strong>回答错误。</strong><br>正确答案：${esc(testAnswer.english)}｜${esc(testAnswer.chinese)}<br>${esc(testAnswer.meaning)}</div>`}testScore.textContent=`测试成绩：${testCorrect} / ${testTotal}`}function resetTest(){testCorrect=0;testTotal=0;testScore.textContent='测试成绩：0 / 0';newTestQuestion()}function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function attr(s){return String(s).replace(/'/g,"\\'")}document.addEventListener('keydown',e=>{if(mode!=='learn')return;if(e.key==='ArrowRight')nextCard();if(e.key==='ArrowLeft')prevCard();if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard()}});initCategories();applyFilters();
</script></body></html>
